<html lang="zh-CN">

  <meta name="keywords" content="颜色选择器,调色板,RGB转HEX,颜色代码,渐变色生成,配色方案,HSL颜色">
  <style>
    :root{
      --primary:#6366f1;--secondary:#a855f7;--accent:#06b6d4;
      --bg:#0f0f1a;--bg-card:#1a1a2e;--bg-card2:#16213e;
      --text:#e2e8f0;--text-muted:#94a3b8;--border:#2d2d4e;
      --success:#10b981;--warning:#f59e0b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}

    .navbar{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}

    .nav-links{display:flex;gap:8px;list-style:none;align-items:center}
    .nav-links a{color:var(--text-muted);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:.9rem;transition:all .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text);background:rgba(99,102,241,.15)}
    .nav-btn{background:linear-gradient(135deg,#6366f1,#a855f7)!important;color:white!important;border-radius:20px!important;font-weight:500;padding:7px 16px!important}

    .page-hero{text-align:center;padding:40px 24px 28px;background:radial-gradient(ellipse at top,rgba(168,85,247,.12) 0%,transparent 65%)}
    .page-hero h1{font-size:2.2rem;font-weight:800;margin-bottom:10px}
    .page-hero span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-hero p{color:var(--text-muted);font-size:1rem}

    .main{max-width:1100px;margin:0 auto;padding:24px 24px 80px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .main-full{grid-column:1/-1}

    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px}
    .card-title{font-size:.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:18px;display:flex;align-items:center;gap:8px}

    input[type="range"]{flex:1;height:8px;border-radius:4px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}

    .scheme-hex{font-size:.7rem;font-family:'Courier New',monospace;color:var(--text-muted)}

    .gradient-preview{width:100%;height:100px;border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
    .gradient-stops{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .stop-item{display:flex;align-items:center;gap:6px;background:var(--bg);padding:6px 12px;border-radius:8px;border:1px solid var(--border)}

    .palette-cell{aspect-ratio:1;border-radius:6px;cursor:pointer;transition:transform .15s;border:1px solid rgba(255,255,255,.05)}
    .palette-cell:hover{transform:scale(1.2);z-index:2;position:relative}

    .btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}

    @media(max-width:768px){.main{grid-template-columns:1fr}.nav-links{display:none}.palette-grid{grid-template-columns:repeat(6,1fr)}}

<script>
// ========== 状态变量 ==========
let currentH = 238, currentS = 84, currentL = 63, currentA = 1.0;
let colorHistory = [];

// ========== 颜色转换函数 ==========
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch(max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  if (hex.length !== 6) return null;
  const n = parseInt(hex, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function rgbToCmyk(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const k = 1 - Math.max(r, g, b);
  if (k === 1) return [0, 0, 0, 100];
  return [
    Math.round((1-r-k)/(1-k)*100),
    Math.round((1-g-k)/(1-k)*100),
    Math.round((1-b-k)/(1-k)*100),
    Math.round(k*100)
  ];
}

function hslToHex(h, s, l) {
  const [r, g, b] = hslToRgb(h, s, l);
  return rgbToHex(r, g, b);
}

// ========== UI更新 ==========
function updateAll(h, s, l, a=1) {
  currentH = h; currentS = s; currentL = l; currentA = a;
  
  const [r, g, b] = hslToRgb(h, s, l);
  const hex = rgbToHex(r, g, b);
  
  // 预览
  document.getElementById('bigPreview').style.background = `hsla(${h},${s}%,${l}%,${a})`;
  
  // picker
  document.getElementById('colorPicker').value = hex;
  
  // 滑块
  document.getElementById('sliderH').value = h;
  document.getElementById('sliderS').value = s;
  document.getElementById('sliderL').value = l;
  document.getElementById('sliderA').value = Math.round(a * 100);
  document.getElementById('valH').textContent = h + '°';
  document.getElementById('valS').textContent = s + '%';
  document.getElementById('valL').textContent = l + '%';
  document.getElementById('valA').textContent = Math.round(a*100) + '%';
  
  // S滑块背景
  document.getElementById('sliderS').style.background =
    `linear-gradient(to right, hsl(${h},0%,${l}%), hsl(${h},100%,${l}%))`;
  // L滑块背景
  document.getElementById('sliderL').style.background =
    `linear-gradient(to right, hsl(${h},${s}%,0%), hsl(${h},${s}%,50%), hsl(${h},${s}%,100%))`;
  // A滑块背景
  document.getElementById('sliderA').style.background =
    `linear-gradient(to right, transparent, hsl(${h},${s}%,${l}%))`;
  
  // 颜色值输出
  document.getElementById('hexInput').value = hex;
  document.getElementById('rgbInput').value = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('rgbaInput').value = `rgba(${r}, ${g}, ${b}, ${a.toFixed(2)})`;
  document.getElementById('hslInput').value = `hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('hslaInput').value = `hsla(${h}, ${s}%, ${l}%, ${a.toFixed(2)})`;
  const [c, m, y, k] = rgbToCmyk(r, g, b);
  document.getElementById('cmykInput').value = `cmyk(${c}%, ${m}%, ${y}%, ${k}%)`;

  // 配色方案
  const activeSchemeTab = document.querySelector('.scheme-tab.active');
  if (activeSchemeTab) genScheme(activeSchemeTab.dataset.scheme || 'complementary', activeSchemeTab);
  
  // 渐变更新
  updateGradient();
}

function onPickerChange(val) {
  const rgb = hexToRgb(val);
  if (!rgb) return;
  const [h, s, l] = rgbToHsl(...rgb);
  updateAll(h, s, l, currentA);
  addHistory(val.toUpperCase());
}

function onHexInput(val) {
  val = val.trim();
  if (!val.startsWith('#')) val = '#' + val;
  const rgb = hexToRgb(val);
  if (!rgb) return;
  const [h, s, l] = rgbToHsl(...rgb);
  updateAll(h, s, l, currentA);
  addHistory(rgbToHex(...rgb));
}

function onHSLSlider() {
  const h = +document.getElementById('sliderH').value;
  const s = +document.getElementById('sliderS').value;
  const l = +document.getElementById('sliderL').value;
  updateAll(h, s, l, currentA);
}

function onAlphaSlider() {
  currentA = document.getElementById('sliderA').value / 100;
  updateAll(currentH, currentS, currentL, currentA);
}

// ========== 颜色历史 ==========
function addHistory(hex) {
  colorHistory = colorHistory.filter(c => c !== hex);
  colorHistory.unshift(hex);
  colorHistory = colorHistory.slice(0, 14);
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('colorHistory');
  el.innerHTML = colorHistory.map(c =>
    `<div class="history-dot" style="background:${c}" title="${c}" onclick="onHexInput('${c}')"></div>`
  ).join('');
}

// ========== 配色方案 ==========
function genScheme(type, btn) {
  document.querySelectorAll('.scheme-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.scheme = type;
  
  const h = currentH, s = currentS, l = currentL;
  let colors = [];
  
  switch(type) {
    case 'complementary':
      colors = [[h,s,l], [(h+180)%360,s,l]]; break;
    case 'analogous':
      colors = [[h,s,l], [(h+30)%360,s,l], [(h+60)%360,s,l], [(h+330)%360,s,l], [(h+300)%360,s,l]]; break;
    case 'triadic':
      colors = [[h,s,l], [(h+120)%360,s,l], [(h+240)%360,s,l]]; break;
    case 'tetradic':
      colors = [[h,s,l], [(h+90)%360,s,l], [(h+180)%360,s,l], [(h+270)%360,s,l]]; break;
    case 'splitComp':
      colors = [[h,s,l], [(h+150)%360,s,l], [(h+210)%360,s,l]]; break;
    case 'shades':
      colors = [10,25,40,55,70,85].map(light => [h, s, light]); break;
  }
  
  const grid = document.getElementById('schemeGrid');
  grid.innerHTML = colors.map(([ch, cs, cl]) => {
    const hex = hslToHex(ch, cs, cl);
    return `<div class="scheme-color" onclick="useSchemeColor('${hex}')">
      <div class="scheme-swatch" style="background:${hex}" title="${hex}"></div>
      <span class="scheme-hex">${hex}</span>
    </div>`;
  }).join('');
}

function useSchemeColor(hex) {
  onHexInput(hex);
  addHistory(hex.toUpperCase());
  showToast('已选择颜色 ' + hex);
}

// ========== 渐变生成器 ==========
function updateGradient() {
  const type = document.getElementById('gradientType').value;
  const dir = document.getElementById('gradientDir').value;
  const stops = [...document.querySelectorAll('#gradientStops .stop-color-input')];
  const colors = stops.map((c, i) => {
    const pct = Math.round(i / (stops.length - 1) * 100);
    return `${c.value} ${pct}%`;
  });
  
  let css = '';
  if (type === 'linear') css = `linear-gradient(${dir}, ${colors.join(', ')})`;
  else if (type === 'radial') css = `radial-gradient(circle, ${colors.join(', ')})`;
  else css = `conic-gradient(${colors.join(', ')})`;
  
  document.getElementById('gradientPreview').style.background = css;
  document.getElementById('gradientCode').textContent = `background: ${css};`;
}

function addStop() {
  const stops = document.getElementById('gradientStops');
  const div = document.createElement('div');
  div.className = 'stop-item';
  const count = stops.children.length;
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#845ec2'];
  div.innerHTML = `<input type="color" class="stop-color-input" value="${colors[count % colors.length]}" oninput="updateGradient()"><span class="stop-label">${count}</span><button onclick="this.parentElement.remove();updateGradient()" style="border:none;background:none;color:#94a3b8;cursor:pointer;font-size:1rem">✕</button>`;
  stops.appendChild(div);
  updateGradient();
}

function removeStop() {
  const stops = document.getElementById('gradientStops');
  if (stops.children.length > 2) stops.removeChild(stops.lastChild);
  updateGradient();
}

function randomGradient() {
  const stops = document.querySelectorAll('#gradientStops .stop-color-input');
  stops.forEach(s => {
    const h = Math.random() * 360;
    s.value = hslToHex(h, 70 + Math.random()*20, 50 + Math.random()*20);
  });
  updateGradient();
  showToast('已生成随机渐变 🎲');
}

function copyGradient() {
  const code = document.getElementById('gradientCode').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('已复制CSS代码 ✓'));
}

// ========== 复制功能 ==========
function copyHex() {
  const hex = document.getElementById('hexInput').value;
  navigator.clipboard.writeText(hex).then(() => showToast('已复制：' + hex));
}

function copyVal(id) {
  const val = document.getElementById(id).value;
  navigator.clipboard.writeText(val).then(() => showToast('已复制：' + val));
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #6366f1;color:#e2e8f0;padding:10px 24px;border-radius:30px;font-size:.9rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

addHistory('#6366F1');
genScheme('complementary', document.querySelector('.scheme-tab.active'));
document.querySelector('.scheme-tab.active').dataset.scheme = 'complementary';
