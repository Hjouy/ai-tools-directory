<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI图像超分辨率 - 低清变高清、细节增强</title>
    <meta name="description" content="免费在线AI图像超分辨率工具，支持低分辨率图片变高清、细节增强、锐化处理">
    <meta name="keywords" content="超分辨率,图片变高清,细节增强,图片锐化,AI放大">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 30px; }
        .left-panel { background: #f8f9fa; padding: 25px; border-radius: 15px; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 1.3em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; }
        .upload-area:hover { background: #f0f4ff; }
        .upload-area i { font-size: 3em; color: #667eea; margin-bottom: 15px; }
        .upload-area input { display: none; }
        .scale-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .scale-option { padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .scale-option:hover { border-color: #667eea; background: #f0f4ff; }
        .scale-option.active { border-color: #667eea; background: #667eea; color: white; }
        .scale-option i { font-size: 1.5em; margin-bottom: 8px; display: block; }
        .slider-group { margin-top: 20px; background: white; padding: 15px; border-radius: 12px; }
        .slider-group label { display: block; margin-bottom: 10px; color: #555; }
        .slider-group input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: #e0e0e0; outline: none; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .slider-value { text-align: right; color: #667eea; font-weight: 600; margin-top: 8px; }
        .canvas-area { background: #f0f4ff; border-radius: 15px; padding: 30px; min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .comparison-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .preview-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; flex: 1; min-width: 300px; }
        .preview-box h3 { color: #333; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f4ff; color: #667eea; }
        .btn-secondary:hover { background: #e0e8ff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-info { margin-top: 15px; padding: 12px; background: white; border-radius: 10px; font-size: 0.9em; color: #555; }
        .processing-indicator { display: none; text-align: center; padding: 20px; }
        .processing-indicator.show { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-expand"></i> AI图像超分辨率</h1>
            <p>低清变高清 · 细节增强 · 智能锐化</p>
        </div>
        <div class="main-content">
            <div class="left-panel">
                <div class="section-title"><i class="fas fa-upload"></i> 上传图片</div>
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传图片</p>
                    <p style="font-size: 0.85em;">支持 JPG、PNG 格式，最大 10MB</p>
                    <input type="file" id="imageInput" accept="image/jpeg,image/png">
                </div>
                <div id="fileInfo" class="file-info" style="display: none;"></div>
                <div class="section-title" style="margin-top: 25px;"><i class="fas fa-expand"></i> 放大倍数</div>
                <div class="scale-options">
                    <div class="scale-option active" data-scale="2"><i class="fas fa-expand"></i>2x</div>
                    <div class="scale-option" data-scale="3"><i class="fas fa-expand"></i>3x</div>
                    <div class="scale-option" data-scale="4"><i class="fas fa-expand"></i>4x</div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-adjust"></i> 锐化强度</label>
                    <input type="range" id="sharpen" min="0" max="100" value="50">
                    <div class="slider-value" id="sharpenValue">50%</div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-magic"></i> 细节增强</label>
                    <input type="range" id="detail" min="0" max="100" value="50">
                    <div class="slider-value" id="detailValue">50%</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="canvas-area" id="canvasArea">
                    <div style="text-align: center; color: #666;">
                        <i class="fas fa-image" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                        <p>上传图片后，这里将显示对比效果</p>
                    </div>
                </div>
                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p>AI正在处理中，请稍候...</p>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled><i class="fas fa-magic"></i> 开始处理</button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled><i class="fas fa-download"></i> 下载高清图</button>
                    <button class="btn btn-secondary" onclick="resetAll()"><i class="fas fa-redo"></i> 重置</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let originalImage = null;
        let currentScale = 2;
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.background = 'white');
        uploadArea.addEventListener('drop', e => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        function handleFileUpload(e) { const file = e.target.files[0]; if (file) handleFile(file); }
        function handleFile(file) {
            const validTypes = ['image/jpeg', 'image/png'];
            if (!validTypes.includes(file.type)) { alert('请上传 JPG 或 PNG 格式的图片'); return; }
            if (file.size > 10 * 1024 * 1024) { alert('文件大小不能超过 10MB'); return; }
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    displayOriginal(img);
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('fileInfo').innerHTML = `文件: ${file.name}<br>尺寸: ${img.width}×${img.height}<br>大小: ${(file.size / 1024).toFixed(2)} KB`;
                    document.getElementById('processBtn').disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function displayOriginal(img) {
            const canvasArea = document.getElementById('canvasArea');
            canvasArea.innerHTML = `
                <div class="comparison-container">
                    <div class="preview-box"><h3><i class="fas fa-image"></i> 原图</h3><canvas id="originalCanvas"></canvas></div>
                    <div class="preview-box" id="processedBox" style="display: none;"><h3><i class="fas fa-expand"></i> 高清图</h3><canvas id="processedCanvas"></canvas></div>
                </div>`;
            const canvas = document.getElementById('originalCanvas');
            const maxSize = 400;
            let width = img.width, height = img.height;
            if (width > maxSize || height > maxSize) { const ratio = Math.min(maxSize / width, maxSize / height); width *= ratio; height *= ratio; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        }
        document.querySelectorAll('.scale-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.scale-option').forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                currentScale = parseInt(option.dataset.scale);
            });
        });
        ['sharpen', 'detail'].forEach(param => {
            const slider = document.getElementById(param);
            const value = document.getElementById(param + 'Value');
            slider.addEventListener('input', e => value.textContent = e.target.value + '%');
        });
        function processImage() {
            if (!originalImage) { alert('请先上传图片'); return; }
            const sharpen = parseInt(document.getElementById('sharpen').value) / 100;
            const detail = parseInt(document.getElementById('detail').value) / 100;
            document.getElementById('processingIndicator').classList.add('show');
            document.getElementById('processBtn').disabled = true;
            setTimeout(() => {
                document.getElementById('processedBox').style.display = 'block';
                const originalCanvas = document.getElementById('originalCanvas');
                const processedCanvas = document.getElementById('processedCanvas');
                const ctx = processedCanvas.getContext('2d');
                const newWidth = originalImage.width * currentScale;
                const newHeight = originalImage.height * currentScale;
                processedCanvas.width = newWidth;
                processedCanvas.height = newHeight;
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(originalImage, 0, 0, newWidth, newHeight);
                let imageData = ctx.getImageData(0, 0, newWidth, newHeight);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const contrast = 1 + detail * 0.5;
                    data[i] = Math.min(255, Math.max(0, (data[i] - 128) * contrast + 128));
                    data[i + 1] = Math.min(255, Math.max(0, (data[i + 1] - 128) * contrast + 128));
                    data[i + 2] = Math.min(255, Math.max(0, (data[i + 2] - 128) * contrast + 128));
                }
                applySharpen(imageData, newWidth, newHeight, sharpen);
                ctx.putImageData(imageData, 0, 0);
                document.getElementById('processingIndicator').classList.remove('show');
                document.getElementById('processBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
            }, 1500);
        }
        function applySharpen(imageData, width, height, intensity) {
            const data = imageData.data;
            const temp = new Uint8ClampedArray(data);
            const kernel = [0, -intensity, 0, -intensity, 1 + 4 * intensity, -intensity, 0, -intensity, 0];
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = (y * width + x) * 4;
                    for (let c = 0; c < 3; c++) {
                        let sum = 0, ki = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                sum += temp[((y + dy) * width + (x + dx)) * 4 + c] * kernel[ki++];
                            }
                        }
                        data[idx + c] = Math.min(255, Math.max(0, sum));
                    }
                }
            }
        }
        function downloadImage() {
            const canvas = document.getElementById('processedCanvas');
            if (!canvas) { alert('请先处理图片'); return; }
            const link = document.createElement('a');
            link.download = '高清图_' + currentScale + 'x_' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        function resetAll() {
            originalImage = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = '<div style="text-align: center; color: #666;"><i class="fas fa-image" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i><p>上传图片后，这里将显示对比效果</p></div>';
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('sharpen').value = 50;
            document.getElementById('sharpenValue').textContent = '50%';
            document.getElementById('detail').value = 50;
            document.getElementById('detailValue').textContent = '50%';
        }
    </script>
</body>
</html>
