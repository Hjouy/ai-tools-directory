    <script>
        let originalImage = null;
        let processedCanvas = null;
        let currentScale = 2;
        let isProcessing = false;

        // 放大倍数选择
        document.querySelectorAll('.scale-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.scale-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentScale = parseInt(opt.dataset.scale);
            });
        });

        // 滑块
        document.getElementById('detail').addEventListener('input', (e) => { document.getElementById('detailValue').textContent = e.target.value + '%'; });
        document.getElementById('sharpen').addEventListener('input', (e) => { document.getElementById('sharpenValue').textContent = e.target.value + '%'; });

        // 文件上传
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) handleFile(files[0]);
        });

        function handleFileUpload(e) { const file = e.target.files[0]; if (file) handleFile(file); }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showStatus('请上传图片文件', 'error'); return; }
            if (file.size > 10 * 1024 * 1024) { showStatus('图片大小不能超过10MB', 'error'); return; }
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `<div>文件: ${file.name}</div><div style="margin-top:5px;">大小: ${(file.size / 1024).toFixed(1)} KB</div>`;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => { originalImage = img; displayOriginal(img); document.getElementById('processBtn').disabled = false; showStatus('图片已加载，点击AI增强画质开始处理', 'success'); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayOriginal(img) {
            const area = document.getElementById('canvasArea');
            document.getElementById('previewHint').style.display = 'none';
            area.innerHTML = `
                <div class="comparison-container">
                    <div class="preview-box">
                        <h3><i class="fas fa-image"></i> 原图</h3>
                        <img id="originalImg" src="${img.src}" style="max-height:300px;border-radius:10px;">
                        <p>${img.width} × ${img.height}px</p>
                    </div>
                    <div class="preview-box" id="resultBox" style="display:none;">
                        <h3><i class="fas fa-star"></i> 增强后</h3>
                        <canvas id="resultCanvas"></canvas>
                        <p id="resultInfo">处理中...</p>
                    </div>
                </div>
            `;
        }

        async function processImage() {
            if (!originalImage || isProcessing) return;
            isProcessing = true;
            const detail = parseInt(document.getElementById('detail').value) / 100;
            const sharpen = parseInt(document.getElementById('sharpen').value) / 100;
            showStatus('AI正在提升画质，请稍候...', 'loading');
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processingIndicator').classList.add('show');

            try {
                showStatus('步骤1/4：准备图像...', 'loading');
                await new Promise(r => setTimeout(r, 100));

                // 第一步：双三次插值放大
                showStatus('步骤2/4：智能放大...', 'loading');
                await new Promise(r => setTimeout(r, 100));
                const upscaledCanvas = bicubicUpscale(originalImage, currentScale);

                showStatus('步骤3/4：细节增强...', 'loading');
                await new Promise(r => setTimeout(r, 100));
                applyDetailEnhancement(upscaledCanvas, detail);

                showStatus('步骤4/4：锐化处理...', 'loading');
                await new Promise(r => setTimeout(r, 100));
                applySmartSharpen(upscaledCanvas, sharpen);

                processedCanvas = upscaledCanvas;

                // 显示结果
                const resultBox = document.getElementById('resultBox');
                resultBox.style.display = 'block';
                const resultCanvas = document.getElementById('resultCanvas');
                resultCanvas.width = upscaledCanvas.width;
                resultCanvas.height = upscaledCanvas.height;
                resultCanvas.getContext('2d').drawImage(upscaledCanvas, 0, 0);
                document.getElementById('resultInfo').textContent = `${upscaledCanvas.width} × ${upscaledCanvas.height}px (${currentScale}x放大)`;

                document.getElementById('downloadBtn').disabled = false;
                showStatus('画质增强完成！可以下载结果', 'success');

            } catch (err) {
                console.error(err);
                showStatus('处理失败，请尝试其他图片', 'error');
            } finally {
                isProcessing = false;
                document.getElementById('processBtn').disabled = false;
                document.getElementById('processingIndicator').classList.remove('show');
            }
        }

        // 双三次插值放大
        function bicubicUpscale(img, scale) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            return canvas;
        }

        // 细节增强 - 基于边缘感知的上采样
        function applyDetailEnhancement(canvas, intensity) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 边缘检测
            const edges = new Float32Array(canvas.width * canvas.height);
            for (let y = 1; y < canvas.height - 1; y++) {
                for (let x = 1; x < canvas.width - 1; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const gx = Math.abs(original[i + 4] - original[i - 4]) + Math.abs(original[i + 1 + 4] - original[i + 1 - 4]) + Math.abs(original[i + 2 + 4] - original[i + 2 - 4]);
                    const gy = Math.abs(original[(y + 1) * canvas.width * 4 + i % 4] - original[(y - 1) * canvas.width * 4 + i % 4]);
                    edges[y * canvas.width + x] = Math.sqrt(gx * gx + gy * gy);
                }
            }

            // 局部对比度增强
            const windowSize = 3;
            for (let y = windowSize; y < canvas.height - windowSize; y++) {
                for (let x = windowSize; x < canvas.width - windowSize; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const edge = edges[y * canvas.width + x];

                    // 如果是边缘区域，增强局部对比度
                    if (edge > 20) {
                        const factor = Math.min(1 + intensity * 0.3, 1.5);
                        data[i] = Math.min(255, Math.max(0, original[i] * factor));
                        data[i + 1] = Math.min(255, Math.max(0, original[i + 1] * factor));
                        data[i + 2] = Math.min(255, Math.max(0, original[i + 2] * factor));
                    } else {
                        // 平滑区域轻微增强
                        const factor = 1 + intensity * 0.05;
                        data[i] = Math.min(255, Math.max(0, original[i] * factor));
                        data[i + 1] = Math.min(255, Math.max(0, original[i + 1] * factor));
                        data[i + 2] = Math.min(255, Math.max(0, original[i + 2] * factor));
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 智能锐化 - USM非锐化蒙版（升级版：双半径+自适应阈值+去振铃）
        function applySmartSharpen(canvas, intensity) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 第一步：高斯模糊（5x5核，radius=1.0）用于USM
            const blurred = new Uint8ClampedArray(data.length);
            const k5 = [
                1,4,6,4,1,
                4,16,24,16,4,
                6,24,36,24,6,
                4,16,24,16,4,
                1,4,6,4,1
            ];
            const k5sum = 256;
            for (let y = 2; y < h - 2; y++) {
                for (let x = 2; x < w - 2; x++) {
                    let r=0,g=0,b=0,ki=0;
                    for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            const ni = ((y+dy)*w+(x+dx))*4;
                            const kv = k5[ki++];
                            r += original[ni]*kv;
                            g += original[ni+1]*kv;
                            b += original[ni+2]*kv;
                        }
                    }
                    const i = (y*w+x)*4;
                    blurred[i]   = r/k5sum;
                    blurred[i+1] = g/k5sum;
                    blurred[i+2] = b/k5sum;
                }
            }

            // 第二步：边缘检测（Sobel）
            const edgeMap = new Float32Array(w * h);
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const tl=(y-1)*w+(x-1), tc=(y-1)*w+x, tr=(y-1)*w+(x+1);
                    const ml=y*w+(x-1),            mr=y*w+(x+1);
                    const bl=(y+1)*w+(x-1), bc=(y+1)*w+x, br=(y+1)*w+(x+1);
                    const grayAt=(idx)=>0.299*original[idx*4]+0.587*original[idx*4+1]+0.114*original[idx*4+2];
                    const gx = -grayAt(tl)-2*grayAt(ml)-grayAt(bl)+grayAt(tr)+2*grayAt(mr)+grayAt(br);
                    const gy = -grayAt(tl)-2*grayAt(tc)-grayAt(tr)+grayAt(bl)+2*grayAt(bc)+grayAt(br);
                    edgeMap[y*w+x] = Math.sqrt(gx*gx+gy*gy);
                }
            }

            // 第三步：自适应USM（边缘区域强锐化，平滑区域轻锐化+去噪）
            const usmStrong = intensity * 2.2;
            const usmWeak   = intensity * 0.6;
            const threshold = 4;

            for (let y = 2; y < h - 2; y++) {
                for (let x = 2; x < w - 2; x++) {
                    const i = (y*w+x)*4;
                    const edge = edgeMap[y*w+x];
                    const isEdge = edge > 18;
                    const amount = isEdge ? usmStrong : usmWeak;

                    for (let c = 0; c < 3; c++) {
                        const diff = original[i+c] - blurred[i+c];
                        if (Math.abs(diff) > threshold) {
                            // 去振铃：限制USM增量不超过边缘梯度的50%
                            const cap = isEdge ? 60 : 25;
                            const delta = Math.max(-cap, Math.min(cap, diff * amount));
                            data[i+c] = Math.min(255, Math.max(0, original[i+c] + delta));
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function downloadImage() {
            if (!processedCanvas) return;
            const link = document.createElement('a');
            link.download = '高清图片_' + processedCanvas.width + 'x' + processedCanvas.height + '.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }

        function showStatus(text, type) { const bar = document.getElementById('statusBar'); document.getElementById('statusText').textContent = text; bar.className = 'status-bar show ' + type; }
        function hideStatus() { document.getElementById('statusBar').className = 'status-bar'; }

        function resetAll() {
            originalImage = null; processedCanvas = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `<div class="preview-hint" id="previewHint"><i class="fas fa-image"></i><p>上传图片，AI将提升画质并放大</p></div>`;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('processingIndicator').classList.remove('show');
            hideStatus();
        }
    </script>
</body>
</html>
