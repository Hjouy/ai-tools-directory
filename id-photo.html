<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证件照换底色 - AI智能抠图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 25px; font-size: 14px; }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .upload-area:hover { background: #f0f4ff; border-color: #764ba2; }
        .upload-area.dragover { background: #e8ecff; border-color: #4a56d6; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 60px; margin-bottom: 15px; }
        .upload-text { color: #666; font-size: 15px; }
        .upload-hint { color: #999; font-size: 12px; margin-top: 8px; }
        
        .preview-section { display: none; margin-top: 25px; }
        .preview-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .preview-box { flex: 1; min-width: 200px; max-width: 280px; }
        .preview-box h3 { text-align: center; color: #555; font-size: 14px; margin-bottom: 10px; }
        .preview-box canvas, .preview-box img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .controls { margin-top: 25px; }
        
        .control-group { margin-bottom: 20px; }
        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #444;
        }
        
        .color-options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .color-btn::after {
            content: attr(data-label);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #888;
            white-space: nowrap;
        }
        .color-btn:hover, .color-btn.active {
            transform: scale(1.15);
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .size-options { display: flex; gap: 10px; flex-wrap: wrap; }
        .size-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .size-btn:hover { border-color: #667eea; }
        .size-btn.active { background: #667eea; color: white; border-color: #667eea; }
        
        .quality-options { display: flex; gap: 10px; margin-top: 15px; }
        .quality-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-align: center;
        }
        .quality-btn:hover { border-color: #667eea; }
        .quality-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: transparent; }
        .quality-btn small { display: block; font-size: 10px; opacity: 0.8; margin-top: 3px; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }
        
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status.processing { background: #fff3cd; color: #856404; display: block; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .debug-info.visible { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>证件照换底色</h1>
        <p class="subtitle">AI智能抠图 · 完美边缘处理</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击上传或拖拽照片</div>
            <div class="upload-hint">支持 JPG、PNG 格式，建议使用清晰正面照</div>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        
        <div class="preview-section" id="previewSection">
            <div class="preview-row">
                <div class="preview-box">
                    <h3>原图</h3>
                    <canvas id="originalCanvas"></canvas>
                </div>
                <div class="preview-box">
                    <h3>换底结果</h3>
                    <canvas id="resultCanvas"></canvas>
                </div>
            </div>
        </div>
        
        <div class="controls" id="controls" style="display:none;">
            <div class="control-group">
                <label>选择底色</label>
                <div class="color-options">
                    <button class="color-btn active" data-color="#FFFFFF" data-label="白色" style="background:#fff;border:2px solid #ddd;"></button>
                    <button class="color-btn" data-color="#1E90FF" data-label="蓝色" style="background:#1E90FF;"></button>
                    <button class="color-btn" data-color="#FF6B6B" data-label="红色" style="background:#FF6B6B;"></button>
                    <button class="color-btn" data-color="#32CD32" data-label="绿色" style="background:#32CD32;"></button>
                    <button class="color-btn" data-color="#333333" data-label="渐变蓝" style="background:linear-gradient(135deg,#1a4f7a,#2e7ebd);"></button>
                </div>
            </div>
            
            <div class="control-group">
                <label>证件照尺寸</label>
                <div class="size-options">
                    <button class="size-btn" data-w="295" data-h="413">一寸 (295×413)</button>
                    <button class="size-btn active" data-w="413" data-h="531">二寸 (413×531)</button>
                    <button class="size-btn" data-w="450" data-h="600">驾照 (450×600)</button>
                    <button class="size-btn" data-w="600" data-h="800">签证 (600×800)</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>处理模式</label>
                <div class="quality-options">
                    <button class="quality-btn" data-mode="fast">
                        快速模式
                        <small>即时处理</small>
                    </button>
                    <button class="quality-btn active" data-mode="standard">
                        标准模式
                        <small>精细边缘</small>
                    </button>
                    <button class="quality-btn" data-mode="hd">
                        高清模式
                        <small>最佳效果</small>
                    </button>
                </div>
            </div>
            
            <div class="btn-row">
                <button class="btn btn-secondary" id="resetBtn">重新上传</button>
                <button class="btn btn-primary" id="processBtn">AI换底色</button>
                <button class="btn btn-primary" id="downloadBtn" disabled>下载证件照</button>
            </div>
        </div>
        
        <div class="status" id="status"></div>
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/selfie_segmentation.js" crossorigin="anonymous"></script>
    
    <script>
        // ========== 全局变量 ==========
        let originalImage = null;
        let currentBgColor = '#FFFFFF';
        let currentWidth = 413;
        let currentHeight = 531;
        let currentMode = 'standard';
        let segmenter = null;
        let isProcessing = false;
        
        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewSection = document.getElementById('previewSection');
        const originalCanvas = document.getElementById('originalCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const controls = document.getElementById('controls');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const status = document.getElementById('status');
        const debugInfo = document.getElementById('debugInfo');
        
        // ========== 工具函数 ==========
        function log(msg) {
            console.log('[DEBUG]', msg);
            debugInfo.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
            debugInfo.classList.add('visible');
        }
        
        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status ' + type;
        }
        
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }
        
        // ========== 上传处理 ==========
        uploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type.startsWith('image/')) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        function handleFile(file) {
            debugInfo.textContent = '';
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    drawImageToCanvas(originalCanvas, img);
                    previewSection.style.display = 'block';
                    controls.style.display = 'block';
                    downloadBtn.disabled = true;
                    resultCanvas.getContext('2d').clearRect(0, 0, resultCanvas.width, resultCanvas.height);
                    log('图片加载: ' + img.width + 'x' + img.height);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function drawImageToCanvas(canvas, img) {
            const maxW = 280;
            const scale = Math.min(1, maxW / img.width);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        }
        
        // ========== 颜色选择 ==========
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentBgColor = btn.dataset.color;
                log('选择颜色: ' + currentBgColor);
            });
        });
        
        // ========== 尺寸选择 ==========
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentWidth = parseInt(btn.dataset.w);
                currentHeight = parseInt(btn.dataset.h);
                log('选择尺寸: ' + currentWidth + 'x' + currentHeight);
            });
        });
        
        // ========== 模式选择 ==========
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                log('选择模式: ' + currentMode);
            });
        });
        
        // ========== 按钮事件 ==========
        resetBtn.addEventListener('click', () => {
            originalImage = null;
            previewSection.style.display = 'none';
            controls.style.display = 'none';
            imageInput.value = '';
            debugInfo.textContent = '';
        });
        
        processBtn.addEventListener('click', processImage);
        
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = '证件照_' + currentWidth + 'x' + currentHeight + '.png';
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
            log('下载完成');
        });
        
        // ========== AI处理核心 ==========
        async function initSegmenter() {
            if (segmenter) return true;
            
            log('初始化AI模型...');
            try {
                segmenter = await SelfieSegmentation.create({
                    locateFile: (file) => {
                        return 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/' + file;
                    }
                });
                
                segmenter.setOptions({
                    modelType: 'general',
                    selfieMode: false
                });
                
                log('AI模型初始化成功');
                return true;
            } catch (err) {
                log('AI模型初始化失败: ' + err.message);
                return false;
            }
        }
        
        async function processImage() {
            if (!originalImage || isProcessing) return;
            
            isProcessing = true;
            processBtn.disabled = true;
            downloadBtn.disabled = true;
            showStatus('准备中...', 'processing');
            
            try {
                // 初始化分割器
                const ready = await initSegmenter();
                if (!ready) throw new Error('AI模型初始化失败');
                
                const w = originalImage.width;
                const h = originalImage.height;
                
                log('处理尺寸: ' + w + 'x' + h);
                showStatus('AI分析中...', 'processing');
                
                // 创建工作画布
                const workCanvas = document.createElement('canvas');
                workCanvas.width = w;
                workCanvas.height = h;
                const workCtx = workCanvas.getContext('2d');
                workCtx.drawImage(originalImage, 0, 0);
                
                // 执行分割
                log('开始AI分割...');
                const result = await segmenter.segment(workCanvas, { selfieMode: false });
                
                // 解析分割结果
                let mask = extractMask(result, w, h);
                
                // 根据模式处理mask
                if (currentMode === 'hd') {
                    mask = applyMorphologicalClose(mask, w, h, 2);
                } else if (currentMode === 'standard') {
                    mask = applyMorphologicalClose(mask, w, h, 1);
                }
                
                showStatus('合成证件照...', 'processing');
                
                // 合成最终图像
                const finalCanvas = compositeImage(workCtx, mask, w, h);
                
                // 绘制目标尺寸
                const outputCanvas = document.createElement('canvas');
                outputCanvas.width = currentWidth;
                outputCanvas.height = currentHeight;
                const ctx = outputCanvas.getContext('2d');
                
                // 填充背景色
                ctx.fillStyle = currentBgColor;
                ctx.fillRect(0, 0, currentWidth, currentHeight);
                
                // 居中绘制
                const srcRatio = finalCanvas.width / finalCanvas.height;
                const dstRatio = currentWidth / currentHeight;
                
                let sx, sy, sw, sh;
                if (srcRatio > dstRatio) {
                    sh = finalCanvas.height;
                    sw = sh * dstRatio;
                    sx = (finalCanvas.width - sw) / 2;
                    sy = 0;
                } else {
                    sw = finalCanvas.width;
                    sh = sw / dstRatio;
                    sx = 0;
                    sy = (finalCanvas.height - sh) / 2;
                }
                
                ctx.drawImage(finalCanvas, sx, sy, sw, sh, 0, 0, currentWidth, currentHeight);
                
                // 显示结果
                const displayScale = Math.min(1, 280 / currentWidth);
                resultCanvas.width = currentWidth * displayScale;
                resultCanvas.height = currentHeight * displayScale;
                resultCanvas.getContext('2d').drawImage(outputCanvas, 0, 0, resultCanvas.width, resultCanvas.height);
                
                // 保存原尺寸用于下载
                resultCanvas.fullCanvas = outputCanvas;
                
                downloadBtn.disabled = false;
                showStatus('换底成功！点击下载保存证件照', 'success');
                log('处理完成!');
                
            } catch (err) {
                log('错误: ' + err.message);
                showStatus('处理失败: ' + err.message, 'error');
            } finally {
                isProcessing = false;
                processBtn.disabled = false;
            }
        }
        
        function extractMask(result, w, h) {
            const mask = new Float32Array(w * h);
            const es = w * h;
            
            if (!result || !result.data || !result.data.length) {
                log('分割结果为空，使用备用算法');
                return fallbackSegmentation(workCtx, w, h);
            }
            
            const dl = result.data.length;
            
            if (dl === es) {
                // 单通道数据
                for (let i = 0; i < es; i++) {
                    const v = result.data[i];
                    mask[i] = (v > 1) ? v / 255 : Math.max(0, Math.min(1, v));
                }
                log('Mask格式: 单通道, max=' + getMaskMax(mask, es).toFixed(3));
            } else if (dl === es * 4) {
                // RGBA数据
                for (let i = 0; i < es; i++) {
                    mask[i] = result.data[i * 4] / 255;
                }
                log('Mask格式: RGBA, max=' + getMaskMax(mask, es).toFixed(3));
            } else {
                log('Mask格式: 未知长度 ' + dl + ', 尝试RGBA');
                for (let i = 0; i < es && i * 4 < dl; i++) {
                    mask[i] = result.data[i * 4] / 255;
                }
            }
            
            return mask;
        }
        
        function getMaskMax(mask, len) {
            let mx = 0;
            for (let i = 0; i < len; i++) if (mask[i] > mx) mx = mask[i];
            return mx;
        }
        
        function compositeImage(ctx, mask, w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const outCtx = canvas.getContext('2d');
            
            const imageData = ctx.getImageData(0, 0, w, h);
            const pixels = imageData.data;
            
            const targetColor = hexToRgb(currentBgColor);
            
            for (let i = 0; i < w * h; i++) {
                const idx = i * 4;
                const m = mask[i];
                
                // 边缘羽化
                const edgeStart = 0.2;
                const edgeEnd = 0.8;
                let blend = 0;
                
                if (m < edgeStart) {
                    blend = 0;
                } else if (m < edgeEnd) {
                    const t = (m - edgeStart) / (edgeEnd - edgeStart);
                    blend = t * t * (3 - 2 * t); // smoothstep
                } else {
                    blend = 1;
                }
                
                pixels[idx] = Math.round(pixels[idx] * blend + targetColor.r * (1 - blend));
                pixels[idx + 1] = Math.round(pixels[idx + 1] * blend + targetColor.g * (1 - blend));
                pixels[idx + 2] = Math.round(pixels[idx + 2] * blend + targetColor.b * (1 - blend));
            }
            
            outCtx.putImageData(imageData, 0, 0);
            return canvas;
        }
        
        // ========== 备用分割算法 ==========
        function fallbackSegmentation(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const mask = new Float32Array(w * h);
            
            // 采样四个角作为背景色
            const corners = [
                getAvgColor(data, 0, 0, Math.min(20, w, h), h),
                getAvgColor(data, w - 20, 0, 20, h),
                getAvgColor(data, 0, h - 20, w, 20),
                getAvgColor(data, w - 20, h - 20, 20, 20)
            ];
            
            const bgR = corners.reduce((s, c) => s + c.r, 0) / 4;
            const bgG = corners.reduce((s, c) => s + c.g, 0) / 4;
            const bgB = corners.reduce((s, c) => s + c.b, 0) / 4;
            
            log('备用算法背景色: RGB(' + Math.round(bgR) + ',' + Math.round(bgG) + ',' + Math.round(bgB) + ')');
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = y * w + x;
                    const idx = i * 4;
                    
                    const dr = data[idx] - bgR;
                    const dg = data[idx + 1] - bgG;
                    const db = data[idx + 2] - bgB;
                    const diff = Math.sqrt(dr * dr + dg * dg + db * db);
                    
                    const edgeDist = Math.min(x, y, w - x, h - y);
                    const threshold = edgeDist < 30 ? 35 : 50;
                    
                    mask[i] = diff < threshold ? diff / threshold : 1;
                }
            }
            
            return mask;
        }
        
        function getAvgColor(data, startX, startY, sampleW, sampleH) {
            let r = 0, g = 0, b = 0, count = 0;
            for (let y = startY; y < Math.min(startY + sampleH, data.length / 4 / sampleW); y++) {
                for (let x = startX; x < Math.min(startX + sampleW, sampleW); x++) {
                    const i = (y * sampleW + x) * 4;
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                    count++;
                }
            }
            return count > 0 ? { r: r / count, g: g / count, b: b / count } : { r: 0, g: 0, b: 0 };
        }
        
        // ========== 形态学处理 ==========
        function applyMorphologicalClose(mask, w, h, radius) {
            const result = new Float32Array(mask);
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let maxVal = 0;
                    for (let dy = -radius; dy <= radius; dy++) {
                        for (let dx = -radius; dx <= radius; dx++) {
                            const nx = x + dx;
                            const ny = y + dy;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                if (mask[ny * w + nx] > maxVal) maxVal = mask[ny * w + nx];
                            }
                        }
                    }
                    result[y * w + x] = maxVal;
                }
            }
            
            return result;
        }
    </script>
</body>
</html>
