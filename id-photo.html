<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证件照换底色 - AI智能抠图、一键换白底蓝底红底</title>
    <meta name="description" content="免费在线证件照换底色工具，AI智能识别主体、一键换白底/蓝底/红底，支持美颜优化、多种证件照尺寸导出">
    <meta name="keywords" content="证件照换底色,抠图,AI抠图,换背景,证件照制作">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            padding: 24px;
        }
        .left-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
        }
        .section-title {
            font-size: 1em;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;

            gap: 8px;

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;

            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        .upload-area i { font-size: 2.5em; color: #667eea; margin-bottom: 10px; display: block; }
        .upload-area p { color: #666; font-size: 0.9em; }
        .upload-area input { display: none; }
        .file-info {
            margin-top: 10px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            font-size: 0.85em;
            color: #555;
            display: none;
        }
        .size-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .size-option {
            padding: 10px 6px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 0.85em;
        }
        .size-option:hover { border-color: #667eea; background: #f0f4ff; }
        .size-option.active { border-color: #667eea; background: #667eea; color: white; }
        .size-name { font-weight: 600; }
        .size-dim { font-size: 0.8em; opacity: 0.8; }
        .bg-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .bg-option {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid #e0e0e0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .bg-option:hover { transform: scale(1.1); }
        .bg-option.active { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.3); }
        .bg-white { background: #ffffff; }
        .bg-blue { background: #2196F3; }
        .bg-red { background: #E53935; }
        .bg-option span { font-size: 0.7em; color: #666; }
        .beauty-section { margin-top: 15px; }
        .slider-group { margin-bottom: 12px; }
        .slider-group label { display: block; font-size: 0.85em; color: #555; margin-bottom: 4px; }
        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        .slider-value { text-align: right; color: #667eea; font-size: 0.8em; font-weight: 600; }
        .canvas-area {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 20px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .preview-hint { text-align: center; color: #888; font-size: 0.9em; }
        #mainCanvas {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f4ff; color: #667eea; }
        .btn-secondary:hover { background: #e0e8ff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .status-bar {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 0.85em;
            color: #2e7d32;
            display: none;
        }
        .status-bar.processing { background: #e3f2fd; border-color: #90caf9; color: #1565c0; display: block; }
        .status-bar.success { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; display: block; }
        .status-bar.error { background: #ffebee; border-color: #ef9a9a; color: #c62828; display: block; }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5em; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-check"></i> 证件照换底色</h1>
            <p>AI智能抠图 · 一键换底色 · 多种尺寸导出</p>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="section-title"><i class="fas fa-upload"></i> 上传照片</div>
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传照片</p>
                    <p style="font-size: 0.8em; margin-top: 5px; color: #999;">支持 JPG、PNG，建议正面照</p>
                    <input type="file" id="imageInput" accept="image/jpeg,image/png">
                </div>
                <div id="fileInfo" class="file-info"></div>

                <div class="section-title" style="margin-top: 20px;"><i class="fas fa-crop"></i> 证件尺寸</div>
                <div class="size-options">
                    <div class="size-option active" data-width="295" data-height="413">
                        <div class="size-name">一寸</div>
                        <div class="size-dim">295×413px</div>
                    </div>
                    <div class="size-option" data-width="413" data-height="626">
                        <div class="size-name">二寸</div>
                        <div class="size-dim">413×626px</div>
                    </div>
                    <div class="size-option" data-width="390" data-height="567">
                        <div class="size-name">小一寸</div>
                        <div class="size-dim">390×567px</div>
                    </div>
                    <div class="size-option" data-width="413" data-height="531">
                        <div class="size-name">小二寸</div>
                        <div class="size-dim">413×531px</div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 20px;"><i class="fas fa-palette"></i> 底色选择</div>
                <div class="bg-options">
                    <div class="bg-option bg-white active" data-color="#FFFFFF" title="白底"></div>
                    <div class="bg-option bg-blue" data-color="#2196F3" title="蓝底"></div>
                    <div class="bg-option bg-red" data-color="#E53935" title="红底"></div>
                </div>

                <div class="section-title" style="margin-top: 20px;"><i class="fas fa-magic"></i> 美颜优化</div>
                <div class="beauty-section">
                    <div class="slider-group">
                        <label>亮度</label>
                        <input type="range" id="brightness" min="-50" max="50" value="0">
                        <div class="slider-value" id="brightnessVal">0</div>
                    </div>
                    <div class="slider-group">
                        <label>对比度</label>
                        <input type="range" id="contrast" min="-50" max="50" value="0">
                        <div class="slider-value" id="contrastVal">0</div>
                    </div>
                    <div class="slider-group">
                        <label>磨皮</label>
                        <input type="range" id="smooth" min="0" max="50" value="0">
                        <div class="slider-value" id="smoothVal">0</div>
                    </div>
                    <div class="slider-group">
                        <label>美白</label>
                        <input type="range" id="whitening" min="0" max="50" value="0">
                        <div class="slider-value" id="whiteningVal">0</div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div id="statusBar" class="status-bar"></div>
                
                <div class="canvas-area" id="canvasArea">
                    <div class="preview-hint">
                        <i class="fas fa-id-card" style="font-size: 3em; color: #ddd; margin-bottom: 15px; display: block;"></i>
                        <p>上传照片后，AI自动识别主体并换底色</p>
                        <p style="font-size: 0.8em; color: #bbb; margin-top: 5px;">支持各种背景颜色，智能识别主体</p>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled>
                        <i class="fas fa-magic"></i> AI换底色
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled>
                        <i class="fas fa-download"></i> 下载证件照
                    </button>
                    <button class="btn btn-secondary" onclick="resetAll()">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let processedCanvas = null;
        let currentBgColor = '#FFFFFF';
        let currentSize = { width: 295, height: 413 };
        let isProcessing = false;

        // 文件上传
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        
        // 拖拽上传
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) handleFile(files[0]);
        });

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('请上传图片文件', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showStatus('图片大小不能超过10MB', 'error');
                return;
            }

            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    displayPreview(img);
                    document.getElementById('processBtn').disabled = false;
                    showStatus('照片已加载，点击「AI换底色」开始处理', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayPreview(img) {
            const area = document.getElementById('canvasArea');
            area.innerHTML = `
                <div style="position:relative;">
                    <canvas id="mainCanvas"></canvas>
                    <p style="text-align:center;font-size:0.8em;color:#888;margin-top:10px;">原图预览</p>
                </div>
            `;
            
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            // 预览时自适应显示尺寸
            const maxW = Math.min(400, area.clientWidth - 40);
            const scale = maxW / img.width;
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (img.height * scale) + 'px';
            
            ctx.drawImage(img, 0, 0);
        }

        // 尺寸选择
        document.querySelectorAll('.size-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentSize = {
                    width: parseInt(opt.dataset.width),
                    height: parseInt(opt.dataset.height)
                };
            });
        });

        // 底色选择
        document.querySelectorAll('.bg-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentBgColor = opt.dataset.color;
            });
        });

        // 美颜滑块
        ['brightness', 'contrast', 'smooth', 'whitening'].forEach(id => {
            const slider = document.getElementById(id);
            const val = document.getElementById(id + 'Val');
            slider.addEventListener('input', () => { val.textContent = slider.value; });
        });

        // AI抠图换底色
        async function processImage() {
            if (!originalImage || isProcessing) return;
            
            isProcessing = true;
            showStatus('正在AI识别主体，请稍候...', 'processing');
            document.getElementById('processBtn').disabled = true;

            try {
                // 1. 创建处理画布
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 使用合适的工作尺寸（平衡效果和性能）
                const maxDim = 800;
                let w = originalImage.width;
                let h = originalImage.height;
                if (w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim / w, maxDim / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(originalImage, 0, 0, w, h);
                
                // 2. 获取图像数据
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                // 3. 分析边缘颜色（用于识别背景）
                const edgeColors = [];
                const edgeSample = 20; // 采样点数
                
                // 采集四个角的颜色
                for (let i = 0; i < edgeSample; i++) {
                    // 左上角
                    edgeColors.push({
                        r: data[i * 4],
                        g: data[i * 4 + 1],
                        b: data[i * 4 + 2]
                    });
                    // 右上角
                    edgeColors.push({
                        r: data[i * 4 + (w - 1) * 4],
                        g: data[i * 4 + (w - 1) * 4 + 1],
                        b: data[i * 4 + (w - 1) * 4 + 2]
                    });
                    // 左下角
                    const y = h - 1;
                    edgeColors.push({
                        r: data[(y * w + i) * 4],
                        g: data[(y * w + i) * 4 + 1],
                        b: data[(y * w + i) * 4 + 2]
                    });
                    // 右下角
                    edgeColors.push({
                        r: data[(y * w + w - 1 - i) * 4],
                        g: data[(y * w + w - 1 - i) * 4 + 1],
                        b: data[(y * w + w - 1 - i) * 4 + 2]
                    });
                }
                
                // 计算背景主色
                const bgColor = {
                    r: Math.round(edgeColors.reduce((s, c) => s + c.r, 0) / edgeColors.length),
                    g: Math.round(edgeColors.reduce((s, c) => s + c.g, 0) / edgeColors.length),
                    b: Math.round(edgeColors.reduce((s, c) => s + c.b, 0) / edgeColors.length)
                };
                
                // 4. 智能抠图 - 使用颜色相似度和边缘检测
                const targetColor = hexToRgb(currentBgColor);
                
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        // 计算与背景色的差异
                        const diff = colorDiff(r, g, b, bgColor.r, bgColor.g, bgColor.b);
                        
                        // 边缘区域更敏感
                        const isEdge = x < 30 || x > w - 30 || y < 30 || y > h - 30;
                        const threshold = isEdge ? 35 : 50;
                        
                        if (diff < threshold) {
                            // 计算与目标颜色的混合程度
                            const blend = Math.max(0, 1 - diff / threshold);
                            
                            // 边缘过渡更自然
                            let newR, newG, newB;
                            if (blend < 1) {
                                newR = r + (targetColor.r - r) * blend;
                                newG = g + (targetColor.g - g) * blend;
                                newB = b + (targetColor.b - b) * blend;
                            } else {
                                newR = targetColor.r;
                                newG = targetColor.g;
                                newB = targetColor.b;
                            }
                            
                            data[i] = Math.round(newR);
                            data[i + 1] = Math.round(newG);
                            data[i + 2] = Math.round(newB);
                        }
                    }
                }
                
                // 5. 应用美颜效果
                const brightness = parseInt(document.getElementById('brightness').value);
                const contrast = parseInt(document.getElementById('contrast').value);
                const smooth = parseInt(document.getElementById('smooth').value);
                const whitening = parseInt(document.getElementById('whitening').value);
                
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];
                    
                    // 亮度
                    if (brightness !== 0) {
                        r += brightness * 2.55;
                        g += brightness * 2.55;
                        b += brightness * 2.55;
                    }
                    
                    // 对比度
                    if (contrast !== 0) {
                        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                        r = factor * (r - 128) + 128;
                        g = factor * (g - 128) + 128;
                        b = factor * (b - 128) + 128;
                    }
                    
                    // 磨皮（简单的模糊）
                    if (smooth > 0) {
                        // 检测是否为肤色（相对柔和的处理）
                        const isLikelySkin = isSkinColor(r, g, b);
                        if (isLikelySkin) {
                            const factor = smooth / 100 * 0.3;
                            r = r * (1 - factor) + (r + 10) * factor;
                            g = g * (1 - factor) + (g + 10) * factor;
                            b = b * (1 - factor) + (b + 10) * factor;
                        }
                    }
                    
                    // 美白
                    if (whitening > 0) {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        const f = whitening / 100 * 0.3;
                        r = r + (255 - gray) * f;
                        g = g + (255 - gray) * f;
                        b = b + (255 - gray) * f;
                    }
                    
                    // 限制范围
                    data[i] = Math.max(0, Math.min(255, Math.round(r)));
                    data[i + 1] = Math.max(0, Math.min(255, Math.round(g)));
                    data[i + 2] = Math.max(0, Math.min(255, Math.round(b)));
                }
                
                ctx.putImageData(imageData, 0, 0);
                
                // 6. 绘制最终证件照尺寸
                const finalCanvas = document.createElement('canvas');
                const finalCtx = finalCanvas.getContext('2d');
                finalCanvas.width = currentSize.width;
                finalCanvas.height = currentSize.height;
                
                // 填充底色
                finalCtx.fillStyle = currentBgColor;
                finalCtx.fillRect(0, 0, currentSize.width, currentSize.height);
                
                // 居中裁剪绘制
                const srcRatio = canvas.width / canvas.height;
                const dstRatio = currentSize.width / currentSize.height;
                
                let sx, sy, sw, sh;
                if (srcRatio > dstRatio) {
                    sh = canvas.height;
                    sw = sh * dstRatio;
                    sx = (canvas.width - sw) / 2;
                    sy = 0;
                } else {
                    sw = canvas.width;
                    sh = sw / dstRatio;
                    sx = 0;
                    sy = (canvas.height - sh) / 2;
                }
                
                finalCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, currentSize.width, currentSize.height);
                
                // 7. 显示结果
                processedCanvas = finalCanvas;
                const area = document.getElementById('canvasArea');
                area.innerHTML = `
                    <div style="text-align:center;">
                        <canvas id="resultCanvas"></canvas>
                        <p style="text-align:center;font-size:0.85em;color:#888;margin-top:10px;">${currentSize.width}×${currentSize.height}px</p>
                    </div>
                `;
                
                const resultCanvas = document.getElementById('resultCanvas');
                resultCanvas.width = finalCanvas.width;
                resultCanvas.height = finalCanvas.height;
                resultCanvas.getContext('2d').drawImage(finalCanvas, 0, 0);
                
                // 缩放显示
                const displayW = Math.min(350, area.clientWidth - 40);
                const displayScale = displayW / finalCanvas.width;
                resultCanvas.style.width = displayW + 'px';
                resultCanvas.style.height = (finalCanvas.height * displayScale) + 'px';
                
                document.getElementById('downloadBtn').disabled = false;
                showStatus('换底成功！点击下载保存证件照', 'success');
                
            } catch (err) {
                console.error(err);
                showStatus('处理失败，请尝试其他照片', 'error');
            } finally {
                isProcessing = false;
                document.getElementById('processBtn').disabled = false;
            }
        }

        // 辅助函数
        function colorDiff(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt(
                Math.pow(r1 - r2, 2) +
                Math.pow(g1 - g2, 2) +
                Math.pow(b1 - b2, 2)
            );
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        function isSkinColor(r, g, b) {
            // 简化的肤色检测
            const r2 = r / 255, g2 = g / 255, b2 = b / 255;
            const max = Math.max(r2, g2, b2);
            const min = Math.min(r2, g2, b2);
            
            // 排除太暗或太亮的
            if (max < 0.2 || max > 0.95) return false;
            if (min > 0.8) return false;
            
            // 排除蓝色系（天空、背景布）
            if (b2 > r2 * 1.2 && b2 > g2 * 1.1) return false;
            
            return true;
        }

        function showStatus(msg, type) {
            const bar = document.getElementById('statusBar');
            bar.textContent = msg;
            bar.className = 'status-bar ' + type;
        }

        function downloadImage() {
            if (!processedCanvas) return;
            const link = document.createElement('a');
            link.download = '证件照_' + currentSize.width + 'x' + currentSize.height + '.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }

        function resetAll() {
            originalImage = null;
            processedCanvas = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `
                <div class="preview-hint">
                    <i class="fas fa-id-card" style="font-size: 3em; color: #ddd; margin-bottom: 15px; display: block;"></i>
                    <p>上传照片后，AI自动识别主体并换底色</p>
                    <p style="font-size: 0.8em; color: #bbb; margin-top: 5px;">支持各种背景颜色，智能识别主体</p>
                </div>
            `;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('brightness').value = 0;
            document.getElementById('brightnessVal').textContent = '0';
            document.getElementById('contrast').value = 0;
            document.getElementById('contrastVal').textContent = '0';
            document.getElementById('smooth').value = 0;
            document.getElementById('smoothVal').textContent = '0';
            document.getElementById('whitening').value = 0;
            document.getElementById('whiteningVal').textContent = '0';
            showStatus('', '');
        }
    </script>
</body>
</html>
