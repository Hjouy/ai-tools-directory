    <!-- TensorFlow.js Core (异步加载，不阻塞备用算法) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js" async></script>
    <!-- MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/selfie_segmentation.js" crossorigin="anonymous"></script>

    <script>
        let originalImage = null;
        let processedCanvas = null;
        let currentBgColor = '#FFFFFF';
        let currentSize = { width: 295, height: 413 };
        let isProcessing = false;
        
        // MediaPipe Selfie Segmentation 实例
        let segmenter = null;
        let segmenterLoaded = false;

        // 初始化 MediaPipe Selfie Segmentation
        async function initSegmenter() {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = '正在加载AI模型，请稍候...';
            statusBar.className = 'status-bar processing';
            
            try {
                // 检查 SelfieSegmentation 是否已加载
                if (typeof SelfieSegmentation === 'undefined') {
                    throw new Error('SelfieSegmentation 未加载');
                }
                
                segmenter = await SelfieSegmentation.create({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/${file}`;
                    }
                });
                
                // 设置模型为通用模式（更好的边缘处理）
                segmenter.setOptions({
                    modelType: 'general',
                    selfieMode: false
                });
                
                segmenterLoaded = true;
                statusBar.textContent = '✓ AI模型加载完成，可以开始处理';
                statusBar.className = 'status-bar success';
                
                // 3秒后隐藏状态栏
                setTimeout(() => {
                    statusBar.className = 'status-bar';
                }, 3000);
                
            } catch (err) {
                console.error('Failed to load segmenter:', err);
                statusBar.textContent = 'AI模型加载中（可先使用备用算法）...';
                statusBar.className = 'status-bar processing';
                // 不要立即标记为失败，等待一段时间后再显示
                setTimeout(() => {
                    if (!segmenterLoaded) {
                        statusBar.textContent = 'AI模型加载较慢，已准备好备用算法，可直接使用';
                        statusBar.className = 'status-bar';
                    }
                }, 5000);
                segmenterLoaded = false;
            }
        }

        // 页面加载时初始化模型
        initSegmenter();

        // 文件上传
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        
        // 拖拽上传
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) handleFile(files[0]);
        });

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('请上传图片文件', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showStatus('图片大小不能超过10MB', 'error');
                return;
            }

            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    displayPreview(img);
                    document.getElementById('processBtn').disabled = false;
                    showStatus('照片已加载，点击「AI换底色」开始处理', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayPreview(img) {
            const area = document.getElementById('canvasArea');
            area.innerHTML = `
                <div style="position:relative;">
                    <canvas id="mainCanvas"></canvas>
                    <p style="text-align:center;font-size:0.8em;color:#888;margin-top:10px;">原图预览</p>
                </div>
            `;
            
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            // 预览时自适应显示尺寸
            const maxW = Math.min(400, area.clientWidth - 40);
            const scale = maxW / img.width;
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (img.height * scale) + 'px';
            
            ctx.drawImage(img, 0, 0);
        }

        // 尺寸选择
        document.querySelectorAll('.size-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentSize = {
                    width: parseInt(opt.dataset.width),
                    height: parseInt(opt.dataset.height)
                };
            });
        });

        // 底色选择
        document.querySelectorAll('.bg-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentBgColor = opt.dataset.color;
            });
        });

        // 美颜滑块
        ['brightness', 'contrast', 'smooth', 'whitening'].forEach(id => {
            const slider = document.getElementById(id);
            const val = document.getElementById(id + 'Val');
            slider.addEventListener('input', () => { val.textContent = slider.value; });
        });

        // AI抠图换底色 - 使用 MediaPipe Selfie Segmentation
        async function processImage() {
            if (!originalImage || isProcessing) return;
            
            isProcessing = true;
            showStatus('正在AI识别人像，请稍候...', 'processing');
            document.getElementById('processBtn').disabled = true;

            try {
                // 创建工作画布
                const workCanvas = document.createElement('canvas');
                const workCtx = workCanvas.getContext('2d');
                
                // 使用合适的处理尺寸
                const maxDim = 1024;
                let w = originalImage.width;
                let h = originalImage.height;
                if (w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim / w, maxDim / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                
                workCanvas.width = w;
                workCanvas.height = h;
                workCtx.drawImage(originalImage, 0, 0, w, h);
                
                let mask;
                
                if (segmenterLoaded && segmenter) {
                    // 使用 MediaPipe Selfie Segmentation
                    showStatus('AI模型分析中，请稍候...', 'processing');
                    
                    try {
                        mask = await segmenter.segmentPeople(workCanvas, {
                            multiSegmentation: false,
                            segmentBodyParts: false
                        });
                        
                        // mask 是 Float32Array，包含每个像素属于人物的置信度 (0-1)
                        if (!mask || mask.length === 0) {
                            throw new Error('Segmentation failed');
                        }
                    } catch (segErr) {
                        console.warn('MediaPipe segmentation failed, using fallback:', segErr);
                        mask = await fallbackSegmentation(workCtx, w, h);
                    }
                } else {
                    // 使用备用算法
                    showStatus('使用备用算法处理中...', 'processing');
                    mask = await fallbackSegmentation(workCtx, w, h);
                }
                
                showStatus('正在合成证件照...', 'processing');
                
                // 创建输出画布
                const outputCanvas = document.createElement('canvas');
                const outputCtx = outputCanvas.getContext('2d');
                outputCanvas.width = w;
                outputCanvas.height = h;
                
                // 绘制原图
                outputCtx.drawImage(workCanvas, 0, 0);
                
                // 获取图像数据
                const imageData = outputCtx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                // 应用美颜效果到主体
                const brightness = parseInt(document.getElementById('brightness').value);
                const contrast = parseInt(document.getElementById('contrast').value);
                const smooth = parseInt(document.getElementById('smooth').value);
                const whitening = parseInt(document.getElementById('whitening').value);
                
                // 创建临时画布用于模糊
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = w;
                tempCanvas.height = h;
                const tempCtx = tempCanvas.getContext('2d');
                
                // 解析目标底色
                const targetColor = hexToRgb(currentBgColor);
                
                // 遍历每个像素
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x);
                        const pixelIdx = i * 4;
                        
                        // 获取人物置信度
                        const personProb = mask[i] || 0;
                        
                        // 人像置信度阈值（低于此值认为是背景）
                        const threshold = 0.5;
                        
                        if (personProb < threshold) {
                            // 背景区域：直接替换为目标颜色
                            data[pixelIdx] = targetColor.r;
                            data[pixelIdx + 1] = targetColor.g;
                            data[pixelIdx + 2] = targetColor.b;
                        } else if (personProb < threshold + 0.15) {
                            // 边缘区域：平滑过渡
                            const blend = (personProb - threshold) / 0.15;
                            const origR = data[pixelIdx];
                            const origG = data[pixelIdx + 1];
                            const origB = data[pixelIdx + 2];
                            
                            data[pixelIdx] = Math.round(origR * blend + targetColor.r * (1 - blend));
                            data[pixelIdx + 1] = Math.round(origG * blend + targetColor.g * (1 - blend));
                            data[pixelIdx + 2] = Math.round(origB * blend + targetColor.b * (1 - blend));
                        }
                        // else: 人物区域，保持原样
                    }
                }
                
                // 应用美颜效果（仅对人像区域）
                applyBeautyEffect(data, w, h, mask, brightness, contrast, smooth, whitening);
                
                outputCtx.putImageData(imageData, 0, 0);
                
                // 绘制最终证件照尺寸
                const finalCanvas = document.createElement('canvas');
                const finalCtx = finalCanvas.getContext('2d');
                finalCanvas.width = currentSize.width;
                finalCanvas.height = currentSize.height;
                
                // 填充底色
                finalCtx.fillStyle = currentBgColor;
                finalCtx.fillRect(0, 0, currentSize.width, currentSize.height);
                
                // 居中裁剪绘制
                const srcRatio = outputCanvas.width / outputCanvas.height;
                const dstRatio = currentSize.width / currentSize.height;
                
                let sx, sy, sw, sh;
                if (srcRatio > dstRatio) {
                    sh = outputCanvas.height;
                    sw = sh * dstRatio;
                    sx = (outputCanvas.width - sw) / 2;
                    sy = 0;
                } else {
                    sw = outputCanvas.width;
                    sh = sw / dstRatio;
                    sx = 0;
                    sy = (outputCanvas.height - sh) / 2;
                }
                
                finalCtx.drawImage(outputCanvas, sx, sy, sw, sh, 0, 0, currentSize.width, currentSize.height);
                
                // 显示结果
                processedCanvas = finalCanvas;
                const area = document.getElementById('canvasArea');
                area.innerHTML = `
                    <div style="text-align:center;">
                        <canvas id="resultCanvas"></canvas>
                        <p style="text-align:center;font-size:0.85em;color:#888;margin-top:10px;">${currentSize.width}×${currentSize.height}px</p>
                    </div>
                `;
                
                const resultCanvas = document.getElementById('resultCanvas');
                resultCanvas.width = finalCanvas.width;
                resultCanvas.height = finalCanvas.height;
                resultCanvas.getContext('2d').drawImage(finalCanvas, 0, 0);
                
                // 缩放显示
                const displayW = Math.min(350, area.clientWidth - 40);
                const displayScale = displayW / finalCanvas.width;
                resultCanvas.style.width = displayW + 'px';
                resultCanvas.style.height = (finalCanvas.height * displayScale) + 'px';
                
                document.getElementById('downloadBtn').disabled = false;
                showStatus('换底成功！点击下载保存证件照', 'success');
                
            } catch (err) {
                console.error(err);
                showStatus('处理失败，请尝试其他照片', 'error');
            } finally {
                isProcessing = false;
                document.getElementById('processBtn').disabled = false;
            }
        }

        // 备用分割算法（基于颜色和边缘检测）
        async function fallbackSegmentation(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            
            // 分析四个角的颜色（假设背景是均匀的）
            const cornerColors = [];
            
            // 采集样本
            const sampleSize = Math.min(30, Math.floor(w * 0.1), Math.floor(h * 0.1));
            
            // 四个角
            const corners = [
                { x: 0, y: 0 },
                { x: w - sampleSize, y: 0 },
                { x: 0, y: h - sampleSize },
                { x: w - sampleSize, y: h - sampleSize }
            ];
            
            corners.forEach(corner => {
                let r = 0, g = 0, b = 0, count = 0;
                for (let dy = 0; dy < sampleSize; dy++) {
                    for (let dx = 0; dx < sampleSize; dx++) {
                        const x = corner.x + dx;
                        const y = corner.y + dy;
                        if (x < w && y < h) {
                            const i = (y * w + x) * 4;
                            r += data[i];
                            g += data[i + 1];
                            b += data[i + 2];
                            count++;
                        }
                    }
                }
                cornerColors.push({ r: r / count, g: g / count, b: b / count });
            });
            
            // 计算平均背景色
            const bgColor = {
                r: cornerColors.reduce((s, c) => s + c.r, 0) / 4,
                g: cornerColors.reduce((s, c) => s + c.g, 0) / 4,
                b: cornerColors.reduce((s, c) => s + c.b, 0) / 4
            };
            
            // 生成 mask（Float32Array）
            const mask = new Float32Array(w * h);
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = y * w + x;
                    const pixelIdx = i * 4;
                    
                    const r = data[pixelIdx];
                    const g = data[pixelIdx + 1];
                    const b = data[pixelIdx + 2];
                    
                    // 计算与背景色的差异
                    const diff = Math.sqrt(
                        Math.pow(r - bgColor.r, 2) +
                        Math.pow(g - bgColor.g, 2) +
                        Math.pow(b - bgColor.b, 2)
                    );
                    
                    // 边缘更敏感
                    const edgeDist = Math.min(x, y, w - x, h - y);
                    const threshold = edgeDist < 50 ? 40 : 55;
                    
                    // 转换为人像概率
                    if (diff < threshold) {
                        mask[i] = 1 - diff / threshold;
                    } else {
                        mask[i] = 0;
                    }
                }
            }
            
            // 形态学处理 - 膨胀和腐蚀使mask更平滑
            const processedMask = new Float32Array(w * h);
            const kernel = 3;
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let maxVal = 0;
                    let sumVal = 0;
                    let count = 0;
                    
                    for (let dy = -kernel; dy <= kernel; dy++) {
                        for (let dx = -kernel; dx <= kernel; dx++) {
                            const nx = x + dx;
                            const ny = y + dy;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                const val = mask[ny * w + nx];
                                maxVal = Math.max(maxVal, val);
                                sumVal += val;
                                count++;
                            }
                        }
                    }
                    
                    // 使用均值和最大值混合
                    processedMask[y * w + x] = maxVal * 0.6 + (sumVal / count) * 0.4;
                }
            }
            
            return processedMask;
        }

        // 应用美颜效果
        function applyBeautyEffect(data, w, h, mask, brightness, contrast, smooth, whitening) {
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    const maskIdx = y * w + x;
                    
                    // 只对人物区域应用美颜（置信度 > 0.5）
                    if (mask[maskIdx] < 0.5) continue;
                    
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];
                    
                    // 亮度
                    if (brightness !== 0) {
                        r += brightness * 2.55;
                        g += brightness * 2.55;
                        b += brightness * 2.55;
                    }
                    
                    // 对比度
                    if (contrast !== 0) {
                        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                        r = factor * (r - 128) + 128;
                        g = factor * (g - 128) + 128;
                        b = factor * (b - 128) + 128;
                    }
                    
                    // 磨皮（简单的模糊，仅对肤色区域）
                    if (smooth > 0) {
                        const isSkin = isSkinColor(r, g, b);
                        if (isSkin) {
                            const factor = smooth / 100 * 0.3;
                            r = r * (1 - factor) + (r + 10) * factor;
                            g = g * (1 - factor) + (g + 10) * factor;
                            b = b * (1 - factor) + (b + 10) * factor;
                        }
                    }
                    
                    // 美白
                    if (whitening > 0) {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        const f = whitening / 100 * 0.3;
                        r = r + (255 - gray) * f;
                        g = g + (255 - gray) * f;
                        b = b + (255 - gray) * f;
                    }
                    
                    // 限制范围
                    data[i] = Math.max(0, Math.min(255, Math.round(r)));
                    data[i + 1] = Math.max(0, Math.min(255, Math.round(g)));
                    data[i + 2] = Math.max(0, Math.min(255, Math.round(b)));
                }
            }
        }

        // 辅助函数
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        function isSkinColor(r, g, b) {
            const r2 = r / 255, g2 = g / 255, b2 = b / 255;
            const max = Math.max(r2, g2, b2);
            const min = Math.min(r2, g2, b2);
            
            if (max < 0.2 || max > 0.95) return false;
            if (min > 0.8) return false;
            
            // 排除蓝色系
            if (b2 > r2 * 1.2 && b2 > g2 * 1.1) return false;
            
            return true;
        }

        function showStatus(msg, type) {
            const bar = document.getElementById('statusBar');
            bar.textContent = msg;
            bar.className = 'status-bar ' + type;
        }

        function downloadImage() {
            if (!processedCanvas) return;
            
            // 创建带水印的画布
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = processedCanvas.width;
            tempCanvas.height = processedCanvas.height;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(processedCanvas, 0, 0);
            
            // 添加水印
            ctx.font = '16px Arial';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 1;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.strokeText('AI工具导航', tempCanvas.width - 10, tempCanvas.height - 10);
            ctx.fillText('AI工具导航', tempCanvas.width - 10, tempCanvas.height - 10);
            
            const link = document.createElement('a');
            link.download = '证件照_' + currentSize.width + 'x' + currentSize.height + '.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }

        function resetAll() {
            originalImage = null;
            processedCanvas = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `
                <div class="preview-hint">
                    <i class="fas fa-id-card" style="font-size: 3em; color: #ddd; margin-bottom: 15px; display: block;"></i>
                    <p>上传照片后，AI自动识别主体并换底色</p>
                    <p style="font-size: 0.8em; color: #bbb; margin-top: 5px;">支持各种背景颜色，智能识别人像</p>
                </div>
            `;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('statusBar').className = 'status-bar';
        }
    </script>
