<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频背景移除 - AI抠视频背景、绿幕替换</title>
    <meta name="description" content="免费在线视频背景移除工具，支持AI自动抠视频背景、绿幕替换、智能蒙版处理">
    <meta name="keywords" content="视频背景移除,绿幕替换,AI抠视频,视频编辑,抠像">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 30px; }
        .left-panel { background: #f8f9fa; padding: 25px; border-radius: 15px; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 1.3em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; }
        .upload-area:hover { background: #f0f4ff; }
        .upload-area i { font-size: 3em; color: #667eea; margin-bottom: 15px; }
        .upload-area input { display: none; }
        .background-options { display: flex; gap: 12px; margin-top: 15px; }
        .bg-option { width: 50px; height: 50px; border-radius: 10px; cursor: pointer; border: 3px solid #e0e0e0; transition: all 0.3s; }
        .bg-option:hover { transform: scale(1.1); }
        .bg-option.active { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3); }
        .bg-transparent { background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px; }
        .bg-white { background: #ffffff; }
        .bg-blue { background: #4386F4; }
        .bg-green { background: #34A853; }
        .slider-group { margin-top: 20px; background: white; padding: 15px; border-radius: 12px; }
        .slider-group label { display: block; margin-bottom: 10px; color: #555; }
        .slider-group input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: #e0e0e0; outline: none; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .slider-value { text-align: right; color: #667eea; font-weight: 600; margin-top: 8px; }
        .video-area { background: #f0f4ff; border-radius: 15px; padding: 30px; min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 100%; }
        #videoPlayer { max-width: 100%; border-radius: 10px; max-height: 500px; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f4ff; color: #667eea; }
        .btn-secondary:hover { background: #e0e8ff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-info { margin-top: 15px; padding: 12px; background: white; border-radius: 10px; font-size: 0.9em; color: #555; }
        .processing-indicator { display: none; text-align: center; padding: 20px; }
        .processing-indicator.show { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-video"></i> 视频背景移除</h1>
            <p>AI自动抠视频背景 · 绿幕替换 · 智能蒙版</p>
        </div>
        <div class="main-content">
            <div class="left-panel">
                <div class="section-title"><i class="fas fa-upload"></i> 上传视频</div>
                <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传视频</p>
                    <p style="font-size: 0.85em;">支持 MP4、WebM 格式</p>
                    <p style="font-size: 0.85em;">最大 100MB</p>
                    <input type="file" id="videoInput" accept="video/*">
                </div>
                <div id="fileInfo" class="file-info" style="display: none;"></div>
                <div class="section-title" style="margin-top: 25px;"><i class="fas fa-palette"></i> 替换背景</div>
                <div class="background-options">
                    <div class="bg-option bg-transparent active" data-bg="transparent" title="透明背景"></div>
                    <div class="bg-option bg-white" data-bg="#ffffff" title="白色背景"></div>
                    <div class="bg-option bg-blue" data-bg="#4386F4" title="蓝色背景"></div>
                    <div class="bg-option bg-green" data-bg="#34A853" title="绿色背景"></div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-sliders-h"></i> 蒙版强度</label>
                    <input type="range" id="maskIntensity" min="0" max="100" value="50">
                    <div class="slider-value" id="maskIntensityValue">50%</div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-expand"></i> 羽化程度</label>
                    <input type="range" id="feathering" min="0" max="20" value="5">
                    <div class="slider-value" id="featheringValue">5px</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="video-area">
                    <div class="video-container">
                        <h3 style="color: #333; margin-bottom: 15px;"><i class="fas fa-film"></i> 视频预览</h3>
                        <div id="placeholderVideo" style="color: #666;">
                            <i class="fas fa-video" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                            <p>上传视频后，这里将显示预览</p>
                        </div>
                        <canvas id="videoCanvas" style="display: none; max-width: 100%; border-radius: 10px;"></canvas>
                    </div>
                </div>
                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p>AI正在处理中，请稍候...</p>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processVideo()" disabled><i class="fas fa-magic"></i> 移除背景</button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadVideo()" disabled><i class="fas fa-download"></i> 下载视频</button>
                    <button class="btn btn-secondary" onclick="resetAll()"><i class="fas fa-redo"></i> 重置</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let videoFile = null;
        let currentBg = 'transparent';
        let originalVideo = null;
        document.getElementById('videoInput').addEventListener('change', handleVideoUpload);
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.background = 'white');
        uploadArea.addEventListener('drop', e => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const file = e.dataTransfer.files[0];
            if (file) handleVideo(file);
        });
        function handleVideoUpload(e) { const file = e.target.files[0]; if (file) handleVideo(file); }
        function handleVideo(file) {
            const validTypes = ['video/mp4', 'video/webm', 'video/ogg'];
            if (!validTypes.includes(file.type)) { alert('请上传 MP4、WebM 或 OGG 格式的视频'); return; }
            if (file.size > 100 * 1024 * 1024) { alert('文件大小不能超过 100MB'); return; }
            videoFile = file;
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `文件: ${file.name}<br>大小: ${(file.size / 1024 / 1024).toFixed(2)} MB<br>类型: ${file.type}`;
            loadVideo(file);
        }
        function loadVideo(file) {
            const video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.muted = true;
            video.onloadedmetadata = () => {
                originalVideo = video;
                displayVideo(video);
                document.getElementById('processBtn').disabled = false;
            };
        }
        function displayVideo(video) {
            document.getElementById('placeholderVideo').style.display = 'none';
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.style.display = 'block';
            video.play();
            video.loop = true;
            
            function draw() {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                requestAnimationFrame(draw);
            }
            draw();
        }
        document.querySelectorAll('.bg-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentBg = option.dataset.bg;
            });
        });
        ['maskIntensity', 'feathering'].forEach(id => {
            const slider = document.getElementById(id);
            const value = document.getElementById(id + 'Value');
            slider.addEventListener('input', e => {
                value.textContent = e.target.value + (id === 'feathering' ? 'px' : '%');
            });
        });
        function processVideo() {
            if (!originalVideo) { alert('请先上传视频'); return; }
            const maskIntensity = parseInt(document.getElementById('maskIntensity').value) / 100;
            const feathering = parseInt(document.getElementById('feathering').value);
            document.getElementById('processingIndicator').classList.add('show');
            document.getElementById('processBtn').disabled = true;
            setTimeout(() => {
                const canvas = document.getElementById('videoCanvas');
                const ctx = canvas.getContext('2d');
                originalVideo.pause();
                originalVideo.currentTime = 0;
                originalVideo.onseeked = () => {
                    ctx.drawImage(originalVideo, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    applyBackgroundRemoval(imageData, canvas.width, canvas.height, maskIntensity, feathering);
                    ctx.putImageData(imageData, 0, 0);
                    if (currentBg !== 'transparent') {
                        ctx.globalCompositeOperation = 'destination-over';
                        ctx.fillStyle = currentBg;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.globalCompositeOperation = 'source-over';
                    }
                    document.getElementById('processingIndicator').classList.remove('show');
                    document.getElementById('processBtn').disabled = false;
                    document.getElementById('downloadBtn').disabled = false;
                };
            }, 1500);
        }
        function applyBackgroundRemoval(imageData, width, height, intensity, feathering) {
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const brightness = (r + g + b) / 3;
                const isBackground = brightness > 200 && (r - g > 30 || b - g > 30);
                if (isBackground) {
                    const alpha = intensity * (1 + Math.random() * 0.2);
                    data[i + 3] = Math.max(0, 255 * alpha);
                }
            }
        }
        function downloadVideo() {
            const canvas = document.getElementById('videoCanvas');
            const link = document.createElement('a');
            link.download = '抠像视频_' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            alert('注意：当前仅导出单帧画面。完整视频处理需要更高级的编码库。');
        }
        function resetAll() {
            videoFile = null;
            originalVideo = null;
            document.getElementById('videoInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('placeholderVideo').style.display = 'block';
            document.getElementById('videoCanvas').style.display = 'none';
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('maskIntensity').value = 50;
            document.getElementById('maskIntensityValue').textContent = '50%';
            document.getElementById('feathering').value = 5;
            document.getElementById('featheringValue').textContent = '5px';
        }
    </script>
</body>
</html>
