<body>

                    </div>

                    <div class="video-compare-item">
                        <h4><i class="fas fa-play"></i> 原视频</h4>

                            <video id="originalVideo" controls muted></video>
                        </div>
                    </div>
                    <div class="video-compare-item">
                        <h4><i class="fas fa-check"></i> 处理结果</h4>
                        <div class="video-container" id="resultContainer" style="background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 15px 15px;">
                            <video id="outputVideo" controls></video>
                        </div>
                    </div>

                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p id="processingText">AI正在处理中，请稍候...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/selfie_segmentation.js" crossorigin="anonymous"></script>

    <script>
        let originalVideo = null;
        let videoDuration = 0;
        let videoFps = 30;
        let processedBlob = null;
        let segmenter = null;
        let segmenterReady = false;
        let currentBg = 'transparent';
        let isProcessing = false;
        let videoWidth = 0;
        let videoHeight = 0;

        async function initSegmenter() {
            try {
                showStatus('正在加载AI模型...', 'loading');
                segmenter = await SelfieSegmentation.create({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.4.1646421024/${file}`
                });
                segmenter.setOptions({ modelType: 'general', selfieMode: false });
                segmenterReady = true;
                showStatus('AI模型加载完成，可以开始处理', 'success');
                setTimeout(() => hideStatus(), 3000);
            } catch (err) {
                console.error('模型加载失败:', err);
                showStatus('AI模型加载失败，将使用备用算法', 'error');
                segmenterReady = false;
            }
        }
        initSegmenter();

        document.getElementById('videoInput').addEventListener('change', handleVideoUpload);
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) handleVideo(files[0]);
        });

        function handleVideoUpload(e) { const file = e.target.files[0]; if (file) handleVideo(file); }

        function handleVideo(file) {
            if (!file.type.startsWith('video/')) { showStatus('请上传视频文件', 'error'); return; }
            if (file.size > 100 * 1024 * 1024) { showStatus('视频大小不能超过100MB', 'error'); return; }
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `<div>文件: ${file.name}</div><div style="margin-top:5px;">大小: ${(file.size / 1024 / 1024).toFixed(1)} MB</div>`;
            const url = URL.createObjectURL(file);
            const video = document.createElement('video');
            video.src = url;
            video.muted = true;
            video.onloadedmetadata = () => {
                originalVideo = video;
                videoWidth = video.videoWidth;
                videoHeight = video.videoHeight;
                videoDuration = video.duration;
                videoFps = 30;
                document.getElementById('uploadHint').style.display = 'none';
                document.getElementById('videoArea').innerHTML = `
                    <div class="video-container" style="background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 15px 15px;">
                        <video id="originalVideo" src="${url}" controls muted style="max-width:100%;border-radius:10px;max-height:400px;"></video>
                    </div>
                    <p style="color:#666;margin-top:10px;font-size:0.9em;">${videoWidth}x${videoHeight} · ${Math.round(videoDuration)}秒</p>
                `;
                document.getElementById('videoCompare').style.display = 'grid';
                document.getElementById('processBtn').disabled = false;
                showStatus('视频已加载，点击AI处理视频开始', 'success');
            };
        }

        document.querySelectorAll('.bg-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentBg = option.dataset.bg;
            });
        });

        document.getElementById('segmentationQuality').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            const labels = ['1 - 快速', '2 - 平衡', '3 - 质量', '4 - 高质量', '5 - 最佳'];
            document.getElementById('segmentationQualityValue').textContent = labels[val - 1] || '2 - 平衡';
        });
        document.getElementById('feathering').addEventListener('input', (e) => { document.getElementById('featheringValue').textContent = e.target.value + 'px'; });

        async function processVideo() {
            if (!originalVideo || isProcessing) return;
            isProcessing = true;
            showStatus('AI正在处理视频，请稍候...', 'loading');
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processingIndicator').classList.add('show');
            try { await processVideoBackgroundRemoval(); }
            catch (error) { console.error('视频处理失败:', error); showStatus('视频处理失败: ' + error.message, 'error'); resetProcessingUI(); }
        }

        async function processVideoBackgroundRemoval() {
            const quality = parseInt(document.getElementById('segmentationQuality').value);
            const feathering = parseInt(document.getElementById('feathering').value);
            const sampleInterval = Math.max(1, 6 - quality);
            updateProgress(5, '初始化处理...');
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const maxDim = 720;
            let outWidth = videoWidth, outHeight = videoHeight;
            if (outWidth > maxDim || outHeight > maxDim) { const ratio = Math.min(maxDim / outWidth, maxDim / outHeight); outWidth = Math.round(outWidth * ratio); outHeight = Math.round(outHeight * ratio); }
            tempCanvas.width = outWidth; tempCanvas.height = outHeight;
            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = outWidth; outputCanvas.height = outHeight;
            updateProgress(10, '准备录制...');
            const resultContainer = document.getElementById('resultContainer');
            if (currentBg !== 'transparent') { resultContainer.style.background = currentBg; } else { resultContainer.style.background = ''; }
            const stream = outputCanvas.captureStream(videoFps);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 5000000 });
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => { processedBlob = new Blob(chunks, { type: 'video/webm' }); document.getElementById('outputVideo').src = URL.createObjectURL(processedBlob); resetProcessingUI(); showStatus('视频处理完成！可以下载结果', 'success'); };
            mediaRecorder.start();
            originalVideo.pause();
            originalVideo.currentTime = 0;
            let lastMask = null;
            let frameCount = 0;
            const totalFrames = Math.ceil(videoDuration * videoFps);
            await new Promise((resolve) => {
                originalVideo.onseeked = async () => {
                    const currentFrame = Math.floor(originalVideo.currentTime * videoFps);
                    frameCount++;
                    tempCtx.drawImage(originalVideo, 0, 0, outWidth, outHeight);
                    if (frameCount % sampleInterval === 0 || !lastMask) {
                        if (segmenterReady && segmenter) {
                            try {
                                const result = await segmenter.segment(tempCanvas, { selfieMode: false });
                                if (result && result.data) {
                                    lastMask = new Float32Array(outWidth * outHeight);
                                    for (let i = 0; i < outWidth * outHeight; i++) {
                                        lastMask[i] = result.data[i * 4 + 3] / 255;
                                    }
                                } else {
                                    throw new Error('Invalid mask');
                                }
                            } catch (e) { 
                                lastMask = await fallbackSegmentation(tempCtx, outWidth, outHeight); 
                            }
                        } else { 
                            lastMask = await fallbackSegmentation(tempCtx, outWidth, outHeight); 
                        }
                    }
                    applySegmentation(outputCtx = outputCanvas.getContext('2d'), tempCtx, lastMask, outWidth, outHeight, feathering, currentBg);
                    const progress = Math.round((frameCount / totalFrames) * 90) + 5;
                    updateProgress(Math.min(progress, 95), `处理中 ${Math.round((frameCount / totalFrames) * 100)}%`);
                    if (originalVideo.currentTime >= videoDuration - 0.01) { mediaRecorder.stop(); resolve(); }
                    else { originalVideo.currentTime = Math.min(originalVideo.currentTime + 1 / videoFps, videoDuration); }
                };
                originalVideo.currentTime = 0.001;
            });
            updateProgress(100, '处理完成！');
        }

        async function fallbackSegmentation(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const edgeSamples = [];
            const step = 5;
            for (let y = 0; y < h; y += step) { 
                for (let x = 0; x < w; x += step) { 
                    if (x < 30 || x > w - 30 || y < 30 || y > h - 30) { 
                        const i = (y * w + x) * 4; 
                        edgeSamples.push({ r: data[i], g: data[i + 1], b: data[i + 2] }); 
                    } 
                } 
            }
            const bgColor = { 
                r: Math.round(edgeSamples.reduce((s, c) => s + c.r, 0) / edgeSamples.length), 
                g: Math.round(edgeSamples.reduce((s, c) => s + c.g, 0) / edgeSamples.length), 
                b: Math.round(edgeSamples.reduce((s, c) => s + c.b, 0) / edgeSamples.length) 
            };
            const mask = new Float32Array(w * h);
            for (let y = 0; y < h; y++) { 
                for (let x = 0; x < w; x++) { 
                    const i = y * w + x; 
                    const pixelIdx = i * 4; 
                    const diff = Math.sqrt(Math.pow(data[pixelIdx] - bgColor.r, 2) + Math.pow(data[pixelIdx + 1] - bgColor.g, 2) + Math.pow(data[pixelIdx + 2] - bgColor.b, 2)); 
                    const edgeDist = Math.min(x, y, w - 1 - x, h - 1 - y); 
                    const threshold = 45 + edgeDist * 0.3;
                    // mask语义：0=背景，1=主体
                    // 差异小=背景→mask低，差异大=人物→mask高
                    if (diff < threshold) { 
                        mask[i] = diff / threshold; // 平滑过渡
                    } else { 
                        mask[i] = 1; 
                    }
                } 
            }
            return mask;
        }

        function applySegmentation(outputCtx, inputCtx, mask, w, h, feathering, bg) {
            // 应用高斯模糊优化边缘
            const smoothMask = applyGaussianBlur(mask, w, h);
            
            const inputData = inputCtx.getImageData(0, 0, w, h);
            const data = inputData.data;
            if (bg !== 'transparent') { outputCtx.fillStyle = bg; outputCtx.fillRect(0, 0, w, h); }
            
            // 边缘羽化阈值
            const lowThreshold = 0.25;
            const highThreshold = 0.75;
            
            for (let y = 0; y < h; y++) { 
                for (let x = 0; x < w; x++) { 
                    const i = y * w + x; 
                    const pixelIdx = i * 4; 
                    const prob = smoothMask[i] || 0; 
                    
                    if (prob < lowThreshold) {
                        // 背景区域：透明或替换背景色
                        data[pixelIdx + 3] = 0;
                    } else if (prob < highThreshold) {
                        // 边缘过渡区域
                        const alpha = Math.round(((prob - lowThreshold) / (highThreshold - lowThreshold)) * 255);
                        data[pixelIdx + 3] = alpha;
                    } else {
                        // 主体区域：完全不透明
                        data[pixelIdx + 3] = 255;
                    }
                } 
            }
            inputCtx.putImageData(inputData, 0, 0);
            if (bg === 'transparent') { outputCtx.clearRect(0, 0, w, h); }
            outputCtx.drawImage(inputCtx.canvas, 0, 0);
        }
        
        // 高斯模糊优化边缘
        function applyGaussianBlur(mask, w, h) {
            const kernel = 2;
            const sigma = 1.2;
            const kernelSize = 2 * kernel + 1;
            const gaussKernel = [];
            let sum = 0;
            
            for (let i = -kernel; i <= kernel; i++) {
                for (let j = -kernel; j <= kernel; j++) {
                    const g = Math.exp(-(i * i + j * j) / (2 * sigma * sigma));
                    gaussKernel.push(g);
                    sum += g;
                }
            }
            for (let i = 0; i < gaussKernel.length; i++) gaussKernel[i] /= sum;
            
            const result = new Float32Array(w * h);
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let val = 0;
                    let weightSum = 0;
                    for (let ky = -kernel; ky <= kernel; ky++) {
                        for (let kx = -kernel; kx <= kernel; kx++) {
                            const nx = x + kx, ny = y + ky;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                const ki = (ky + kernel) * kernelSize + (kx + kernel);
                                const weight = gaussKernel[ki];
                                val += mask[ny * w + nx] * weight;
                                weightSum += weight;
                            }
                        }
                    }
                    result[y * w + x] = val / weightSum;
                }
            }
            return result;
        }

        function updateProgress(percent, text) { document.getElementById('progressFill').style.width = percent + '%'; document.getElementById('progressText').textContent = text; document.getElementById('processingText').textContent = text; }
        function resetProcessingUI() { document.getElementById('processingIndicator').classList.remove('show'); document.getElementById('processBtn').disabled = false; document.getElementById('downloadBtn').disabled = !!processedBlob; }
        function downloadVideo() { if (!processedBlob) { showStatus('请先处理视频', 'error'); return; } const url = URL.createObjectURL(processedBlob); const link = document.createElement('a'); link.download = '视频抠图_' + Date.now() + '.webm'; link.href = url; link.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
        function showStatus(text, type) { const bar = document.getElementById('statusBar'); document.getElementById('statusText').textContent = text; bar.className = 'status-bar show ' + type; }
        function hideStatus() { document.getElementById('statusBar').className = 'status-bar'; }
        function resetAll() {
            originalVideo = null; processedBlob = null;
            document.getElementById('videoInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('videoArea').innerHTML = `<div id="uploadHint" style="text-align: center; color: #888;"><i class="fas fa-film" style="font-size: 4em; margin-bottom: 20px; display: block; color: #ddd;"></i><p>上传视频后，AI将自动识别人物并移除背景</p></div>`;
            document.getElementById('videoCompare').style.display = 'none';
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('processingIndicator').classList.remove('show');
            hideStatus();
        }
    </script>
