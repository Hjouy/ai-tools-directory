<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频背景移除 - AI抠视频背景、绿幕替换</title>
    <meta name="description" content="免费在线视频背景移除工具，支持AI自动抠视频背景、绿幕替换、智能蒙版处理">
    <meta name="keywords" content="视频背景移除,绿幕替换,AI抠视频,视频编辑,抠像">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 30px; }
        .left-panel { background: #f8f9fa; padding: 25px; border-radius: 15px; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 1.3em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; }
        .upload-area:hover { background: #f0f4ff; }
        .upload-area i { font-size: 3em; color: #667eea; margin-bottom: 15px; }
        .upload-area input { display: none; }
        .background-options { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .bg-option { width: 50px; height: 50px; border-radius: 10px; cursor: pointer; border: 3px solid #e0e0e0; transition: all 0.3s; }
        .bg-option:hover { transform: scale(1.1); }
        .bg-option.active { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3); }
        .bg-transparent { background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px; }
        .bg-white { background: #ffffff; }
        .bg-blue { background: #4386F4; }
        .bg-green { background: #34A853; }
        .bg-black { background: #000000; }
        .bg-pink { background: #FF6B9D; }
        .slider-group { margin-top: 20px; background: white; padding: 15px; border-radius: 12px; }
        .slider-group label { display: block; margin-bottom: 10px; color: #555; }
        .slider-group input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: #e0e0e0; outline: none; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .slider-value { text-align: right; color: #667eea; font-weight: 600; margin-top: 8px; }
        .video-area { background: #f0f4ff; border-radius: 15px; padding: 30px; min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .video-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 100%; }
        #outputVideo, #originalVideo { max-width: 100%; border-radius: 10px; max-height: 500px; }
        .video-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .video-compare-item { background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .video-compare-item h4 { color: #333; margin-bottom: 10px; font-size: 0.9em; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f4ff; color: #667eea; }
        .btn-secondary:hover { background: #e0e8ff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-info { margin-top: 15px; padding: 12px; background: white; border-radius: 10px; font-size: 0.9em; color: #555; }
        .processing-indicator { display: none; text-align: center; padding: 20px; }
        .processing-indicator.show { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
        .progress-text { margin-top: 10px; color: #666; font-size: 0.9em; }
        .quality-badge { display: inline-block; padding: 4px 12px; background: #667eea; color: white; border-radius: 20px; font-size: 0.85em; margin-left: 10px; }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } .video-compare { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-video"></i> 视频背景移除</h1>
            <p>AI自动抠视频背景 · 绿幕替换 · 智能蒙版 <span class="quality-badge">✅ 完整版</span></p>
        </div>
        <div class="main-content">
            <div class="left-panel">
                <div class="section-title"><i class="fas fa-upload"></i> 上传视频</div>
                <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传视频</p>
                    <p style="font-size: 0.85em;">支持 MP4、WebM 格式</p>
                    <p style="font-size: 0.85em;">最大 100MB</p>
                    <input type="file" id="videoInput" accept="video/*">
                </div>
                <div id="fileInfo" class="file-info" style="display: none;"></div>
                <div class="section-title" style="margin-top: 25px;"><i class="fas fa-palette"></i> 替换背景</div>
                <div class="background-options">
                    <div class="bg-option bg-transparent active" data-bg="transparent" title="透明背景"></div>
                    <div class="bg-option bg-white" data-bg="#ffffff" title="白色背景"></div>
                    <div class="bg-option bg-blue" data-bg="#4386F4" title="蓝色背景"></div>
                    <div class="bg-option bg-green" data-bg="#34A853" title="绿色背景"></div>
                    <div class="bg-option bg-black" data-bg="#000000" title="黑色背景"></div>
                    <div class="bg-option bg-pink" data-bg="#FF6B9D" title="粉色背景"></div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-sliders-h"></i> 蒙版强度</label>
                    <input type="range" id="maskIntensity" min="0" max="100" value="50">
                    <div class="slider-value" id="maskIntensityValue">50%</div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-expand"></i> 羽化程度</label>
                    <input type="range" id="feathering" min="0" max="20" value="5">
                    <div class="slider-value" id="featheringValue">5px</div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-clock"></i> 采样帧数</label>
                    <input type="range" id="sampleFrames" min="5" max="30" value="15">
                    <div class="slider-value" id="sampleFramesValue">15帧</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="video-area">
                    <div class="video-container">
                        <h3 style="color: #333; margin-bottom: 15px;"><i class="fas fa-film"></i> 视频预览</h3>
                        <div id="placeholderVideo" style="color: #666;">
                            <i class="fas fa-video" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                            <p>上传视频后，这里将显示预览</p>
                        </div>
                        <div id="videoContainer" style="display: none;">
                            <div class="video-compare">
                                <div class="video-compare-item">
                                    <h4>原始视频</h4>
                                    <video id="originalVideo" muted loop playsinline></video>
                                </div>
                                <div class="video-compare-item">
                                    <h4>处理结果</h4>
                                    <video id="outputVideo" muted loop playsinline></video>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p>AI正在处理中，请稍候...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processVideo()" disabled><i class="fas fa-magic"></i> 移除背景</button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadVideo()" disabled><i class="fas fa-download"></i> 下载视频</button>
                    <button class="btn btn-secondary" onclick="resetAll()"><i class="fas fa-redo"></i> 重置</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let videoFile = null;
        let currentBg = 'transparent';
        let originalVideo = null;
        let processedBlob = null;
        let videoDuration = 0;
        let videoFps = 30;
        
        document.getElementById('videoInput').addEventListener('change', handleVideoUpload);
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.background = 'white');
        uploadArea.addEventListener('drop', e => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const file = e.dataTransfer.files[0];
            if (file) handleVideo(file);
        });
        
        function handleVideoUpload(e) { 
            const file = e.target.files[0]; 
            if (file) handleVideo(file); 
        }
        
        function handleVideo(file) {
            const validTypes = ['video/mp4', 'video/webm', 'video/ogg'];
            if (!validTypes.includes(file.type)) { 
                alert('请上传 MP4、WebM 或 OGG 格式的视频'); 
                return; 
            }
            if (file.size > 100 * 1024 * 1024) { 
                alert('文件大小不能超过 100MB'); 
                return; 
            }
            videoFile = file;
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `文件: ${file.name}<br>大小: ${(file.size / 1024 / 1024).toFixed(2)} MB<br>类型: ${file.type}`;
            loadVideo(file);
        }
        
        function loadVideo(file) {
            const video = document.getElementById('originalVideo');
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                originalVideo = video;
                videoDuration = video.duration;
                videoFps = 30; // 默认30fps
                
                document.getElementById('placeholderVideo').style.display = 'none';
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('processBtn').disabled = false;
                
                updateSliderMax('sampleFrames', Math.min(30, Math.floor(videoDuration * videoFps)));
            };
        }
        
        document.querySelectorAll('.bg-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentBg = option.dataset.bg;
            });
        });
        
        ['maskIntensity', 'feathering', 'sampleFrames'].forEach(id => {
            const slider = document.getElementById(id);
            const value = document.getElementById(id + 'Value');
            slider.addEventListener('input', e => {
                let unit = '';
                if (id === 'feathering') unit = 'px';
                else if (id === 'sampleFrames') unit = '帧';
                else unit = '%';
                value.textContent = e.target.value + unit;
            });
        });
        
        function updateSliderMax(id, max) {
            const slider = document.getElementById(id);
            slider.max = max;
            if (parseInt(slider.value) > max) {
                slider.value = max;
                document.getElementById(id + 'Value').textContent = max + '帧';
            }
        }
        
        async function processVideo() {
            if (!originalVideo) { alert('请先上传视频'); return; }
            
            document.getElementById('processingIndicator').classList.add('show');
            document.getElementById('processBtn').disabled = true;
            
            try {
                await processVideoBackgroundRemoval();
            } catch (error) {
                console.error('视频处理失败:', error);
                alert('视频处理失败: ' + error.message);
                resetProcessingUI();
            }
        }
        
        async function processVideoBackgroundRemoval() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = originalVideo.videoWidth;
            canvas.height = originalVideo.videoHeight;
            
            const maskIntensity = parseInt(document.getElementById('maskIntensity').value) / 100;
            const feathering = parseInt(document.getElementById('feathering').value);
            const sampleFrameCount = parseInt(document.getElementById('sampleFrames').value);
            
            // 计算采样间隔
            const totalFrames = Math.floor(videoDuration * videoFps);
            const sampleInterval = Math.max(1, Math.floor(totalFrames / sampleFrameCount));
            
            updateProgress(10, '分析视频帧...');
            
            // 创建背景蒙版（基于边缘检测）
            const backgroundMask = await createBackgroundMask(canvas, ctx, sampleInterval);
            
            updateProgress(40, '处理视频帧...');
            
            // 使用MediaRecorder录制处理后的视频
            const stream = canvas.captureStream(videoFps);
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 2500000
            });
            
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                processedBlob = new Blob(chunks, { type: 'video/webm' });
                
                const outputVideo = document.getElementById('outputVideo');
                outputVideo.src = URL.createObjectURL(processedBlob);
                
                document.getElementById('processingIndicator').classList.remove('show');
                document.getElementById('processBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
            };
            
            mediaRecorder.start();
            
            // 处理视频的每一帧
            originalVideo.pause();
            originalVideo.currentTime = 0;
            
            await new Promise((resolve) => {
                originalVideo.onseeked = async () => {
                    ctx.drawImage(originalVideo, 0, 0, canvas.width, canvas.height);
                    
                    // 应用背景移除
                    applyBackgroundRemoval(ctx, canvas.width, canvas.height, backgroundMask, maskIntensity, feathering);
                    
                    // 应用自定义背景
                    if (currentBg !== 'transparent') {
                        ctx.globalCompositeOperation = 'destination-over';
                        ctx.fillStyle = currentBg;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.globalCompositeOperation = 'source-over';
                    }
                    
                    const currentTime = originalVideo.currentTime;
                    const progress = 40 + Math.round((currentTime / videoDuration) * 50);
                    updateProgress(progress, `处理中 ${Math.round((currentTime / videoDuration) * 100)}%`);
                    
                    if (currentTime >= videoDuration) {
                        mediaRecorder.stop();
                        resolve();
                    } else {
                        originalVideo.currentTime = Math.min(currentTime + (1 / videoFps), videoDuration);
                    }
                };
            });
        }
        
        async function createBackgroundMask(canvas, ctx, sampleInterval) {
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
            const maskCtx = maskCanvas.getContext('2d');
            
            // 创建边缘蒙版
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const maskData = maskCtx.createImageData(canvas.width, canvas.height);
            
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    const r = imageData.data[idx];
                    const g = imageData.data[idx + 1];
                    const b = imageData.data[idx + 2];
                    
                    // 边缘检测：四角颜色判断
                    const cornerColors = [
                        getPixelColor(imageData, 0, 0),
                        getPixelColor(imageData, canvas.width - 1, 0),
                        getPixelColor(imageData, 0, canvas.height - 1),
                        getPixelColor(imageData, canvas.width - 1, canvas.height - 1)
                    ];
                    
                    const avgBgColor = {
                        r: cornerColors.reduce((s, c) => s + c.r, 0) / 4,
                        g: cornerColors.reduce((s, c) => s + c.g, 0) / 4,
                        b: cornerColors.reduce((s, c) => s + c.b, 0) / 4
                    };
                    
                    const colorDistance = Math.sqrt(
                        Math.pow(r - avgBgColor.r, 2) +
                        Math.pow(g - avgBgColor.g, 2) +
                        Math.pow(b - avgBgColor.b, 2)
                    );
                    
                    // 颜色距离越小，越可能是背景
                    maskData.data[idx + 3] = Math.min(255, colorDistance * 2);
                }
            }
            
            maskCtx.putImageData(maskData, 0, 0);
            return maskCanvas;
        }
        
        function getPixelColor(imageData, x, y) {
            const idx = (y * imageData.width + x) * 4;
            return {
                r: imageData.data[idx],
                g: imageData.data[idx + 1],
                b: imageData.data[idx + 2]
            };
        }
        
        function applyBackgroundRemoval(ctx, width, height, backgroundMask, intensity, feathering) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const maskData = backgroundMask.getContext('2d').getImageData(0, 0, width, height);
            
            for (let i = 0; i < imageData.data.length; i += 4) {
                const maskAlpha = maskData.data[i + 3];
                const originalAlpha = imageData.data[i + 3];
                
                // 应用蒙版强度
                const newAlpha = originalAlpha * (maskAlpha / 255) * intensity;
                imageData.data[i + 3] = Math.min(255, Math.max(0, newAlpha));
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = text;
        }
        
        function downloadVideo() {
            if (!processedBlob) { alert('请先处理视频'); return; }
            
            const link = document.createElement('a');
            link.download = '抠像视频_' + Date.now() + '.webm';
            link.href = URL.createObjectURL(processedBlob);
            link.click();
        }
        
        function resetAll() {
            videoFile = null;
            originalVideo = null;
            processedBlob = null;
            document.getElementById('videoInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('placeholderVideo').style.display = 'block';
            document.getElementById('videoContainer').style.display = 'none';
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('maskIntensity').value = 50;
            document.getElementById('maskIntensityValue').textContent = '50%';
            document.getElementById('feathering').value = 5;
            document.getElementById('featheringValue').textContent = '5px';
            document.getElementById('sampleFrames').value = 15;
            document.getElementById('sampleFramesValue').textContent = '15帧';
            resetProcessingUI();
        }
        
        function resetProcessingUI() {
            document.getElementById('processingIndicator').classList.remove('show');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '准备中...';
        }
    </script>
</body>
</html>
