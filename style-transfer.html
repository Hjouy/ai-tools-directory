<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能图像风格转换 - 油画/素描/水彩/动漫风格</title>
    <meta name="description" content="免费在线图像风格转换工具，支持油画、素描、水彩、动漫等多种艺术风格转换">
    <meta name="keywords" content="风格转换,油画效果,素描效果,水彩画,动漫风格,艺术风格">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 30px; }
        .left-panel { background: #fff5f5; padding: 25px; border-radius: 15px; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 1.3em; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #f5576c; display: flex; align-items: center; gap: 10px; }
        .upload-area { border: 3px dashed #f5576c; border-radius: 15px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; }
        .upload-area:hover { background: #fff0f0; }
        .upload-area i { font-size: 3em; color: #f5576c; margin-bottom: 15px; }
        .upload-area input { display: none; }
        .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .style-card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; }
        .style-card:hover { border-color: #f5576c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 87, 108, 0.2); }
        .style-card.active { border-color: #f5576c; background: linear-gradient(135deg, #fff5f5 0%, #ffe0e3 100%); }
        .style-card i { font-size: 2em; margin-bottom: 10px; display: block; }
        .style-card h4 { color: #333; margin-bottom: 5px; font-size: 1em; }
        .style-card p { color: #666; font-size: 0.8em; }
        .slider-group { margin-top: 20px; background: white; padding: 15px; border-radius: 12px; }
        .slider-group label { display: block; margin-bottom: 10px; color: #555; }
        .slider-group input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: #e0e0e0; outline: none; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #f5576c; cursor: pointer; }
        .slider-value { text-align: right; color: #f5576c; font-weight: 600; margin-top: 8px; }
        .canvas-area { background: #fff5f5; border-radius: 15px; padding: 30px; min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .comparison-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .preview-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; flex: 1; min-width: 300px; }
        .preview-box h3 { color: #333; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4); }
        .btn-secondary { background: #fff0f0; color: #f5576c; }
        .btn-secondary:hover { background: #ffe0e3; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-info { margin-top: 15px; padding: 12px; background: white; border-radius: 10px; font-size: 0.9em; color: #555; }
        .processing-indicator { display: none; text-align: center; padding: 20px; }
        .processing-indicator.show { display: block; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #f5576c; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-palette"></i> 智能图像风格转换</h1>
            <p>油画 · 素描 · 水彩 · 动漫 · 多种艺术风格</p>
        </div>
        <div class="main-content">
            <div class="left-panel">
                <div class="section-title"><i class="fas fa-upload"></i> 上传图片</div>
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传图片</p>
                    <p style="font-size: 0.85em;">支持 JPG、PNG 格式，最大 10MB</p>
                    <input type="file" id="imageInput" accept="image/jpeg,image/png">
                </div>
                <div id="fileInfo" class="file-info" style="display: none;"></div>
                <div class="section-title" style="margin-top: 25px;"><i class="fas fa-palette"></i> 选择风格</div>
                <div class="style-grid">
                    <div class="style-card active" data-style="oil">
                        <i class="fas fa-paint-brush" style="color: #f5576c;"></i>
                        <h4>油画</h4>
                        <p>印象派油画效果</p>
                    </div>
                    <div class="style-card" data-style="sketch">
                        <i class="fas fa-pencil-alt" style="color: #333;"></i>
                        <h4>素描</h4>
                        <p>铅笔素描效果</p>
                    </div>
                    <div class="style-card" data-style="watercolor">
                        <i class="fas fa-tint" style="color: #667eea;"></i>
                        <h4>水彩</h4>
                        <p>水彩画效果</p>
                    </div>
                    <div class="style-card" data-style="anime">
                        <i class="fas fa-star" style="color: #ffc107;"></i>
                        <h4>动漫</h4>
                        <p>日式动漫风格</p>
                    </div>
                    <div class="style-card" data-style="pop">
                        <i class="fas fa-image" style="color: #764ba2;"></i>
                        <h4>波普艺术</h4>
                        <p>波普艺术风格</p>
                    </div>
                    <div class="style-card" data-style="vintage">
                        <i class="fas fa-camera-retro" style="color: #856404;"></i>
                        <h4>复古</h4>
                        <p>老照片效果</p>
                    </div>
                </div>
                <div class="slider-group">
                    <label><i class="fas fa-sliders-h"></i> 风格强度</label>
                    <input type="range" id="intensity" min="0" max="100" value="70">
                    <div class="slider-value" id="intensityValue">70%</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="canvas-area" id="canvasArea">
                    <div style="text-align: center; color: #666;">
                        <i class="fas fa-image" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                        <p>上传图片后，这里将显示对比效果</p>
                    </div>
                </div>
                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p>AI正在处理中，请稍候...</p>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled><i class="fas fa-magic"></i> 应用风格</button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled><i class="fas fa-download"></i> 下载结果</button>
                    <button class="btn btn-secondary" onclick="resetAll()"><i class="fas fa-redo"></i> 重置</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let originalImage = null;
        let currentStyle = 'oil';
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#fff0f0'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.background = 'white');
        uploadArea.addEventListener('drop', e => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        function handleFileUpload(e) { const file = e.target.files[0]; if (file) handleFile(file); }
        function handleFile(file) {
            const validTypes = ['image/jpeg', 'image/png'];
            if (!validTypes.includes(file.type)) { alert('请上传 JPG 或 PNG 格式的图片'); return; }
            if (file.size > 10 * 1024 * 1024) { alert('文件大小不能超过 10MB'); return; }
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    displayOriginal(img);
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('fileInfo').innerHTML = `文件: ${file.name}<br>尺寸: ${img.width}×${img.height}<br>大小: ${(file.size / 1024).toFixed(2)} KB`;
                    document.getElementById('processBtn').disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function displayOriginal(img) {
            const canvasArea = document.getElementById('canvasArea');
            canvasArea.innerHTML = `
                <div class="comparison-container">
                    <div class="preview-box"><h3><i class="fas fa-image"></i> 原图</h3><canvas id="originalCanvas"></canvas></div>
                    <div class="preview-box" id="processedBox" style="display: none;"><h3><i class="fas fa-palette"></i> 风格化</h3><canvas id="processedCanvas"></canvas></div>
                </div>`;
            const canvas = document.getElementById('originalCanvas');
            const maxSize = 400;
            let width = img.width, height = img.height;
            if (width > maxSize || height > maxSize) { const ratio = Math.min(maxSize / width, maxSize / height); width *= ratio; height *= ratio; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        }
        document.querySelectorAll('.style-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentStyle = card.dataset.style;
            });
        });
        document.getElementById('intensity').addEventListener('input', e => document.getElementById('intensityValue').textContent = e.target.value + '%');
        function processImage() {
            if (!originalImage) { alert('请先上传图片'); return; }
            const intensity = parseInt(document.getElementById('intensity').value) / 100;
            document.getElementById('processingIndicator').classList.add('show');
            document.getElementById('processBtn').disabled = true;
            setTimeout(() => {
                document.getElementById('processedBox').style.display = 'block';
                const originalCanvas = document.getElementById('originalCanvas');
                const processedCanvas = document.getElementById('processedCanvas');
                processedCanvas.width = originalCanvas.width;
                processedCanvas.height = originalCanvas.height;
                const ctx = processedCanvas.getContext('2d');
                ctx.drawImage(originalCanvas, 0, 0);
                let imageData = ctx.getImageData(0, 0, processedCanvas.width, processedCanvas.height);
                applyStyle(imageData, processedCanvas.width, processedCanvas.height, currentStyle, intensity);
                ctx.putImageData(imageData, 0, 0);
                document.getElementById('processingIndicator').classList.remove('show');
                document.getElementById('processBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
            }, 1500);
        }
        function applyStyle(imageData, width, height, style, intensity) {
            const data = imageData.data;
            const temp = new Uint8ClampedArray(data);
            switch (style) {
                case 'oil':
                    applyOilPainting(data, width, height, intensity);
                    break;
                case 'sketch':
                    applySketch(data, width, height, intensity);
                    break;
                case 'watercolor':
                    applyWatercolor(data, width, height, intensity);
                    break;
                case 'anime':
                    applyAnime(data, width, height, intensity);
                    break;
                case 'pop':
                    applyPopArt(data, width, height, intensity);
                    break;
                case 'vintage':
                    applyVintage(data, width, height, intensity);
                    break;
            }
        }
        function applyOilPainting(data, width, height, intensity) {
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % width;
                const y = Math.floor((i / 4) / width);
                let r = 0, g = 0, b = 0, count = 0;
                for (let dy = -2; dy <= 2; dy++) {
                    for (let dx = -2; dx <= 2; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                            const ni = (ny * width + nx) * 4;
                            r += data[ni]; g += data[ni + 1]; b += data[ni + 2]; count++;
                        }
                    }
                }
                data[i] = data[i] * (1 - intensity) + (Math.round(r / count / 32) * 32) * intensity;
                data[i + 1] = data[i + 1] * (1 - intensity) + (Math.round(g / count / 32) * 32) * intensity;
                data[i + 2] = data[i + 2] * (1 - intensity) + (Math.round(b / count / 32) * 32) * intensity;
            }
        }
        function applySketch(data, width, height, intensity) {
            const gray = new Uint8ClampedArray(width * height);
            for (let i = 0; i < data.length; i += 4) {
                gray[i / 4] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            }
            const edges = new Uint8ClampedArray(width * height);
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    const gx = -gray[idx - width - 1] - 2 * gray[idx - width] - gray[idx - width + 1] + gray[idx + width - 1] + 2 * gray[idx + width] + gray[idx + width + 1];
                    const gy = -gray[idx - width - 1] - 2 * gray[idx - 1] - gray[idx + width - 1] + gray[idx - width + 1] + 2 * gray[idx + 1] + gray[idx + width + 1];
                    edges[idx] = Math.min(255, Math.sqrt(gx * gx + gy * gy));
                }
            }
            for (let i = 0; i < data.length; i += 4) {
                const edge = edges[i / 4];
                const inverted = 255 - edge;
                data[i] = data[i] * (1 - intensity) + inverted * intensity;
                data[i + 1] = data[i + 1] * (1 - intensity) + inverted * intensity;
                data[i + 2] = data[i + 2] * (1 - intensity) + inverted * intensity;
            }
        }
        function applyWatercolor(data, width, height, intensity) {
            const temp = new Uint8ClampedArray(data);
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % width;
                const y = Math.floor((i / 4) / width);
                let r = 0, g = 0, b = 0, count = 0;
                for (let dy = -3; dy <= 3; dy++) {
                    for (let dx = -3; dx <= 3; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                            const ni = (ny * width + nx) * 4;
                            r += temp[ni]; g += temp[ni + 1]; b += temp[ni + 2]; count++;
                        }
                    }
                }
                const avgR = r / count, avgG = g / count, avgB = b / count;
                const saturation = 1 + intensity * 0.5;
                data[i] = data[i] * (1 - intensity) + Math.min(255, (avgR - 128) * saturation + 128) * intensity;
                data[i + 1] = data[i + 1] * (1 - intensity) + Math.min(255, (avgG - 128) * saturation + 128) * intensity;
                data[i + 2] = data[i + 2] * (1 - intensity) + Math.min(255, (avgB - 128) * saturation + 128) * intensity;
            }
        }
        function applyAnime(data, width, height, intensity) {
            for (let i = 0; i < data.length; i += 4) {
                const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                const quantized = Math.round(gray / 32) * 32;
                const brightness = quantized / 255;
                const contrast = 1 + intensity * 0.3;
                data[i] = Math.min(255, Math.max(0, (data[i] - 128) * contrast + 128));
                data[i + 1] = Math.min(255, Math.max(0, (data[i + 1] - 128) * contrast + 128));
                data[i + 2] = Math.min(255, Math.max(0, (data[i + 2] - 128) * contrast + 128));
                const saturation = 1 + intensity * 0.3;
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                data[i] = Math.min(255, Math.max(0, avg + (data[i] - avg) * saturation));
                data[i + 1] = Math.min(255, Math.max(0, avg + (data[i + 1] - avg) * saturation));
                data[i + 2] = Math.min(255, Math.max(0, avg + (data[i + 2] - avg) * saturation));
            }
        }
        function applyPopArt(data, width, height, intensity) {
            const colors = [[255, 0, 128], [0, 255, 255], [255, 255, 0], [255, 0, 0], [0, 255, 0], [0, 0, 255]];
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const colorIdx = Math.floor((gray / 255) * (colors.length - 1));
                const [r, g, b] = colors[colorIdx];
                data[i] = data[i] * (1 - intensity) + r * intensity;
                data[i + 1] = data[i + 1] * (1 - intensity) + g * intensity;
                data[i + 2] = data[i + 2] * (1 - intensity) + b * intensity;
            }
        }
        function applyVintage(data, width, height, intensity) {
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const vintageR = r * 0.393 + g * 0.769 + b * 0.189;
                const vintageG = r * 0.349 + g * 0.686 + b * 0.168;
                const vintageB = r * 0.272 + g * 0.534 + b * 0.131;
                data[i] = Math.min(255, r * (1 - intensity) + vintageR * intensity);
                data[i + 1] = Math.min(255, g * (1 - intensity) + vintageG * intensity);
                data[i + 2] = Math.min(255, b * (1 - intensity) + vintageB * intensity);
            }
        }
        function downloadImage() {
            const canvas = document.getElementById('processedCanvas');
            if (!canvas) { alert('请先处理图片'); return; }
            const link = document.createElement('a');
            link.download = '风格化_' + currentStyle + '_' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        function resetAll() {
            originalImage = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = '<div style="text-align: center; color: #666;"><i class="fas fa-image" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i><p>上传图片后，这里将显示对比效果</p></div>';
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('intensity').value = 70;
            document.getElementById('intensityValue').textContent = '70%';
        }
    </script>
</body>
</html>
