    <script>
        let originalImage = null;
        let processedCanvas = null;
        let currentStyle = 'oil';
        let isProcessing = false;

        // 风格选择
        document.querySelectorAll('.style-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentStyle = card.dataset.style;
            });
        });

        // 强度滑块
        document.getElementById('intensity').addEventListener('input', (e) => {
            document.getElementById('intensityValue').textContent = e.target.value + '%';
        });

        // 文件上传
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#fff0f0'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault(); uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) handleFile(files[0]);
        });

        function handleFileUpload(e) { const file = e.target.files[0]; if (file) handleFile(file); }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showStatus('请上传图片文件', 'error'); return; }
            if (file.size > 10 * 1024 * 1024) { showStatus('图片大小不能超过10MB', 'error'); return; }
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `<div>文件: ${file.name}</div><div style="margin-top:5px;">大小: ${(file.size / 1024).toFixed(1)} KB</div>`;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => { originalImage = img; displayOriginal(img); document.getElementById('processBtn').disabled = false; showStatus('图片已加载，点击AI转换风格开始', 'success'); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayOriginal(img) {
            const area = document.getElementById('canvasArea');
            document.getElementById('previewHint').style.display = 'none';
            area.innerHTML = `
                <div class="comparison-container">
                    <div class="preview-box">
                        <h3><i class="fas fa-image"></i> 原图</h3>
                        <img id="originalImg" src="${img.src}" style="max-height:350px;border-radius:10px;">
                    </div>
                    <div class="preview-box" id="resultBox" style="display:none;">
                        <h3><i class="fas fa-palette"></i> <span id="styleName">油画</span></h3>
                        <canvas id="resultCanvas"></canvas>
                    </div>
                </div>
            `;
            const styleNames = { oil: '油画', sketch: '素描', watercolor: '水彩', anime: '动漫', popart: '波普艺术', vintage: '复古' };
            document.getElementById('styleName').textContent = styleNames[currentStyle] || '风格转换';
        }

        async function processImage() {
            if (!originalImage || isProcessing) return;
            isProcessing = true;
            const intensity = parseInt(document.getElementById('intensity').value) / 100;
            showStatus('AI正在转换风格，请稍候...', 'loading');
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processingIndicator').classList.add('show');

            try {
                // 创建工作画布
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSize = 600;
                let width = originalImage.width, height = originalImage.height;
                if (width > maxSize || height > maxSize) { const ratio = Math.min(maxSize / width, maxSize / height); width = Math.round(width * ratio); height = Math.round(height * ratio); }
                canvas.width = width; canvas.height = height;
                ctx.drawImage(originalImage, 0, 0, width, height);

                // 根据风格应用不同的滤镜
                switch (currentStyle) {
                    case 'oil': applyOilStyle(ctx, width, height, intensity); break;
                    case 'sketch': applySketchStyle(ctx, width, height, intensity); break;
                    case 'watercolor': applyWatercolorStyle(ctx, width, height, intensity); break;
                    case 'anime': applyAnimeStyle(ctx, width, height, intensity); break;
                    case 'popart': applyPopArtStyle(ctx, width, height, intensity); break;
                    case 'vintage': applyVintageStyle(ctx, width, height, intensity); break;
                }

                processedCanvas = canvas;
                const resultBox = document.getElementById('resultBox');
                resultBox.style.display = 'block';
                const resultCanvas = document.getElementById('resultCanvas');
                resultCanvas.width = canvas.width; resultCanvas.height = canvas.height;
                resultCanvas.getContext('2d').drawImage(canvas, 0, 0);
                document.getElementById('downloadBtn').disabled = false;
                showStatus('风格转换完成！可以下载结果', 'success');

            } catch (err) {
                console.error(err);
                showStatus('处理失败，请尝试其他图片', 'error');
            } finally {
                isProcessing = false;
                document.getElementById('processBtn').disabled = false;
                document.getElementById('processingIndicator').classList.remove('show');
            }
        }

        // 油画风格
        function applyOilStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            // 模糊效果模拟笔触
            const kernelSize = 5;
            const half = Math.floor(kernelSize / 2);
            const original = new Uint8ClampedArray(data);

            for (let y = half; y < height - half; y++) {
                for (let x = half; x < width - half; x++) {
                    let r = 0, g = 0, b = 0, count = 0;
                    for (let dy = -half; dy <= half; dy += 2) {
                        for (let dx = -half; dx <= half; dx += 2) {
                            const i = ((y + dy) * width + (x + dx)) * 4;
                            r += original[i]; g += original[i + 1]; b += original[i + 2]; count++;
                        }
                    }
                    const i = (y * width + x) * 4;
                    data[i] = Math.round(original[i] * (1 - intensity) + (r / count) * intensity);
                    data[i + 1] = Math.round(original[i + 1] * (1 - intensity) + (g / count) * intensity);
                    data[i + 2] = Math.round(original[i + 2] * (1 - intensity) + (b / count) * intensity);
                }
            }

            // 增加饱和度和对比度
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                data[i] = Math.min(255, Math.round(r + (r - gray) * 0.3 * intensity));
                data[i + 1] = Math.min(255, Math.round(g + (g - gray) * 0.3 * intensity));
                data[i + 2] = Math.min(255, Math.round(b + (b - gray) * 0.3 * intensity));
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 素描风格
        function applySketchStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 边缘检测
            const edges = new Uint8Array(width * height);
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const i = (y * width + x) * 4;
                    const gx = (
                        -1 * original[((y-1)*width+(x-1))*4] + 1 * original[((y-1)*width+(x+1))*4] +
                        -2 * original[(y*width+(x-1))*4] + 2 * original[(y*width+(x+1))*4] +
                        -1 * original[((y+1)*width+(x-1))*4] + 1 * original[((y+1)*width+(x+1))*4]
                    );
                    const gy = (
                        -1 * original[((y-1)*width+(x-1))*4] - 2 * original[((y-1)*width+x)*4] - 1 * original[((y-1)*width+(x+1))*4] +
                        1 * original[((y+1)*width+(x-1))*4] + 2 * original[((y+1)*width+x)*4] + 1 * original[((y+1)*width+(x+1))*4]
                    );
                    const mag = Math.sqrt(gx * gx + gy * gy);
                    edges[y * width + x] = Math.min(255, mag);
                }
            }

            // 应用边缘
            for (let i = 0; i < data.length; i += 4) {
                const edge = edges[i / 4];
                const gray = 0.299 * original[i] + 0.587 * original[i + 1] + 0.114 * original[i + 2];
                const lineIntensity = Math.min(255, edge * 3 * intensity);
                const sketch = Math.max(0, gray - lineIntensity);
                data[i] = data[i + 1] = data[i + 2] = Math.round(sketch);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 水彩风格
        function applyWatercolorStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 多次模糊模拟水彩扩散
            for (let pass = 0; pass < 3; pass++) {
                const kernelSize = 3 + pass * 2;
                const half = Math.floor(kernelSize / 2);
                const temp = new Uint8ClampedArray(data);

                for (let y = half; y < height - half; y++) {
                    for (let x = half; x < width - half; x++) {
                        let r = 0, g = 0, b = 0, count = 0;
                        for (let dy = -half; dy <= half; dy++) {
                            for (let dx = -half; dx <= half; dx++) {
                                const i = ((y + dy) * width + (x + dx)) * 4;
                                r += temp[i]; g += temp[i + 1]; b += temp[i + 2]; count++;
                            }
                        }
                        const i = (y * width + x) * 4;
                        temp[i] = r / count; temp[i + 1] = g / count; temp[i + 2] = b / count;
                    }
                }
                data.set(temp);
            }

            // 增加亮度，降低饱和度
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                data[i] = Math.round(gray + (r - gray) * 0.6 * intensity + 10 * intensity);
                data[i + 1] = Math.round(gray + (g - gray) * 0.6 * intensity + 10 * intensity);
                data[i + 2] = Math.round(gray + (b - gray) * 0.6 * intensity + 10 * intensity);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 动漫风格
        function applyAnimeStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 边缘检测
            const edges = new Uint8Array(width * height);
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const i = (y * width + x) * 4;
                    const gx = (
                        -1 * original[((y-1)*width+(x-1))*4] + 1 * original[((y-1)*width+(x+1))*4] +
                        -2 * original[(y*width+(x-1))*4] + 2 * original[(y*width+(x+1))*4] +
                        -1 * original[((y+1)*width+(x-1))*4] + 1 * original[((y+1)*width+(x+1))*4]
                    );
                    const gy = (
                        -1 * original[((y-1)*width+(x-1))*4] - 2 * original[((y-1)*width+x)*4] - 1 * original[((y-1)*width+(x+1))*4] +
                        1 * original[((y+1)*width+(x-1))*4] + 2 * original[((y+1)*width+x)*4] + 1 * original[((y+1)*width+(x+1))*4]
                    );
                    edges[y * width + x] = Math.sqrt(gx * gx + gy * gy);
                }
            }

            // 色彩量化
            for (let i = 0; i < data.length; i += 4) {
                const edge = edges[i / 4];
                const idx = i / 4;
                const y = Math.floor(idx / width);
                const x = idx % width;

                // 检测边缘并加深
                if (edge > 30) {
                    data[i] = Math.max(0, data[i] - 40 * intensity);
                    data[i + 1] = Math.max(0, data[i + 1] - 40 * intensity);
                    data[i + 2] = Math.max(0, data[i + 2] - 40 * intensity);
                } else {
                    // 色彩简化
                    const levels = 8;
                    data[i] = Math.round(Math.round(data[i] / 255 * levels) / levels * 255);
                    data[i + 1] = Math.round(Math.round(data[i + 1] / 255 * levels) / levels * 255);
                    data[i + 2] = Math.round(Math.round(data[i + 2] / 255 * levels) / levels * 255);

                    // 增加饱和度
                    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    data[i] = Math.min(255, Math.round(data[i] + (data[i] - gray) * 0.5 * intensity));
                    data[i + 1] = Math.min(255, Math.round(data[i + 1] + (data[i + 1] - gray) * 0.5 * intensity));
                    data[i + 2] = Math.min(255, Math.round(data[i + 2] + (data[i + 2] - gray) * 0.5 * intensity));
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 波普艺术风格
        function applyPopArtStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 色彩量化到鲜艳颜色
            const popColors = [
                [255, 0, 128],    // 粉红
                [255, 165, 0],    // 橙色
                [255, 255, 0],    // 黄色
                [0, 255, 255],    // 青色
                [128, 0, 255],    // 紫色
                [255, 0, 0],      // 红色
                [0, 255, 0],      // 绿色
                [0, 0, 255],      // 蓝色
            ];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                // 根据亮度选择颜色
                const colorIdx = Math.floor(Math.min(gray / 255, 0.99) * popColors.length);
                let closestColor = popColors[colorIdx];

                // 混合原图和波普颜色
                data[i] = Math.round(original[i] * (1 - intensity) + closestColor[0] * intensity);
                data[i + 1] = Math.round(original[i + 1] * (1 - intensity) + closestColor[1] * intensity);
                data[i + 2] = Math.round(original[i + 2] * (1 - intensity) + closestColor[2] * intensity);

                // 增加对比度
                data[i] = Math.min(255, Math.max(0, (data[i] - 128) * 1.5 + 128));
                data[i + 1] = Math.min(255, Math.max(0, (data[i + 1] - 128) * 1.5 + 128));
                data[i + 2] = Math.min(255, Math.max(0, (data[i + 2] - 128) * 1.5 + 128));
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 复古风格
        function applyVintageStyle(ctx, width, height, intensity) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i + 1], b = data[i + 2];

                // 降低饱和度
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = gray + (r - gray) * (1 - intensity * 0.5);
                g = gray + (g - gray) * (1 - intensity * 0.5);
                b = gray + (b - gray) * (1 - intensity * 0.5);

                // 暖色调
                r = r + 20 * intensity;
                b = b - 20 * intensity;

                // 暗角效果
                const idx = i / 4;
                const x = idx % width - width / 2;
                const y = Math.floor(idx / width) - height / 2;
                const dist = Math.sqrt(x * x + y * y) / (width / 2);
                const vignette = Math.max(0.3, 1 - dist * 0.5 * intensity);
                r *= vignette; g *= vignette; b *= vignette;

                data[i] = Math.min(255, Math.max(0, Math.round(r)));
                data[i + 1] = Math.min(255, Math.max(0, Math.round(g)));
                data[i + 2] = Math.min(255, Math.max(0, Math.round(b)));
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function downloadResult() {
            if (!processedCanvas) return;
            const link = document.createElement('a');
            link.download = '风格转换_' + Date.now() + '.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }

        function showStatus(text, type) { const bar = document.getElementById('statusBar'); document.getElementById('statusText').textContent = text; bar.className = 'status-bar show ' + type; }
        function hideStatus() { document.getElementById('statusBar').className = 'status-bar'; }

        function resetAll() {
            originalImage = null; processedCanvas = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `<div class="preview-hint" id="previewHint"><i class="fas fa-palette"></i><p>上传图片，选择风格，即可生成艺术作品</p></div>`;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('processingIndicator').classList.remove('show');
            hideStatus();
        }
    </script>
