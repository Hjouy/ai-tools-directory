    <style>

        }

        .tool-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .tool-btn i {
            font-size: 16px;
        }

        .file-upload {
            display: none;
        }

        .upload-label {
            padding: 10px 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;

        .upload-label:hover {
            transform: translateY(-2px);

        .workspace {
            display: flex;

            align-items: center;

            overflow: hidden;

        }

        .sidebar {

        .action-btn {

        .crop-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
        .crop-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }

        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;

            color: #00d4ff;

        @keyframes spin {
            from { transform: rotate(0deg); }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 在线PS照片编辑器</h1>
            <p>专业图片处理工具 - 裁剪、旋转、滤镜、调整、文字、涂鸦，完全免费</p>

        <div class="toolbar">
            <div class="tool-group">

                <label for="imageUpload" class="upload-label">

            <div class="tool-group">

                </button>
                <button class="tool-btn" onclick="switchTool('draw')" id="btn-draw">

            <div class="sidebar">

                    <h3 class="panel-title">图片调整</h3>
                    <div class="control-group">
                        <label>亮度</label>

                    <div class="control-group">
                        <label>对比度</label>

                        <div class="value-display" id="contrastValue">100%</div>
                    </div>
                    <div class="control-group">
                        <label>饱和度</label>
                        <input type="range" id="saturation" min="0" max="200" value="100" oninput="applyAdjustments()">
                        <div class="value-display" id="saturationValue">100%</div>
                    </div>
                    <div class="control-group">
                        <label>灰度</label>
                        <input type="range" id="grayscale" min="0" max="100" value="0" oninput="applyAdjustments()">
                        <div class="value-display" id="grayscaleValue">0%</div>
                    </div>
                    <div class="control-group">
                        <label>色相旋转</label>
                        <input type="range" id="hue" min="0" max="360" value="0" oninput="applyAdjustments()">
                        <div class="value-display" id="hueValue">0°</div>
                    </div>
                    <div class="control-group">

                <!-- 滤镜面板 -->

                    <h3 class="panel-title">滤镜效果</h3>
                    <div class="filter-grid">
                        <button class="filter-btn active" onclick="applyFilter('none')">原图</button>
                        <button class="filter-btn" onclick="applyFilter('grayscale')">黑白</button>
                        <button class="filter-btn" onclick="applyFilter('sepia')">复古</button>
                        <button class="filter-btn" onclick="applyFilter('invert')">反色</button>
                        <button class="filter-btn" onclick="applyFilter('brightness')">明亮</button>
                        <button class="filter-btn" onclick="applyFilter('contrast')">高对比</button>
                        <button class="filter-btn" onclick="applyFilter('saturate')">鲜艳</button>
                        <button class="filter-btn" onclick="applyFilter('warm')">暖色</button>

                <!-- 裁剪面板 -->
                <div class="panel" id="panel-crop">

                            <i class="fas fa-check"></i> 应用裁剪
                        </button>
                        <button class="action-btn warning" onclick="cancelCrop()">
                            <i class="fas fa-times"></i> 取消

                            <i class="fas fa-plus"></i> 添加文字

                        </button>

                        <button class="action-btn" onclick="flip('horizontal')">
                            <i class="fas fa-arrows-alt-h"></i> 水平翻转
                        </button>

                        </button>

                        <label>自由旋转</label>
                        <input type="range" id="freeRotate" min="-180" max="180" value="0" oninput="freeRotateImage()">

    <div class="loading" id="loading">
        <i class="fas fa-spinner"></i>
        <p>处理中...</p>
    </div>

    <script>
        // 全局变量
        let canvas, ctx;
        let originalImage = null;
        let currentFilter = 'none';
        let adjustments = {
            brightness: 100,
            contrast: 100,
            saturation: 100,
            grayscale: 0,
            hue: 0,
            blur: 0
        };
        let isDrawing = false;
        let brushSize = 5;
        let isEraser = false;
        let rotation = 0;
        let cropStart = null;
        let cropEnd = null;
        let isCropping = false;
        let texts = [];

        // 初始化
        window.onload = function() {
            canvas = document.getElementById('imageCanvas');
            ctx = canvas.getContext('2d');

            document.getElementById('imageUpload').addEventListener('change', handleImageUpload);
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('mouseout', stopDraw);
            canvas.addEventListener('touchstart', handleTouch);
            canvas.addEventListener('touchmove', handleTouch);
            canvas.addEventListener('touchend', stopDraw);
        };

        // 图片上传
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    document.getElementById('placeholder').style.display = 'none';
                    canvas.style.display = 'block';
                    resetAll();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 切换工具
        function switchTool(tool) {
            // 移除所有按钮激活状态
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tool).classList.add('active');

            // 切换面板
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById('panel-' + tool).classList.add('active');

            // 取消裁剪
            if (tool !== 'crop') {
                cancelCrop();
            }
        }

        // 应用调整
        function applyAdjustments() {
            if (!originalImage) return;

            adjustments.brightness = document.getElementById('brightness').value;
            adjustments.contrast = document.getElementById('contrast').value;
            adjustments.saturation = document.getElementById('saturation').value;
            adjustments.grayscale = document.getElementById('grayscale').value;
            adjustments.hue = document.getElementById('hue').value;
            adjustments.blur = document.getElementById('blur').value;

            // 更新显示值
            document.getElementById('brightnessValue').textContent = adjustments.brightness + '%';
            document.getElementById('contrastValue').textContent = adjustments.contrast + '%';
            document.getElementById('saturationValue').textContent + adjustments.saturation + '%';
            document.getElementById('grayscaleValue').textContent = adjustments.grayscale + '%';
            document.getElementById('hueValue').textContent = adjustments.hue + '°';
            document.getElementById('blurValue').textContent = adjustments.blur + 'px';

            applyFilters();
        }

        // 应用滤镜
        function applyFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            applyFilters();
        }

        // 应用所有滤镜和调整
        function applyFilters() {
            if (!originalImage) return;

            // 重置画布
            ctx.filter = 'none';
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

            // 构建滤镜字符串
            let filterString = '';

            // 调整
            filterString += `brightness(${adjustments.brightness}%) `;
            filterString += `contrast(${adjustments.contrast}%) `;
            filterString += `saturate(${adjustments.saturation}%) `;
            filterString += `grayscale(${adjustments.grayscale}%) `;
            filterString += `hue-rotate(${adjustments.hue}deg) `;
            filterString += `blur(${adjustments.blur}px) `;

            // 预设滤镜
            switch (currentFilter) {
                case 'grayscale':
                    filterString += 'grayscale(100%) ';
                    break;
                case 'sepia':
                    filterString += 'sepia(100%) ';
                    break;
                case 'invert':
                    filterString += 'invert(100%) ';
                    break;
                case 'brightness':
                    filterString += 'brightness(130%) ';
                    break;
                case 'contrast':
                    filterString += 'contrast(150%) ';
                    break;
                case 'saturate':
                    filterString += 'saturate(200%) ';
                    break;
                case 'warm':
                    filterString += 'sepia(30%) saturate(140%) ';
                    break;
                case 'cool':
                    filterString += 'hue-rotate(180deg) saturate(80%) ';
                    break;
            }

            ctx.filter = filterString;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';
        }

        // 旋转
        function rotate(degrees) {
            if (!originalImage) return;

            const rad = degrees * Math.PI / 180;
            const sin = Math.abs(Math.sin(rad));
            const cos = Math.abs(Math.cos(rad));

            const newWidth = canvas.width * cos + canvas.height * sin;
            const newHeight = canvas.width * sin + canvas.height * cos;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = newWidth;
            tempCanvas.height = newHeight;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.translate(newWidth / 2, newHeight / 2);
            tempCtx.rotate(rad);
            tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);

            canvas.width = newWidth;
            canvas.height = newHeight;
            ctx.drawImage(tempCanvas, 0, 0);

            // 更新原始图片
            const img = new Image();
            img.onload = function() {
                originalImage = img;
            };
            img.src = canvas.toDataURL();
        }

        // 翻转
        function flip(direction) {
            if (!originalImage) return;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            if (direction === 'horizontal') {
                tempCtx.translate(canvas.width, 0);
                tempCtx.scale(-1, 1);
            } else {
                tempCtx.translate(0, canvas.height);
                tempCtx.scale(1, -1);
            }

            tempCtx.drawImage(canvas, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);

            // 更新原始图片
            const img = new Image();
            img.onload = function() {
                originalImage = img;
            };
            img.src = canvas.toDataURL();
        }

        // 自由旋转
        function freeRotateImage() {
            const degrees = document.getElementById('freeRotate').value;
            document.getElementById('freeRotateValue').textContent = degrees + '°';

            // 先恢复到原图
            ctx.filter = 'none';
            ctx.drawImage(originalImage, 0, 0);

            // 应用旋转
            const rad = degrees * Math.PI / 180;
            const sin = Math.abs(Math.sin(rad));
            const cos = Math.abs(Math.cos(rad));

            const newWidth = canvas.width * cos + canvas.height * sin;
            const newHeight = canvas.width * sin + canvas.height * cos;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = newWidth;
            tempCanvas.height = newHeight;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.translate(newWidth / 2, newHeight / 2);
            tempCtx.rotate(rad);
            tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);

            canvas.width = newWidth;
            canvas.height = newHeight;
            ctx.drawImage(tempCanvas, 0, 0);

            // 重新应用滤镜
            applyFilters();
        }

        // 添加文字
        function addText() {
            const text = document.getElementById('textContent').value;
            if (!text || !originalImage) {
                alert('请先上传图片并输入文字内容');
                return;
            }

            const fontSize = document.getElementById('fontSize').value;
            const color = document.getElementById('textColor').value;
            const fontFamily = document.getElementById('fontFamily').value;

            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            // 更新原始图片
            const img = new Image();
            img.onload = function() {
                originalImage = img;
            };
            img.src = canvas.toDataURL();
        }

        // 更新文字预览
        function updateTextPreview() {
            const fontSize = document.getElementById('fontSize').value;
            document.getElementById('fontSizeValue').textContent = fontSize + 'px';
        }

        // 涂鸦
        function startDraw(e) {
            if (!originalImage) return;
            isDrawing = true;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let x, y;
            if (e.type === 'touchstart') {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }

            ctx.beginPath();
            ctx.moveTo(x, y);

            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = document.getElementById('brushColor').value;
            }

            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let x, y;
            if (e.type === 'touchmove') {
                e.preventDefault();
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function stopDraw() {
            if (isDrawing) {
                isDrawing = false;
                ctx.closePath();

                // 更新原始图片
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                };
                img.src = canvas.toDataURL();
            }
        }

        function handleTouch(e) {
            if (e.type === 'touchstart') {
                startDraw(e);
            } else if (e.type === 'touchmove') {
                draw(e);
            }
        }

        function setBrushSize(size) {
            brushSize = size;
            document.querySelectorAll('.brush-size-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setDrawMode(eraser) {
            isEraser = eraser;
        }

        // 裁剪
        function setCropRatio() {
            // 裁剪比例设置逻辑
        }

        function applyCrop() {
            if (!cropStart || !cropEnd || !originalImage) {
                alert('请先在图片上选择裁剪区域');
                return;
            }

            const x = Math.min(cropStart.x, cropEnd.x);
            const y = Math.min(cropStart.y, cropEnd.y);
            const width = Math.abs(cropEnd.x - cropStart.x);
            const height = Math.abs(cropEnd.y - cropStart.y);

            if (width < 10 || height < 10) {
                alert('裁剪区域太小');
                return;
            }

            const croppedData = ctx.getImageData(x, y, width, height);
            canvas.width = width;
            canvas.height = height;
            ctx.putImageData(croppedData, 0, 0);

            // 更新原始图片
            const img = new Image();
            img.onload = function() {
                originalImage = img;
            };
            img.src = canvas.toDataURL();

            cancelCrop();
        }

        function cancelCrop() {
            cropStart = null;
            cropEnd = null;
            isCropping = false;
        }

        // 下载图片
        function downloadImage() {
            if (!originalImage) {
                alert('请先上传图片');
                return;
            }

            const link = document.createElement('a');
            link.download = 'edited-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 重置所有
        function resetAll() {
            if (!originalImage) return;

            // 重置调整
            adjustments = {
                brightness: 100,
                contrast: 100,
                saturation: 100,
                grayscale: 0,
                hue: 0,
                blur: 0
            };

            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturation').value = 100;
            document.getElementById('grayscale').value = 0;
            document.getElementById('hue').value = 0;
            document.getElementById('blur').value = 0;
            document.getElementById('freeRotate').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '100%';
            document.getElementById('contrastValue').textContent = '100%';
            document.getElementById('saturationValue').textContent = '100%';
            document.getElementById('grayscaleValue').textContent = '0%';
            document.getElementById('hueValue').textContent = '0°';
            document.getElementById('blurValue').textContent = '0px';
            document.getElementById('freeRotateValue').textContent = '0°';

            // 重置滤镜
            currentFilter = 'none';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.filter-btn').classList.add('active');

            // 重绘原图
            ctx.filter = 'none';
            ctx.drawImage(originalImage, 0, 0);
        }
    </script>
