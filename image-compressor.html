<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线图片压缩工具 - 支持JPG/PNG/WebP批量压缩，智能压缩算法，保持高质量的同时减小文件大小，无需注册，完全免费">
    <meta name="keywords" content="图片压缩,在线压缩,JPG压缩,PNG压缩,WebP压缩,批量压缩">
    <meta name="author" content="AI工具导航站">
    <title>在线图片压缩工具 | AI工具导航站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #aaa;
            font-size: 1.1em;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(0, 212, 255, 0.5);
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d4ff;
        }

        .upload-area i {
            font-size: 64px;
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .upload-area h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #aaa;
            font-size: 14px;
        }

        .settings {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .settings h3 {
            margin-bottom: 20px;
            color: #00d4ff;
        }

        .setting-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .setting-item {
            flex: 1;
            min-width: 200px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }

        .setting-item select,
        .setting-item input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .setting-item select:focus,
        .setting-item input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .quality-slider {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quality-slider input[type="range"] {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .quality-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00d4ff, #9b59b6);
            border-radius: 50%;
            cursor: pointer;
        }

        .quality-value {
            min-width: 50px;
            text-align: center;
            color: #00d4ff;
            font-weight: bold;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .result-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        .result-info {
            flex: 1;
        }

        .result-info h4 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #fff;
        }

        .result-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 10px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-value.saving {
            color: #10b981;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .bulk-actions {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .bulk-actions.active {
            display: block;
        }

        @media (max-width: 768px) {
            .result-item {
                flex-direction: column;
                text-align: center;
            }

            .result-stats {
                justify-content: center;
                flex-wrap: wrap;
            }

            .result-actions {
                justify-content: center;
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗜️ 在线图片压缩工具</h1>
            <p>智能压缩图片，保持高质量的同时减小文件大小，支持批量压缩</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>点击或拖拽图片到此处</h3>
            <p>支持 JPG、PNG、WebP 格式，可批量上传</p>
        </div>

        <div class="settings">
            <h3><i class="fas fa-cog"></i> 压缩设置</h3>
            <div class="setting-row">
                <div class="setting-item">
                    <label>输出格式</label>
                    <select id="outputFormat">
                        <option value="original">保持原格式</option>
                        <option value="jpeg">JPEG</option>
                        <option value="png">PNG</option>
                        <option value="webp">WebP（推荐，更小体积）</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>最大宽度（像素）</label>
                    <input type="number" id="maxWidth" value="1920" min="100" max="4096" step="100">
                </div>
                <div class="setting-item">
                    <label>最大高度（像素）</label>
                    <input type="number" id="maxHeight" value="1080" min="100" max="4096" step="100">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-item" style="flex: 2;">
                    <label>压缩质量</label>
                    <div class="quality-slider">
                        <span style="color: #aaa;">低</span>
                        <input type="range" id="quality" min="1" max="100" value="80">
                        <span style="color: #aaa;">高</span>
                        <span class="quality-value" id="qualityValue">80%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <i class="fas fa-spinner"></i>
            <p>正在压缩图片，请稍候...</p>
        </div>

        <div class="results" id="results"></div>

        <div class="bulk-actions" id="bulkActions">
            <button class="btn btn-success" onclick="downloadAll()">
                <i class="fas fa-download"></i> 下载全部
            </button>
        </div>
    </div>

    <script>
        let compressedImages = [];
        let originalImages = [];

        // 初始化
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });

        document.getElementById('uploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').style.borderColor = '#00d4ff';
        });

        document.getElementById('uploadArea').addEventListener('dragleave', () => {
            document.getElementById('uploadArea').style.borderColor = 'rgba(0, 212, 255, 0.5)';
        });

        document.getElementById('uploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').style.borderColor = 'rgba(0, 212, 255, 0.5)';
            handleFiles(e.dataTransfer.files);
        });

        document.getElementById('imageInput').addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        document.getElementById('quality').addEventListener('input', (e) => {
            document.getElementById('qualityValue').textContent = e.target.value + '%';
        });

        function handleFiles(files) {
            if (!files || files.length === 0) return;

            compressedImages = [];
            originalImages = [];
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').classList.remove('active');
            document.getElementById('bulkActions').classList.remove('active');
            document.getElementById('loading').classList.add('active');

            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    compressImage(file);
                }
            });
        }

        function compressImage(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImages.push({
                        name: file.name,
                        size: file.size,
                        img: img
                    });

                    // 压缩图片
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // 计算缩放
                    let width = img.width;
                    let height = img.height;
                    const maxWidth = parseInt(document.getElementById('maxWidth').value);
                    const maxHeight = parseInt(document.getElementById('maxHeight').value);

                    if (width > maxWidth || height > maxHeight) {
                        const ratio = Math.min(maxWidth / width, maxHeight / height);
                        width *= ratio;
                        height *= ratio;
                    }

                    canvas.width = Math.round(width);
                    canvas.height = Math.round(height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // 选择输出格式
                    const outputFormat = document.getElementById('outputFormat').value;
                    let mimeType = file.type;
                    let extension = file.name.split('.').pop();

                    if (outputFormat !== 'original') {
                        mimeType = `image/${outputFormat}`;
                        extension = outputFormat === 'jpeg' ? 'jpg' : outputFormat;
                    }

                    // 压缩并导出
                    const quality = parseInt(document.getElementById('quality').value) / 100;
                    canvas.toBlob(function(blob) {
                        const compressedUrl = URL.createObjectURL(blob);

                        compressedImages.push({
                            originalFile: file,
                            blob: blob,
                            url: compressedUrl,
                            name: file.name.replace(/\.[^.]+$/, '.' + extension),
                            originalSize: file.size,
                            compressedSize: blob.size,
                            width: canvas.width,
                            height: canvas.height
                        });

                        updateResults();
                    }, mimeType, quality);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateResults() {
            const resultsContainer = document.getElementById('results');

            // 检查是否所有图片都已处理
            if (compressedImages.length === originalImages.length) {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('results').classList.add('active');
                document.getElementById('bulkActions').classList.add('active');

                // 显示所有结果
                compressedImages.forEach((result, index) => {
                    const item = document.createElement('div');
                    item.className = 'result-item';

                    const savingPercent = ((1 - result.compressedSize / result.originalSize) * 100).toFixed(1);
                    const isSmaller = result.compressedSize < result.originalSize;

                    item.innerHTML = `
                        <img src="${result.url}" class="result-image" alt="${result.name}">
                        <div class="result-info">
                            <h4>${result.name}</h4>
                            <div class="result-stats">
                                <div class="stat-item">
                                    <span class="stat-label">原始大小</span>
                                    <span class="stat-value">${formatSize(result.originalSize)}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">压缩后</span>
                                    <span class="stat-value">${formatSize(result.compressedSize)}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">压缩率</span>
                                    <span class="stat-value ${isSmaller ? 'saving' : ''}">${isSmaller ? '-' : '+'}${savingPercent}%</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">尺寸</span>
                                    <span class="stat-value">${result.width}×${result.height}</span>
                                </div>
                            </div>
                            <div class="result-actions">
                                <button class="btn btn-success" onclick="downloadSingle(${index})">
                                    <i class="fas fa-download"></i> 下载
                                </button>
                                <button class="btn btn-primary" onclick="previewSingle(${index})">
                                    <i class="fas fa-eye"></i> 预览
                                </button>
                            </div>
                        </div>
                    `;

                    resultsContainer.appendChild(item);
                });
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function downloadSingle(index) {
            const result = compressedImages[index];
            const link = document.createElement('a');
            link.href = result.url;
            link.download = result.name;
            link.click();
        }

        function previewSingle(index) {
            const result = compressedImages[index];
            window.open(result.url, '_blank');
        }

        function downloadAll() {
            compressedImages.forEach((result, index) => {
                setTimeout(() => {
                    downloadSingle(index);
                }, index * 500); // 延迟下载，避免浏览器阻止
            });
        }
    </script>
</body>
</html>
