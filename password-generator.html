<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - 强密码在线生成 | AI工具导航</title>
  <meta name="description" content="免费在线密码生成器，自定义密码长度和字符类型，生成安全强密码。">
  <style>
    :root{--primary:#6366f1;--secondary:#a855f7;--bg:#0f0f1a;--bg-card:#1a1a2e;--text:#e2e8f0;--text-muted:#94a3b8;--border:#2d2d4e;--success:#10b981}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .nav-links{display:flex;gap:8px;list-style:none}
    .nav-links a{color:var(--text-muted);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:.9rem;transition:all .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--border)}
    .main{max-width:700px;margin:0 auto;padding:40px 24px 80px}
    .page-hero{text-align:center;padding:40px 0 32px}
    .page-hero h1{font-size:2rem;font-weight:800;margin-bottom:12px}
    .page-hero span{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-hero p{color:var(--text-muted);max-width:500px;margin:0 auto}
    .password-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px}
    .password-display{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;font-family:'Courier New',monospace;font-size:1.5rem;text-align:center;word-break:break-all;min-height:80px;display:flex;align-items:center;justify-content:center}
    .options{margin-bottom:24px}
    .option-group{margin-bottom:20px}
    .option-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-weight:600}
    .range-slider{width:100%;height:6px;background:var(--border);border-radius:3px;-webkit-appearance:none}
    .range-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--primary);border-radius:50%;cursor:pointer}
    .checkbox-group{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .checkbox-item{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer}
    .checkbox-item input{width:18px;height:18px;cursor:pointer}
    .generate-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:white;font-size:1.1rem;font-weight:700;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .generate-btn:hover{opacity:.9}
    .copy-btn{margin-top:12px;width:100%;padding:12px;background:rgba(16,185,129,.1);border:1px solid var(--success);color:var(--success);border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
    .copy-btn:hover{background:rgba(16,185,129,.2)}
    .strength-meter{height:6px;background:var(--border);border-radius:3px;margin:20px 0;overflow:hidden}
    .strength-fill{height:100%;transition:width .3s,background .3s}
    .strength-text{text-align:center;font-size:.9rem;font-weight:600;margin-top:8px}
    @media(max-width:768px){.checkbox-group{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo">🤖 AI工具导航</a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="password-generator.html" class="active">密码生成</a></li>
    <li><a href="converter.html">文件转换</a></li>
  </ul>
</nav>

<header class="page-hero">
  <h1><span>密码生成器</span></h1>
  <p>生成安全强密码，保护您的账户安全</p>
</header>

<main class="main">
  <div class="password-card">
    <div class="password-display" id="passwordDisplay">点击生成按钮创建密码</div>

    <div class="options">
      <div class="option-group">
        <div class="option-label">
          <span>密码长度</span>
          <span id="lengthValue">16</span>
        </div>
        <input type="range" class="range-slider" id="passwordLength" min="6" max="64" value="16" oninput="updateLength()">
      </div>

      <div class="option-group">
        <div class="option-label">字符类型</div>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="includeUpper" checked>
            <span>大写字母 (A-Z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeLower" checked>
            <span>小写字母 (a-z)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeNumbers" checked>
            <span>数字 (0-9)</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="includeSymbols" checked>
            <span>特殊符号 (!@#$)</span>
          </label>
        </div>
      </div>
    </div>

    <div class="strength-meter">
      <div class="strength-fill" id="strengthFill" style="width:0%;background:#ef4444"></div>
    </div>
    <div class="strength-text" id="strengthText">密码强度: 无</div>

    <button class="generate-btn" onclick="generatePassword()">
      🎲 生成新密码
    </button>
    <button class="copy-btn" onclick="copyPassword()">
      📋 复制密码
    </button>
  </div>
</main>

<footer style="background:var(--bg-card);border-top:1px solid var(--border);padding:24px;text-align:center;">
  <p style="color:var(--text-muted);font-size:.875rem;">© 2026 AI工具导航</p>
</footer>

<script>
function updateLength() {
  document.getElementById('lengthValue').textContent = document.getElementById('passwordLength').value;
}

function generatePassword() {
  const length = parseInt(document.getElementById('passwordLength').value);
  const includeUpper = document.getElementById('includeUpper').checked;
  const includeLower = document.getElementById('includeLower').checked;
  const includeNumbers = document.getElementById('includeNumbers').checked;
  const includeSymbols = document.getElementById('includeSymbols').checked;

  let chars = '';
  if (includeUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (includeLower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (includeNumbers) chars += '0123456789';
  if (includeSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (chars === '') {
    showToast('请至少选择一种字符类型');
    return;
  }

  let password = '';
  for (let i = 0; i < length; i++) {
    password += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  document.getElementById('passwordDisplay').textContent = password;
  checkStrength(password);
}

function checkStrength(password) {
  let score = 0;
  if (password.length >= 8) score++;
  if (password.length >= 12) score++;
  if (password.length >= 16) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^A-Za-z0-9]/.test(password)) score++;

  const strengthFill = document.getElementById('strengthFill');
  const strengthText = document.getElementById('strengthText');

  if (score <= 2) {
    strengthFill.style.width = '25%';
    strengthFill.style.background = '#ef4444';
    strengthText.textContent = '密码强度: 弱';
  } else if (score <= 4) {
    strengthFill.style.width = '50%';
    strengthFill.style.background = '#f59e0b';
    strengthText.textContent = '密码强度: 中等';
  } else if (score <= 5) {
    strengthFill.style.width = '75%';
    strengthFill.style.background = '#10b981';
    strengthText.textContent = '密码强度: 强';
  } else {
    strengthFill.style.width = '100%';
    strengthFill.style.background = '#6366f1';
    strengthText.textContent = '密码强度: 非常强';
  }
}

function copyPassword() {
  const password = document.getElementById('passwordDisplay').textContent;
  if (password === '点击生成按钮创建密码') {
    showToast('请先生成密码');
    return;
  }
  navigator.clipboard.writeText(password).then(() => {
    showToast('✅ 密码已复制到剪贴板！');
  }).catch(() => {
    showToast('复制失败，请手动选中复制');
  });
}

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #6366f1;color:#e2e8f0;padding:10px 22px;border-radius:8px;font-size:14px;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

generatePassword();
</script>
</body>
</html>
