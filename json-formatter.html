<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线JSON格式化工具 - 支持JSON格式化、压缩、验证、高亮显示、JSON转YAML，开发者必备工具">
    <meta name="keywords" content="JSON格式化,JSON压缩,JSON验证,JSON转YAML,在线JSON工具">
    <meta name="author" content="AI工具导航站">
    <title>在线JSON格式化工具 | AI工具导航站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #aaa;
            font-size: 1.1em;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .tool-group {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-right: 20px;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tool-group:last-child {
            border-right: none;
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .editor-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .editor-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h3 {
            font-size: 16px;
            color: #00d4ff;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .action-icon {
            color: #aaa;
            cursor: pointer;
            transition: color 0.3s;
        }

        .action-icon:hover {
            color: #00d4ff;
        }

        .editor-content {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            color: #fff;
            border: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .json-output {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: auto;
        }

        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
        }

        .status-bar {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: #aaa;
        }

        .status-bar.valid {
            color: #10b981;
        }

        .status-bar.invalid {
            color: #ef4444;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            color: #ef4444;
            font-size: 13px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .editor-container {
                height: 400px;
            }

            .tool-group {
                border-right: none;
                border-bottom: 2px solid rgba(255, 255, 255, 0.1);
                padding-bottom: 10px;
                padding-right: 0;
            }

            .tool-group:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 JSON格式化工具</h1>
            <p>JSON格式化、压缩、验证、高亮显示、JSON转YAML，开发者必备</p>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <button class="btn success" onclick="formatJSON()">
                    <i class="fas fa-align-left"></i> 格式化
                </button>
                <button class="btn warning" onclick="compressJSON()">
                    <i class="fas fa-compress"></i> 压缩
                </button>
            </div>

            <div class="tool-group">
                <button class="btn" onclick="copyToClipboard()">
                    <i class="fas fa-copy"></i> 复制
                </button>
                <button class="btn" onclick="clearAll()">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>

            <div class="tool-group">
                <button class="btn" onclick="jsonToYAML()">
                    <i class="fas fa-exchange-alt"></i> 转为YAML
                </button>
                <button class="btn" onclick="loadSample()">
                    <i class="fas fa-code"></i> 示例
                </button>
            </div>
        </div>

        <div class="workspace">
            <div class="editor-container">
                <div class="editor-header">
                    <h3>输入</h3>
                    <div class="editor-actions">
                        <i class="fas fa-file-upload action-icon" onclick="pasteFromClipboard()"></i>
                    </div>
                </div>
                <div class="editor-content">
                    <textarea id="inputJSON" placeholder="在此粘贴或输入JSON数据..." oninput="validateJSON()"></textarea>
                </div>
            </div>

            <div class="editor-container">
                <div class="editor-header">
                    <h3>输出</h3>
                    <div class="editor-actions">
                        <i class="fas fa-download action-icon" onclick="downloadJSON()"></i>
                    </div>
                </div>
                <div class="editor-content">
                    <div id="outputJSON" class="json-output"></div>
                </div>
                <div id="statusBar" class="status-bar">
                    等待输入...
                </div>
            </div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">字符数</span>
                <span class="stat-value" id="charCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">行数</span>
                <span class="stat-value" id="lineCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">文件大小</span>
                <span class="stat-value" id="fileSize">0 B</span>
            </div>
        </div>
    </div>

    <script>
        function formatJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 2);
                displayOutput(formatted);
                showStatus('格式化成功！', 'valid');
            } catch (e) {
                showError('JSON格式错误: ' + e.message);
            }
        }

        function compressJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const compressed = JSON.stringify(parsed);
                displayOutput(compressed);
                showStatus('压缩成功！', 'valid');
            } catch (e) {
                showError('JSON格式错误: ' + e.message);
            }
        }

        function validateJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            if (!input) {
                showStatus('等待输入...', '');
                document.getElementById('stats').style.display = 'none';
                return;
            }

            try {
                JSON.parse(input);
                showStatus('JSON格式正确', 'valid');
                updateStats(input);
            } catch (e) {
                showStatus('JSON格式错误', 'invalid');
                document.getElementById('stats').style.display = 'none';
            }
        }

        function displayOutput(json) {
            const output = document.getElementById('outputJSON');
            output.innerHTML = syntaxHighlight(json);
            updateStats(json);
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function showStatus(message, type) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.className = 'status-bar ' + type;
        }

        function showError(message) {
            const statusBar = document.getElementById('statusBar');
            statusBar.innerHTML = message;
            statusBar.className = 'status-bar invalid';
        }

        function updateStats(input) {
            const stats = document.getElementById('stats');
            stats.style.display = 'flex';
            document.getElementById('charCount').textContent = input.length;
            document.getElementById('lineCount').textContent = input.split('\n').length;
            document.getElementById('fileSize').textContent = formatSize(new Blob([input]).size);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function copyToClipboard() {
            const output = document.getElementById('outputJSON').textContent;
            if (!output) {
                showError('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(output).then(() => {
                showStatus('已复制到剪贴板！', 'valid');
                setTimeout(() => showStatus('JSON格式正确', 'valid'), 2000);
            }).catch(err => {
                showError('复制失败: ' + err.message);
            });
        }

        function pasteFromClipboard() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('inputJSON').value = text;
                validateJSON();
            }).catch(err => {
                showError('粘贴失败: ' + err.message);
            });
        }

        function clearAll() {
            document.getElementById('inputJSON').value = '';
            document.getElementById('outputJSON').innerHTML = '';
            showStatus('已清空', '');
            document.getElementById('stats').style.display = 'none';
        }

        function downloadJSON() {
            const output = document.getElementById('outputJSON').textContent;
            if (!output) {
                showError('没有可下载的内容');
                return;
            }

            const blob = new Blob([output], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'formatted.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        function jsonToYAML() {
            const input = document.getElementById('inputJSON').value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }

            try {
                const parsed = JSON.parse(input);
                const yaml = jsonToYamlString(parsed);
                document.getElementById('outputJSON').innerHTML = yaml.replace(/\n/g, '<br>');
                showStatus('转换成功！', 'valid');
            } catch (e) {
                showError('JSON格式错误: ' + e.message);
            }
        }

        function jsonToYamlString(obj, indent = 0) {
            let result = '';
            const spaces = '  '.repeat(indent);

            if (Array.isArray(obj)) {
                obj.forEach(item => {
                    if (typeof item === 'object' && item !== null) {
                        result += spaces + '-\n' + jsonToYamlString(item, indent + 1);
                    } else {
                        result += spaces + '- ' + JSON.stringify(item) + '\n';
                    }
                });
            } else if (typeof obj === 'object' && obj !== null) {
                for (const key in obj) {
                    const value = obj[key];
                    if (typeof value === 'object' && value !== null) {
                        result += spaces + key + ':\n' + jsonToYamlString(value, indent + 1);
                    } else {
                        result += spaces + key + ': ' + JSON.stringify(value) + '\n';
                    }
                }
            } else {
                result += JSON.stringify(obj) + '\n';
            }

            return result;
        }

        function loadSample() {
            const sample = {
                "name": "示例JSON",
                "version": "1.0.0",
                "description": "这是一个示例JSON数据",
                "features": [
                    "格式化",
                    "压缩",
                    "验证",
                    "高亮显示"
                ],
                "settings": {
                    "indent": 2,
                    "sortKeys": true,
                    "validate": true
                },
                "active": true,
                "count": 100,
                "percentage": 85.5
            };

            document.getElementById('inputJSON').value = JSON.stringify(sample, null, 2);
            validateJSON();
        }
    </script>
</body>
</html>
