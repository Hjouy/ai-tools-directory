<script>
let currentExpression = '';
let isScientific = false;

function switchMode(mode) {
  document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
  const modeMap = {basic:0, scientific:1, unit:2, bmi:3, currency:4, loan:5};
  document.querySelectorAll('.mode-tab')[modeMap[mode]].classList.add('active');

  document.getElementById('basicCalculator').style.display = mode === 'basic' ? 'block' : 'none';
  document.getElementById('scientificCalculator').style.display = mode === 'scientific' ? 'block' : 'none';
  document.getElementById('unitConverter').classList.toggle('active', mode === 'unit');
  document.getElementById('bmiCalculator').style.display = mode === 'bmi' ? 'block' : 'none';
  document.getElementById('currencyCalculator').style.display = mode === 'currency' ? 'block' : 'none';
  document.getElementById('loanCalculator').style.display = mode === 'loan' ? 'block' : 'none';

  isScientific = mode === 'scientific';
  clearDisplay();
  if (mode === 'currency') initCurrency();
}

function inputNumber(num) {
  const display = document.getElementById(isScientific ? 'sciResult' : 'displayResult');
  const expression = document.getElementById(isScientific ? 'sciExpression' : 'displayExpression');

  if (display.textContent === '0' && num !== '.') {
    display.textContent = num;
  } else {
    display.textContent += num;
  }
  currentExpression = display.textContent;
}

function inputOperator(op) {
  const display = document.getElementById(isScientific ? 'sciResult' : 'displayResult');
  const expression = document.getElementById(isScientific ? 'sciExpression' : 'displayExpression');

  expression.textContent += display.textContent + ' ' + op + ' ';
  currentExpression = expression.textContent;
  display.textContent = '0';
}

function inputDecimal() {
  const display = document.getElementById(isScientific ? 'sciResult' : 'displayResult');
  if (!display.textContent.includes('.')) {
    display.textContent += '.';
  }
}

function inputSciFunction(func) {
  const display = document.getElementById('sciResult');

  switch(func) {
    case 'sin':
      display.textContent = Math.sin(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'cos':
      display.textContent = Math.cos(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'tan':
      display.textContent = Math.tan(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'log':
      display.textContent = Math.log10(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'ln':
      display.textContent = Math.log(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'sqrt':
      display.textContent = Math.sqrt(parseFloat(display.textContent)).toFixed(8);
      break;
    case 'pow':
      currentExpression += display.textContent + '^';
      display.textContent = '0';
      break;
    case 'pi':
      display.textContent = Math.PI.toFixed(8);
      break;
    case 'e':
      display.textContent = Math.E.toFixed(8);
      break;
  }
}

function clearDisplay() {
  currentExpression = '';
  document.getElementById('displayExpression').textContent = '';
  document.getElementById('displayResult').textContent = '0';
  document.getElementById('sciExpression').textContent = '';
  document.getElementById('sciResult').textContent = '0';
}

function backspace() {
  const display = document.getElementById(isScientific ? 'sciResult' : 'displayResult');
  display.textContent = display.textContent.slice(0, -1) || '0';
}

function calculate() {
  const display = document.getElementById(isScientific ? 'sciResult' : 'displayResult');
  const expression = document.getElementById(isScientific ? 'sciExpression' : 'displayExpression');

  try {
    const fullExpression = expression.textContent + display.textContent;
    const result = eval(fullExpression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-'));
    display.textContent = parseFloat(result.toFixed(8)).toString();
    expression.textContent = fullExpression + ' =';
  } catch (error) {
    display.textContent = 'Error';
  }
}

// 单位换算
const unitData = {
  length: {
    units: ['米', '千米', '厘米', '毫米', '英寸', '英尺', '码', '英里'],
    factors: [1, 1000, 0.01, 0.001, 0.0254, 0.3048, 0.9144, 1609.34]
  },
  weight: {
    units: ['千克', '克', '毫克', '吨', '磅', '盎司'],
    factors: [1, 0.001, 0.000001, 1000, 0.453592, 0.0283495]
  },
  temperature: {
    units: ['摄氏度', '华氏度', '开尔文'],
    factors: [1, 1, 1]
  },
  area: {
    units: ['平方米', '平方千米', '公顷', '英亩', '平方英尺'],
    factors: [1, 1000000, 10000, 4046.86, 0.092903]
  },
  volume: {
    units: ['升', '毫升', '立方米', '加仑', '品脱'],
    factors: [1, 0.001, 1000, 3.78541, 0.473176]
  },
  time: {
    units: ['秒', '分', '小时', '天', '周', '月', '年'],
    factors: [1, 60, 3600, 86400, 604800, 2592000, 31536000]
  }
};

let currentCategory = 'length';

function selectCategory(category) {
  currentCategory = category;

  document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  const units = unitData[category].units;
  const fromSelect = document.getElementById('unitFrom');
  const toSelect = document.getElementById('unitTo');

  fromSelect.innerHTML = units.map((unit, i) => `<option value="${i}">${unit}</option>`).join('');
  toSelect.innerHTML = units.map((unit, i) => `<option value="${i}">${unit}</option>`).join('');

  toSelect.selectedIndex = units.length > 1 ? 1 : 0;
  convertUnit();
}

function convertUnit() {
  const input = parseFloat(document.getElementById('unitInput').value) || 0;
  const fromIndex = parseInt(document.getElementById('unitFrom').value);
  const toIndex = parseInt(document.getElementById('unitTo').value);

  let result;

  if (currentCategory === 'temperature') {
    result = convertTemperature(input, fromIndex, toIndex);
  } else {
    const factors = unitData[currentCategory].factors;
    const baseValue = input * factors[fromIndex];
    result = baseValue / factors[toIndex];
  }

  document.getElementById('unitOutput').value = parseFloat(result.toFixed(6));
}

function convertTemperature(value, from, to) {
  let celsius;

  switch(from) {
    case 0: celsius = value; break;
    case 1: celsius = (value - 32) * 5/9; break;
    case 2: celsius = value - 273.15; break;
  }

  switch(to) {
    case 0: return celsius;
    case 1: return celsius * 9/5 + 32;
    case 2: return celsius + 273.15;
  }
}

function swapUnits() {
  const from = document.getElementById('unitFrom');
  const to = document.getElementById('unitTo');
  const temp = from.value;
  from.value = to.value;
  to.value = temp;
  convertUnit();
}

// 初始化
selectCategory('length');

// ========== BMI计算器 ==========
function calcBMI() {
  let height = parseFloat(document.getElementById('bmiHeight').value);
  let weight = parseFloat(document.getElementById('bmiWeight').value);
  const heightUnit = document.getElementById('heightUnit').value;
  const weightUnit = document.getElementById('weightUnit').value;
  const age = parseInt(document.getElementById('bmiAge').value) || 25;
  const gender = document.getElementById('bmiGender').value;
  
  if (!height || !weight || height <= 0 || weight <= 0) return;
  
  // 转换单位
  if (heightUnit === 'cm') height /= 100;
  else if (heightUnit === 'ft') height = height * 0.3048;
  if (weightUnit === 'lb') weight *= 0.453592;
  
  const bmi = weight / (height * height);
  const bmiRounded = bmi.toFixed(1);
  
  let label, color, advice, pointer;
  if (bmi < 18.5) {
    label = '偏瘦'; color = '#3b82f6'; pointer = '8%';
    advice = `您的BMI为 <strong>${bmiRounded}</strong>，处于偏瘦范围（< 18.5）。\n建议：适当增加营养摄入，进行力量训练增肌，注意均衡饮食，补充蛋白质。`;
  } else if (bmi < 24) {
    label = '正常体重'; color = '#22c55e'; pointer = '38%';
    advice = `您的BMI为 <strong>${bmiRounded}</strong>，处于正常范围（18.5~23.9）。\n建议：保持当前生活习惯，坚持规律运动，注意均衡饮食，定期体检。`;
  } else if (bmi < 28) {
    label = '超重'; color = '#f59e0b'; pointer = '65%';
    advice = `您的BMI为 <strong>${bmiRounded}</strong>，处于超重范围（24~27.9）。\n建议：适当控制饮食，增加有氧运动（每周≥150分钟），减少高糖高脂食物摄入。`;
  } else {
    label = '肥胖'; color = '#ef4444'; pointer = '88%';
    advice = `您的BMI为 <strong>${bmiRounded}</strong>，处于肥胖范围（≥ 28）。\n建议：建议咨询医生或营养师，制定减重计划，同时注意监测血糖、血压等指标。`;
  }
  
  // 理想体重范围
  const idealMin = (18.5 * height * height).toFixed(1);
  const idealMax = (24 * height * height).toFixed(1);
  
  // 基础代谢率（Harris-Benedict公式）
  const BMR = gender === 'male'
    ? (88.362 + 13.397 * weight + 4.799 * height * 100 - 5.677 * age).toFixed(0)
    : (447.593 + 9.247 * weight + 3.098 * height * 100 - 4.330 * age).toFixed(0);
  
  document.getElementById('bmiResult').style.display = 'block';
  document.getElementById('bmiValue').textContent = bmiRounded;
  document.getElementById('bmiValue').style.color = color;
  document.getElementById('bmiLabel').textContent = label;
  document.getElementById('bmiLabel').style.color = color;
  document.getElementById('bmiPointer').style.left = `calc(${pointer} - 2px)`;
  document.getElementById('bmiAdvice').innerHTML = advice.replace('\n', '<br>');
  document.getElementById('bmiExtra').innerHTML = `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
      <div style="font-size:.75rem;color:var(--text-muted)">理想体重范围</div>
      <div style="font-size:.95rem;font-weight:700;color:var(--success)">${idealMin} ~ ${idealMax} kg</div>
    </div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
      <div style="font-size:.75rem;color:var(--text-muted)">基础代谢率 (BMR)</div>
      <div style="font-size:.95rem;font-weight:700;color:var(--primary)">${BMR} 千卡/天</div>
    </div>
  `;
}

// ========== 汇率换算 ==========
// 离线汇率（以人民币CNY为基准，2025年参考汇率）
const rates = {
  CNY: 1, USD: 7.23, EUR: 7.88, JPY: 0.0485, GBP: 9.15, HKD: 0.926,
  CAD: 5.32, AUD: 4.68, SGD: 5.41, CHF: 8.02, KRW: 0.0054, TWD: 0.226,
  MYR: 1.67, THB: 0.208, INR: 0.0868, AED: 1.968, RUB: 0.0808, MXN: 0.383,
  BRL: 1.41, ZAR: 0.395
};

const currNames = {
  CNY:'人民币', USD:'美元', EUR:'欧元', JPY:'日元', GBP:'英镑',
  HKD:'港元', CAD:'加拿大元', AUD:'澳大利亚元', SGD:'新加坡元', CHF:'瑞士法郎',
  KRW:'韩元', TWD:'台币', MYR:'马来西亚林吉特', THB:'泰铢', INR:'印度卢比',
  AED:'阿联酋迪拉姆', RUB:'俄罗斯卢布', MXN:'墨西哥比索', BRL:'巴西雷亚尔', ZAR:'南非兰特'
};

function initCurrency() {
  const fromSel = document.getElementById('currFrom');
  const toSel = document.getElementById('currTo');
  if (fromSel.options.length > 0) return;
  
  Object.entries(currNames).forEach(([code, name]) => {
    fromSel.innerHTML += `<option value="${code}">${code} - ${name}</option>`;
    toSel.innerHTML += `<option value="${code}">${code} - ${name}</option>`;
  });
  
  fromSel.value = 'CNY';
  toSel.value = 'USD';
  convertCurrency();
}

function convertCurrency() {
  const amount = parseFloat(document.getElementById('currAmount').value) || 0;
  const from = document.getElementById('currFrom').value;
  const to = document.getElementById('currTo').value;
  if (!from || !to) return;
  
  const fromRate = rates[from] || 1;
  const toRate = rates[to] || 1;
  const result = amount * fromRate / toRate;
  
  document.getElementById('currResult').value = result.toFixed(4);
  const rate = (fromRate / toRate).toFixed(6);
  document.getElementById('currRate').innerHTML = `1 ${from} ≈ <strong style="color:var(--primary)">${rate}</strong> ${to}`;
}

function swapCurrency() {
  const f = document.getElementById('currFrom');
  const t = document.getElementById('currTo');
  const tmp = f.value;
  f.value = t.value;
  t.value = tmp;
  convertCurrency();
}

function quickCurr(code) {
  document.getElementById('currTo').value = code;
  convertCurrency();
}

// ========== 贷款计算器 ==========
function calcLoan() {
  const principal = parseFloat(document.getElementById('loanAmount').value) * 10000 || 0;
  const annualRate = parseFloat(document.getElementById('loanRate').value) / 100 || 0;
  const years = parseInt(document.getElementById('loanYears').value) || 30;
  const type = document.getElementById('loanType').value;
  
  if (principal <= 0 || annualRate <= 0) return;
  
  const monthRate = annualRate / 12;
  const months = years * 12;
  
  let monthlyPayment, totalPayment, totalInterest;
  let detail = '';
  
  if (type === 'equal') {
    // 等额还款公式: M = P * r(1+r)^n / ((1+r)^n - 1)
    const factor = Math.pow(1 + monthRate, months);
    monthlyPayment = principal * monthRate * factor / (factor - 1);
    totalPayment = monthlyPayment * months;
    totalInterest = totalPayment - principal;
    
    detail = `等额还款：每月还 <strong style="color:var(--primary)">${Math.round(monthlyPayment).toLocaleString()}</strong> 元，
      共还 ${months} 期 (${years}年)，
      本金 ${(principal/10000).toFixed(1)} 万元，
      利息 <span style="color:#ef4444">${(totalInterest/10000).toFixed(2)}</span> 万元。
      贷款成本比率：${((totalInterest/principal)*100).toFixed(1)}%`;
  } else {
    // 等额本金：每月本金固定，利息递减
    const monthPrincipal = principal / months;
    const firstPayment = monthPrincipal + principal * monthRate;
    const lastPayment = monthPrincipal + monthPrincipal * monthRate;
    totalInterest = (principal + monthPrincipal) * monthRate * months / 2;
    totalPayment = principal + totalInterest;
    monthlyPayment = firstPayment; // 首月
    
    detail = `等额本金：首月还 <strong style="color:var(--primary)">${Math.round(firstPayment).toLocaleString()}</strong> 元，
      末月还 <strong>${Math.round(lastPayment).toLocaleString()}</strong> 元（每月递减），
      每月固定还本 ${Math.round(monthPrincipal).toLocaleString()} 元，
      利息总计 <span style="color:#ef4444">${(totalInterest/10000).toFixed(2)}</span> 万元。`;
  }
  
  document.getElementById('loanResult').style.display = 'block';
  document.getElementById('loanMonthly').textContent = Math.round(monthlyPayment).toLocaleString();
  document.getElementById('loanTotal').textContent = (totalPayment/10000).toFixed(2);
  document.getElementById('loanInterest').textContent = (totalInterest/10000).toFixed(2);
  document.getElementById('loanDetail').innerHTML = detail;
}
</script>
