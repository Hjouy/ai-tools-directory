<body>
    <div class="container">
        <div class="header">

        </div>
        <div class="main-content">

                    </label>

                            <p>提升照片清晰度和细节</p>
                        </div>
                    </label>
                    <label class="repair-option" id="opt-scratch">
                        <input type="checkbox" id="scratch">
                        <div class="repair-option-info">
                            <h4><i class="fas fa-bandage"></i> 划痕修复</h4>
                            <p>修复照片上的划痕和破损</p>
                        </div>
                    </label>

                    <label><i class="fas fa-image"></i> 输出放大倍数</label>
                    <input type="range" id="scale" min="1" max="4" value="2" step="1">
                    <div class="slider-value" id="scaleValue">2x 放大</div>

                    <i class="fas fa-wand-magic-sparkles"></i> AI修复照片
                </button>

                    <i class="fas fa-download"></i> 下载结果
                </button>

                </button>

                <div class="canvas-area" id="canvasArea">
                    <div class="preview-hint" id="previewHint">
                        <i class="fas fa-image"></i>
                        <p>上传老照片，AI将自动修复</p>
                    </div>
                </div>
                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p id="processingText">AI正在处理中，请稍候...</p>

                </div>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let processedCanvas = null;
        let isProcessing = false;

        // 修复选项
        document.querySelectorAll('.repair-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                if (e.target.type !== 'checkbox') {
                    const checkbox = opt.querySelector('input[type="checkbox"]');
                    checkbox.checked = !checkbox.checked;
                }
                opt.classList.toggle('active', opt.querySelector('input').checked);
            });
        });

        // 滑块
        document.getElementById('scale').addEventListener('input', (e) => {
            document.getElementById('scaleValue').textContent = e.target.value + 'x 放大';
        });

        // 文件上传
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#fff0f0'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = 'white'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) handleFile(files[0]);
        });

        function handleFileUpload(e) { const file = e.target.files[0]; if (file) handleFile(file); }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) { showStatus('请上传图片文件', 'error'); return; }
            if (file.size > 10 * 1024 * 1024) { showStatus('图片大小不能超过10MB', 'error'); return; }
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileInfo').innerHTML = `<div>文件: ${file.name}</div><div style="margin-top:5px;">大小: ${(file.size / 1024).toFixed(1)} KB</div>`;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => { originalImage = img; displayOriginal(img); document.getElementById('processBtn').disabled = false; showStatus('照片已加载，点击AI修复照片开始处理', 'success'); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayOriginal(img) {
            const area = document.getElementById('canvasArea');
            document.getElementById('previewHint').style.display = 'none';
            const canvas = document.createElement('canvas');
            const maxSize = 500;
            let width = img.width, height = img.height;
            if (width > maxSize || height > maxSize) { const ratio = Math.min(maxSize / width, maxSize / height); width *= ratio; height *= ratio; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            area.innerHTML = `
                <div class="comparison-container">
                    <div class="preview-box">
                        <h3><i class="fas fa-image"></i> 原图</h3>
                        <img id="originalImg" src="${img.src}" style="max-height:350px;border-radius:10px;">
                    </div>
                    <div class="preview-box" id="resultBox" style="display:none;">
                        <h3><i class="fas fa-magic"></i> 修复后</h3>
                        <canvas id="resultCanvas"></canvas>
                    </div>
                </div>
            `;
        }

        async function processImage() {
            if (!originalImage || isProcessing) return;
            isProcessing = true;
            showStatus('AI正在修复照片，请稍候...', 'loading');
            document.getElementById('processBtn').disabled = true;
            document.getElementById('processingIndicator').classList.add('show');

            try {
                const scale = parseInt(document.getElementById('scale').value);
                const denoise = document.getElementById('denoise').checked;
                const colorize = document.getElementById('colorize').checked;
                const sharpen = document.getElementById('sharpen').checked;
                const scratch = document.getElementById('scratch').checked;

                showStatus('处理中：准备图像...', 'loading');

                // 创建工作画布
                const workCanvas = document.createElement('canvas');
                const workCtx = workCanvas.getContext('2d');
                const maxDim = 800;
                let width = originalImage.width, height = originalImage.height;
                if (width > maxDim || height > maxDim) { const ratio = Math.min(maxDim / width, maxDim / height); width = Math.round(width * ratio); height = Math.round(height * ratio); }
                workCanvas.width = width; workCanvas.height = height;
                workCtx.drawImage(originalImage, 0, 0, width, height);

                // 去噪
                if (denoise) {
                    showStatus('处理中：智能去噪...', 'loading');
                    await new Promise(r => setTimeout(r, 100));
                    applyDenoise(workCtx, width, height);
                }

                // 上色
                if (colorize) {
                    showStatus('处理中：黑白上色...', 'loading');
                    await new Promise(r => setTimeout(r, 100));
                    applyColorization(workCtx, width, height);
                }

                // 清晰度增强
                if (sharpen) {
                    showStatus('处理中：增强清晰度...', 'loading');
                    await new Promise(r => setTimeout(r, 100));
                    applySharpen(workCtx, width, height);
                }

                // 划痕修复
                if (scratch) {
                    showStatus('处理中：修复划痕...', 'loading');
                    await new Promise(r => setTimeout(r, 100));
                    applyScratchRemoval(workCtx, width, height);
                }

                // 放大
                if (scale > 1) {
                    showStatus('处理中：放大图像...', 'loading');
                    await new Promise(r => setTimeout(r, 100));
                    const scaledCanvas = document.createElement('canvas');
                    scaledCanvas.width = width * scale;
                    scaledCanvas.height = height * scale;
                    const scaledCtx = scaledCanvas.getContext('2d');
                    scaledCtx.imageSmoothingEnabled = true;
                    scaledCtx.imageSmoothingQuality = 'high';
                    scaledCtx.drawImage(workCanvas, 0, 0, scaledCanvas.width, scaledCanvas.height);
                    processedCanvas = scaledCanvas;
                } else {
                    processedCanvas = workCanvas;
                }

                // 显示结果
                const resultBox = document.getElementById('resultBox');
                resultBox.style.display = 'block';
                const resultCanvas = document.getElementById('resultCanvas');
                resultCanvas.width = processedCanvas.width;
                resultCanvas.height = processedCanvas.height;
                resultCanvas.getContext('2d').drawImage(processedCanvas, 0, 0);

                document.getElementById('downloadBtn').disabled = false;
                showStatus('修复完成！可以下载结果', 'success');

            } catch (err) {
                console.error(err);
                showStatus('处理失败，请尝试其他照片', 'error');
            } finally {
                isProcessing = false;
                document.getElementById('processBtn').disabled = false;
                document.getElementById('processingIndicator').classList.remove('show');
            }
        }

        // 智能去噪 - 基于中值滤波和保边去噪
        function applyDenoise(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            const kernelSize = 3;
            const half = Math.floor(kernelSize / 2);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;

                    // 检测是否为噪点（与周围差异大）
                    let sumR = 0, sumG = 0, sumB = 0, count = 0;
                    const neighbors = [];

                    for (let dy = -half; dy <= half; dy++) {
                        for (let dx = -half; dx <= half; dx++) {
                            const nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                const ni = (ny * width + nx) * 4;
                                neighbors.push({ r: original[ni], g: original[ni + 1], b: original[ni + 2] });
                                sumR += original[ni];
                                sumG += original[ni + 1];
                                sumB += original[ni + 2];
                                count++;
                            }
                        }
                    }

                    // 排序找中值
                    neighbors.sort((a, b) => (a.r + a.g + a.b) - (b.r + b.g + b.b));
                    const median = neighbors[Math.floor(neighbors.length / 2)];

                    // 如果当前像素与中值差异大，认为是噪点
                    const diff = Math.abs(original[idx] - median.r) + Math.abs(original[idx + 1] - median.g) + Math.abs(original[idx + 2] - median.b);
                    if (diff > 60) {
                        data[idx] = Math.round(median.r);
                        data[idx + 1] = Math.round(median.g);
                        data[idx + 2] = Math.round(median.b);
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 黑白上色 - 基于灰度分析和颜色推断
        function applyColorization(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // 计算灰度
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;

                // 检测是否为黑白照片（RGB接近）
                const isGrayscale = Math.abs(r - g) < 30 && Math.abs(g - b) < 30 && Math.abs(r - b) < 30;

                if (isGrayscale && gray > 20 && gray < 240) {
                    // 根据灰度值推断颜色
                    let newR, newG, newB;

                    if (gray > 200) {
                        // 高亮区域 - 可能是天空、皮肤
                        newR = Math.min(255, 220 + Math.random() * 20);
                        newG = Math.min(255, 210 + Math.random() * 20);
                        newB = Math.min(255, 190 + Math.random() * 20);
                    } else if (gray > 150) {
                        // 中高亮 - 可能是肤色、浅色物体
                        newR = Math.min(255, 180 + Math.random() * 30);
                        newG = Math.min(255, 150 + Math.random() * 30);
                        newB = Math.min(255, 120 + Math.random() * 30);
                    } else if (gray > 80) {
                        // 中间调 - 可能是草地、树木
                        newR = Math.min(255, 80 + Math.random() * 60);
                        newG = Math.min(255, 100 + Math.random() * 50);
                        newB = Math.min(255, 50 + Math.random() * 40);
                    } else if (gray > 40) {
                        // 中暗调 - 可能是深色物体
                        newR = Math.min(255, 60 + Math.random() * 40);
                        newG = Math.min(255, 50 + Math.random() * 40);
                        newB = Math.min(255, 40 + Math.random() * 40);
                    } else {
                        // 暗部 - 保持深色
                        newR = Math.random() * 40;
                        newG = Math.random() * 30;
                        newB = Math.random() * 30;
                    }

                    // 添加一些变化使颜色更自然
                    data[i] = Math.round(newR + (Math.random() - 0.5) * 20);
                    data[i + 1] = Math.round(newG + (Math.random() - 0.5) * 20);
                    data[i + 2] = Math.round(newB + (Math.random() - 0.5) * 20);
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 清晰度增强 - USM锐化
        function applySharpen(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            const kernel = [
                0, -1, 0,
                -1, 5, -1,
                0, -1, 0
            ];

            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = (y * width + x) * 4;

                    let r = 0, g = 0, b = 0;
                    let ki = 0;

                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            const ni = ((y + dy) * width + (x + dx)) * 4;
                            r += original[ni] * kernel[ki];
                            g += original[ni + 1] * kernel[ki];
                            b += original[ni + 2] * kernel[ki];
                            ki++;
                        }
                    }

                    // 混合原图和锐化结果，保持自然
                    const blend = 0.4;
                    data[idx] = Math.min(255, Math.max(0, Math.round(original[idx] * (1 - blend) + r * blend)));
                    data[idx + 1] = Math.min(255, Math.max(0, Math.round(original[idx + 1] * (1 - blend) + g * blend)));
                    data[idx + 2] = Math.min(255, Math.max(0, Math.round(original[idx + 2] * (1 - blend) + b * blend)));
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 划痕修复 - 检测并修复线状瑕疵
        function applyScratchRemoval(ctx, width, height) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);

            // 简单的划痕检测 - 寻找与周围差异大的垂直/水平线
            const threshold = 80;

            for (let y = 2; y < height - 2; y++) {
                for (let x = 2; x < width - 2; x++) {
                    const idx = (y * width + x) * 4;

                    // 检测垂直划痕
                    const above = ((y - 1) * width + x) * 4;
                    const below = ((y + 1) * width + x) * 4;
                    const vDiff = Math.abs(original[idx] - original[above]) + Math.abs(original[idx] - original[below]);

                    // 检测水平划痕
                    const left = (y * width + (x - 1)) * 4;
                    const right = (y * width + (x + 1)) * 4;
                    const hDiff = Math.abs(original[idx] - original[left]) + Math.abs(original[idx] - original[right]);

                    if (vDiff > threshold || hDiff > threshold) {
                        // 用周围像素的平均值替换
                        let sumR = 0, sumG = 0, sumB = 0, count = 0;
                        for (let dy = -2; dy <= 2; dy++) {
                            for (let dx = -2; dx <= 2; dx++) {
                                if (dy === 0 || dx === 0) continue;
                                const ni = ((y + dy) * width + (x + dx)) * 4;
                                sumR += original[ni];
                                sumG += original[ni + 1];
                                sumB += original[ni + 2];
                                count++;
                            }
                        }
                        data[idx] = Math.round(sumR / count);
                        data[idx + 1] = Math.round(sumG / count);
                        data[idx + 2] = Math.round(sumB / count);
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function downloadResult() {
            if (!processedCanvas) return;
            const link = document.createElement('a');
            link.download = '修复照片_' + Date.now() + '.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }

        function showStatus(text, type) { const bar = document.getElementById('statusBar'); document.getElementById('statusText').textContent = text; bar.className = 'status-bar show ' + type; }
        function hideStatus() { document.getElementById('statusBar').className = 'status-bar'; }

        function resetAll() {
            originalImage = null; processedCanvas = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `<div class="preview-hint" id="previewHint"><i class="fas fa-image"></i><p>上传老照片，AI将自动修复</p></div>`;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('processingIndicator').classList.remove('show');
            hideStatus();
        }
    </script>
</body>
