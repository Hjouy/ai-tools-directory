    'stable-diffusion': { 免费版: true, API访问: true, 移动端: '部分', 中文界面: true, 本地部署: true, 无需账号: true },
    cursor:           { 免费版: true, API访问: false, 移动端: false, 中文界面: '部分', 本地部署: true, 无需账号: false },
    'github-copilot': { 免费版: '学生免费', API访问: false, 移动端: false, 中文界面: '部分', 本地部署: false, 无需账号: false },
    runway:           { 免费版: true, API访问: true, 移动端: true, 中文界面: false, 本地部署: false, 无需账号: false },
    suno:             { 免费版: true, API访问: false, 移动端: true, 中文界面: false, 本地部署: false, 无需账号: false },
    perplexity:       { 免费版: true, API访问: true, 移动端: true, 中文界面: '部分', 本地部署: false, 无需账号: false },
    'notion-ai':      { 免费版: true, API访问: false, 移动端: true, 中文界面: true, 本地部署: false, 无需账号: false },
    elevenlabs:       { 免费版: true, API访问: true, 移动端: true, 中文界面: '部分', 本地部署: false, 无需账号: false },
  };

  // 工具适用人群
  const TOOL_FOR = {
    chatgpt: '内容创作者、学生、开发者、各行业专业人士',
    claude: '学术研究者、律师、长文档处理用户',
    gemini: 'Google生态用户、多模态需求者',
    midjourney: '设计师、插画师、游戏原画师',
    'stable-diffusion': 'AI研究者、技术用户、批量生成需求者',
    cursor: '软件开发者、独立开发者、编程学习者',
    'github-copilot': '企业开发者、VS Code/JetBrains用户',
    runway: '视频创作者、广告制作公司、导演',
    suno: '音乐爱好者、短视频创作者、广告制作',
    perplexity: '研究人员、记者、知识工作者',
    'notion-ai': '团队协作用户、项目管理者、知识型工作者',
    elevenlabs: 'YouTuber、播客主、有声书作者',
  };

  // ============ 工具选择器 ============
  function openPicker(slotIndex) {
    currentSlot = slotIndex;
    pickerCategoryFilter = 'all';
    document.getElementById('pickerSearch').value = '';
    document.getElementById('pickerOverlay').classList.add('open');
    renderPickerFilters();
    renderPickerList();
    setTimeout(() => document.getElementById('pickerSearch').focus(), 100);
  }

  function closePicker(e) {
    if (e && e.target !== document.getElementById('pickerOverlay')) return;
    document.getElementById('pickerOverlay').classList.remove('open');
  }

  function renderPickerFilters() {
    const categories = ['all', ...new Set(getToolsList().map(t => t.category))];
    const container = document.getElementById('pickerFilters');
    container.innerHTML = categories.map(cat => `
      <button class="picker-filter-btn ${pickerCategoryFilter === cat ? 'active' : ''}"
        onclick="pickerCategoryFilter='${cat}';this.parentNode.querySelectorAll('.picker-filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');renderPickerList()">
        ${cat === 'all' ? '全部' : cat}
      </button>
    `).join('');
  }

  function renderPickerList() {
    const q = document.getElementById('pickerSearch').value.toLowerCase();
    let tools = getToolsList();
    if (pickerCategoryFilter !== 'all') tools = tools.filter(t => t.category === pickerCategoryFilter);
    if (q) tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));

    const container = document.getElementById('pickerList');
    container.innerHTML = tools.map(t => {
      const alreadySelected = selectedTools.includes(t.id) && selectedTools[currentSlot] !== t.id;
      return `
        <div class="picker-item ${alreadySelected ? 'disabled' : ''} ${selectedTools[currentSlot] === t.id ? 'selected' : ''}"
          onclick="${alreadySelected ? '' : `selectTool('${t.id}')`}">
          <div class="picker-item-icon" style="background:${t.color}20;color:${t.color};">${t.icon}</div>
          <div class="picker-item-info">
            <div class="picker-item-name">${t.name}</div>
            <div class="picker-item-meta">★${t.rating} · ${t.users} · ${t.category}</div>
          </div>
          <div class="picker-item-price">${t.price.includes('免费') ? '免费' : t.price.split('/')[0]}</div>
        </div>
      `;
    }).join('');
  }

  function selectTool(id) {
    selectedTools[currentSlot] = id;
    document.getElementById('pickerOverlay').classList.remove('open');
    updateSlots();
    updateCompareBtn();
  }

  function removeSlot(slotIndex, e) {
    e.stopPropagation();
    selectedTools[slotIndex] = null;
    updateSlots();
    updateCompareBtn();
    // 隐藏对比结果
    document.getElementById('compareResult').classList.remove('show');
  }

  function updateSlots() {
    for (let i = 0; i < 3; i++) {
      const slot = document.getElementById(`slot-${i}`);
      const id = selectedTools[i];
      if (id) {
        const t = getToolById(id);
        slot.classList.add('filled');
        slot.innerHTML = `
          <button class="slot-remove" onclick="removeSlot(${i},event)">✕</button>
          <div class="slot-icon">${t.icon}</div>
          <div class="slot-name">${t.name}</div>
          <div class="slot-cat">${t.category} · ★${t.rating}</div>
        `;
        slot.onclick = () => openPicker(i);
      } else {
        slot.classList.remove('filled');
        slot.innerHTML = `
          <div class="slot-empty-icon">＋</div>
          <div class="slot-empty-text">${i === 2 ? '点击选择第3个工具（可选）' : `点击选择第${i+1}个工具`}</div>
        `;
        slot.onclick = () => openPicker(i);
      }
    }
  }

  function updateCompareBtn() {
    const filled = selectedTools.filter(Boolean).length;
    const btn = document.getElementById('compareBtn');
    if (filled >= 2) {
      btn.disabled = false;
      btn.textContent = `🔍 开始对比 ${filled} 个工具`;
    } else {
      btn.disabled = true;
      btn.textContent = '选择至少2个工具开始对比';
    }
  }

  // ============ 加载预设 ============
  function loadPreset(ids) {
    selectedTools = [ids[0] || null, ids[1] || null, ids[2] || null];
    updateSlots();
    updateCompareBtn();
    runCompare();
    document.querySelector('.selector-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ============ 执行对比 ============
  function runCompare() {
    const tools = selectedTools.filter(Boolean).map(id => getToolById(id));
    if (tools.length < 2) return;

    const result = document.getElementById('compareResult');
    result.innerHTML = buildCompareHTML(tools);
    result.classList.add('show');

    // 绘制雷达图
    tools.forEach((t, i) => {
      drawRadar(tools, i);
    });
    drawRadarAll(tools);

    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildCompareHTML(tools) {
    const n = tools.length;
    const gridCols = `1fr ${tools.map(() => '1fr').join(' ')}`;

    // 计算各维度最优
    const ratings = tools.map(t => t.rating);
    const maxRating = Math.max(...ratings);
    const prices = tools.map(t => t.price.includes('免费') ? 0 : parseFloat(t.price.replace(/[^0-9.]/g, '')) || 999);
    const minPrice = Math.min(...prices);
    const userNums = tools.map(t => parseUsersNum(t.users));
    const maxUsers = Math.max(...userNums);

    let html = '';

    // 工具头部
    html += `
      <div class="result-header" style="margin-bottom:16px;">
        <div class="result-header-row" style="grid-template-columns:${gridCols};">
          <div class="result-header-label">对比工具</div>
          ${tools.map(t => `
            <div class="result-header-tool">
              <div class="result-tool-logo" style="background:${t.color}20;color:${t.color};">${t.icon}</div>
              <div class="result-tool-name">${t.name}</div>
              <div class="result-tool-cat">${t.category}</div>
              <div class="result-tool-rating">★ ${t.rating}</div>
              <a class="result-tool-link" href="tool.html?id=${t.id}" target="_blank">查看详情</a>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    // 基础数据对比
    const basicRows = [
      { label: '📊 综合评分', icon: '📊', key: 'rating', render: (t) => {
        const isBest = t.rating === maxRating;
        return `<span style="font-weight:700;font-size:1.1rem;color:${isBest?'var(--success)':'var(--text)'};">${t.rating}</span>${isBest?'<div><span class="best-badge">最高分</span></div>':''}`;
      }, cellClass: (t) => t.rating === maxRating ? 'best' : '' },
      { label: '👥 活跃用户', key: 'users', render: (t) => {
        const isBest = parseUsersNum(t.users) === maxUsers;
        return `<span style="color:${isBest?'var(--success)':'var(--text)'};">${t.users}</span>${isBest?'<div><span class="best-badge">用户最多</span></div>':''}`;
      }, cellClass: (t) => parseUsersNum(t.users) === maxUsers ? 'best' : '' },
      { label: '💰 定价', key: 'price', render: (t) => {
        const p = t.price.includes('免费') ? 0 : parseFloat(t.price.replace(/[^0-9.]/g, '')) || 999;
        const isBest = p === minPrice;
        return `<span style="font-weight:600;color:${isBest?'var(--success)':'var(--warning)'};">${t.price}</span>${isBest?'<div><span class="best-badge">最划算</span></div>':''}`;
      }, cellClass: (t) => {
        const p = t.price.includes('免费') ? 0 : parseFloat(t.price.replace(/[^0-9.]/g,'')) || 999;
        return p === minPrice ? 'best' : '';
      }},
      { label: '🏢 开发商', key: 'developer', render: (t) => `<span style="color:var(--text-muted)">${t.info?.developer || '—'}</span>`, cellClass: () => '' },
      { label: '📅 发布时间', key: 'released', render: (t) => `<span style="color:var(--text-muted)">${t.info?.released || '—'}</span>`, cellClass: () => '' },
      { label: '🌐 访问平台', key: 'platform', render: (t) => `<span style="font-size:0.8rem;color:var(--text-muted)">${t.info?.platform || '—'}</span>`, cellClass: () => '' },
    ];

    html += `<div class="compare-table" style="margin-bottom:16px;">`;
    basicRows.forEach(row => {
      html += `<div class="compare-row" style="grid-template-columns:${gridCols};">`;
      html += `<div class="compare-row-label">${row.label}</div>`;
      tools.forEach(t => {
        html += `<div class="compare-cell ${row.cellClass(t)}">${row.render(t)}</div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;

    // 特性支持对比
    html += `<div class="compare-table" style="margin-bottom:16px;">
      <div style="padding:14px 20px;background:var(--bg-card2);border-bottom:1px solid var(--border);font-weight:700;font-size:0.9rem;color:var(--text);">
        🎯 特性支持对比
      </div>
    `;
    const featureKeys = Object.keys(TOOL_FEATURES[tools[0].id] || {});
    featureKeys.forEach(feat => {
      html += `<div class="compare-row" style="grid-template-columns:${gridCols};">`;
      html += `<div class="compare-row-label">${feat}</div>`;
      tools.forEach(t => {
        const val = (TOOL_FEATURES[t.id] || {})[feat];
        let display;
        if (val === true) display = '<span class="check-yes">✓</span>';
        else if (val === false) display = '<span class="check-no">✕</span>';
        else if (val) display = `<span class="check-partial">◐</span><div style="font-size:0.72rem;color:var(--text-muted)">${val}</div>`;
        else display = '<span class="check-no">✕</span>';
        html += `<div class="compare-cell">${display}</div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;

    // 雷达图 - 多维评分
    html += `
      <div class="radar-section" style="margin-bottom:16px;">
        <div class="radar-title">🕸️ 多维度评分雷达图</div>
        <div class="radar-wrap">
          <canvas id="radarCanvas" width="320" height="320"></canvas>
          <div class="radar-legend" id="radarLegend"></div>
        </div>
      </div>
    `;

    // 总结推荐
    html += `<div style="font-size:1rem;font-weight:700;margin-bottom:12px;">💡 选购建议</div>`;
    html += `<div class="verdict-section" style="grid-template-columns:repeat(${n},1fr);">`;
    tools.forEach(t => {
      const scores = TOOL_SCORES[t.id] || {};
      const topScore = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
      const pros = (t.features || []).slice(0, 3).map(f => f.title);
      html += `
        <div class="verdict-card">
          <div class="verdict-header">
            <div class="verdict-tool-icon" style="background:${t.color}20;color:${t.color};">${t.icon}</div>
            <div>
              <div class="verdict-tool-name">${t.name}</div>
              <div class="verdict-best-for">最擅长：${topScore ? topScore[0] : t.category}</div>
            </div>
          </div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:8px;">适合人群：${TOOL_FOR[t.id] || '各类用户'}</div>
          <ul class="verdict-pros">
            ${pros.map(p => `<li>${p}</li>`).join('')}
          </ul>
          <a class="verdict-link" href="tool.html?id=${t.id}">查看完整详情 →</a>
        </div>
      `;
    });
    html += `</div>`;

    return html;
  }

  // ============ 雷达图绘制 ============
  function drawRadarAll(tools) {
    requestAnimationFrame(() => {
      const canvas = document.getElementById('radarCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      const R = Math.min(W, H) / 2 - 40;
      const dims = RADAR_DIMS;
      const n = dims.length;
      const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#a855f7'];

      ctx.clearRect(0, 0, W, H);

      // 网格
      for (let level = 1; level <= 5; level++) {
        const r = R * level / 5;
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
          const x = cx + r * Math.cos(angle);
          const y = cy + r * Math.sin(angle);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(99,102,241,0.15)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // 轴线
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
        ctx.strokeStyle = 'rgba(99,102,241,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // 标签
      ctx.fillStyle = '#94a3b8';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
        const lx = cx + (R + 24) * Math.cos(angle);
        const ly = cy + (R + 24) * Math.sin(angle) + 4;
        ctx.fillText(dims[i], lx, ly);
      }

      // 每个工具的雷达面
      tools.forEach((t, ti) => {
        const scores = TOOL_SCORES[t.id] || {};
        const color = colors[ti % colors.length];
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const score = (scores[dims[i]] || 50) / 100;
          const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
          const px = cx + R * score * Math.cos(angle);
          const py = cy + R * score * Math.sin(angle);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = color + '22';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // 图例
      const legendEl = document.getElementById('radarLegend');
      if (legendEl) {
        legendEl.innerHTML = tools.map((t, ti) => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${colors[ti % colors.length]};"></div>
            <span>${t.icon} ${t.name}</span>
          </div>
        `).join('') + `
          <div style="margin-top:12px;font-size:0.75rem;color:var(--text-muted);">
            ${dims.map((d, i) => {
              const bestTool = tools.reduce((best, t) => {
                const s = (TOOL_SCORES[t.id] || {})[d] || 0;
                return s > ((TOOL_SCORES[best.id] || {})[d] || 0) ? t : best;
              });
              return `<div style="padding:3px 0;">${d}: <b style="color:var(--text)">${bestTool.name}</b> 最优</div>`;
            }).join('')}
          </div>
        `;
      }
    });
  }

  function parseUsersNum(str) {
    const m = str.match(/([\d.]+)(万|亿)?/);
    if (!m) return 0;
    let n = parseFloat(m[1]);
    if (m[2] === '亿') n *= 100000000;
    else if (m[2] === '万') n *= 10000;
    return n;
  }

  // ============ 键盘支持 ============
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('pickerOverlay').classList.remove('open');
  });
</script>
