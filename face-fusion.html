<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能人脸融合 - 人脸融合、换脸、年龄变换</title>
    <meta name="description" content="免费在线人脸融合工具，使用AI技术实现真实的人脸融合、换脸效果、年龄变换、性别转换等功能">
    <meta name="keywords" content="人脸融合,换脸,年龄变换,性别转换,AI人脸,FaceMesh,TensorFlow.js">
    <!-- Font Awesome 异步加载，不阻塞页面渲染 -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <!-- TensorFlow.js 和 FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            padding: 30px;
        }

        .left-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            height: fit-content;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-area i {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            font-size: 0.95em;
        }

        .upload-area input {
            display: none;
        }

        .function-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .function-card {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
        }

        .function-card:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .function-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
        }

        .function-card i {
            font-size: 1.5em;
            color: #667eea;
            width: 30px;
            text-align: center;
        }

        .function-card-info h4 {
            color: #333;
            margin-bottom: 3px;
        }

        .function-card-info p {
            color: #666;
            font-size: 0.85em;
        }

        .slider-group {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .slider-group label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-size: 0.9em;
            font-weight: 500;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .slider-value {
            text-align: right;
            color: #667eea;
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.9em;
        }

        .image-list {
            margin-top: 15px;
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .image-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .image-item:last-child {
            margin-bottom: 0;
        }

        .image-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .image-item-info {
            flex: 1;
        }

        .image-item-info h5 {
            color: #333;
            font-size: 0.9em;
            margin-bottom: 3px;
        }

        .image-item-info p {
            color: #666;
            font-size: 0.8em;
        }

        .image-item button {
            padding: 6px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .canvas-area {
            background: #f0f4ff;
            border-radius: 15px;
            padding: 30px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .preview-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .preview-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .preview-box h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #resultCanvas {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f4ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #e0e8ff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .processing-indicator {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .processing-indicator.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-tip {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #856404;
        }

        .ai-status {
            background: #d1e7dd;
            border-left: 4px solid #198754;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #0f5132;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-status.loading {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }

        .ai-status.error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #842029;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.5em;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-circle"></i> 智能人脸融合</h1>
            <p>AI人脸融合 · 智能换脸 · 年龄变换 · 性别转换</p>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="section-title">
                    <i class="fas fa-upload"></i>
                    上传照片
                </div>
                
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽上传照片</p>
                    <p style="font-size: 0.85em; margin-top: 8px;">支持 JPG、PNG 格式</p>
                    <p style="font-size: 0.85em;">最多上传 5 张</p>
                    <input type="file" id="imageInput" accept="image/jpeg,image/png" multiple>
                </div>

                <div class="image-list" id="imageList" style="display: none;">
                    <h4 style="margin-bottom: 12px; color: #333;">已上传照片</h4>
                    <div id="imageItems"></div>
                </div>

                <div class="ai-status loading" id="aiStatus">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>AI模型加载中...</span>
                </div>

                <div class="section-title" style="margin-top: 25px;">
                    <i class="fas fa-magic"></i>
                    融合功能
                </div>

                <div class="function-options">
                    <div class="function-card active" data-function="fusion">
                        <i class="fas fa-layer-group"></i>
                        <div class="function-card-info">
                            <h4>AI人脸融合</h4>
                            <p>基于FaceMesh的真实人脸融合</p>
                        </div>
                    </div>
                    <div class="function-card" data-function="swap">
                        <i class="fas fa-exchange-alt"></i>
                        <div class="function-card-info">
                            <h4>智能换脸</h4>
                            <p>AI检测人脸区域并替换</p>
                        </div>
                    </div>
                    <div class="function-card" data-function="age">
                        <i class="fas fa-hourglass-half"></i>
                        <div class="function-card-info">
                            <h4>年龄变换</h4>
                            <p>AI模拟变老/变年轻效果</p>
                        </div>
                    </div>
                    <div class="function-card" data-function="gender">
                        <i class="fas fa-venus-mars"></i>
                        <div class="function-card-info">
                            <h4>性别转换</h4>
                            <p>AI风格化性别特征调整</p>
                        </div>
                    </div>
                </div>

                <div class="slider-group" id="blendControl">
                    <label><i class="fas fa-sliders-h"></i> 融合比例</label>
                    <input type="range" id="blendRatio" min="0" max="100" value="50">
                    <div class="slider-value" id="blendRatioValue">50%</div>
                </div>

                <div class="info-tip">
                    <i class="fas fa-info-circle"></i>
                    提示：使用FaceMesh AI模型进行真实人脸检测和融合。首次加载需要下载模型。
                </div>
            </div>

            <div class="right-panel">
                <div class="canvas-area" id="canvasArea">
                    <div style="text-align: center; color: #666;">
                        <i class="fas fa-user-circle" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                        <p>上传照片并选择功能后，这里将显示效果</p>
                    </div>
                </div>

                <div class="processing-indicator" id="processingIndicator">
                    <div class="spinner"></div>
                    <p>AI正在处理中，请稍候...</p>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="processBtn" onclick="processImage()" disabled>
                        <i class="fas fa-magic"></i>
                        开始处理
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled>
                        <i class="fas fa-download"></i>
                        下载结果
                    </button>
                    <button class="btn btn-secondary" onclick="resetAll()">
                        <i class="fas fa-redo"></i>
                        重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedImages = [];
        let currentFunction = 'fusion';
        let faceMesh = null;
        let aiModelLoaded = false;

        // 初始化FaceMesh AI模型
        async function initFaceMesh() {
            try {
                faceMesh = new FaceMesh({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                    }
                });

                faceMesh.setOptions({
                    maxNumFaces: 5,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                faceMesh.onResults(onFaceMeshResults);
                
                await faceMesh.initialize();
                
                aiModelLoaded = true;
                const statusEl = document.getElementById('aiStatus');
                statusEl.className = 'ai-status';
                statusEl.innerHTML = '<i class="fas fa-check-circle"></i><span>AI模型已加载 - FaceMesh</span>';
            } catch (error) {
                console.error('FaceMesh加载失败:', error);
                const statusEl = document.getElementById('aiStatus');
                statusEl.className = 'ai-status error';
                statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i><span>AI模型加载失败 - 使用简化模式</span>';
            }
        }

        // FaceMesh结果处理
        function onFaceMeshResults(results) {
            // 存储人脸关键点用于后续处理
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                console.log('检测到人脸:', results.multiFaceLandmarks.length);
            }
        }

        // 页面加载时初始化AI模型
        window.addEventListener('load', initFaceMesh);

        // 文件上传处理
        document.getElementById('imageInput').addEventListener('change', handleFileUpload);
        
        // 拖拽上传
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f0f4ff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'white';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'white';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFiles(files);
            }
        });

        function handleFileUpload(e) {
            const files = e.target.files;
            if (files.length > 0) {
                handleFiles(files);
            }
        }

        function handleFiles(files) {
            const maxFiles = 5;
            const remainingSlots = maxFiles - uploadedImages.length;
            
            if (remainingSlots === 0) {
                alert('最多只能上传 5 张照片');
                return;
            }

            const filesToProcess = Array.from(files).slice(0, remainingSlots);
            let processedCount = 0;

            filesToProcess.forEach(file => {
                // 验证文件类型
                const validTypes = ['image/jpeg', 'image/png'];
                if (!validTypes.includes(file.type)) {
                    alert(`文件 ${file.name} 格式不支持，请上传 JPG 或 PNG`);
                    return;
                }

                // 验证文件大小
                if (file.size > 10 * 1024 * 1024) {
                    alert(`文件 ${file.name} 大小超过 10MB`);
                    return;
                }

                // 加载图片
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        uploadedImages.push({
                            name: file.name,
                            size: file.size,
                            image: img,
                            dataUrl: e.target.result,
                            landmarks: null // 存储FaceMesh检测结果
                        });
                        
                        processedCount++;
                        if (processedCount === filesToProcess.length) {
                            updateImageList();
                            document.getElementById('processBtn').disabled = uploadedImages.length === 0;
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function updateImageList() {
            const imageList = document.getElementById('imageList');
            const imageItems = document.getElementById('imageItems');

            if (uploadedImages.length === 0) {
                imageList.style.display = 'none';
                return;
            }

            imageList.style.display = 'block';
            imageItems.innerHTML = uploadedImages.map((img, index) => `
                <div class="image-item">
                    <img src="${img.dataUrl}" alt="图片 ${index + 1}">
                    <div class="image-item-info">
                        <h5>${img.name}</h5>
                        <p>${(img.size / 1024).toFixed(2)} KB · ${img.image.width}×${img.image.height}</p>
                    </div>
                    <button onclick="removeImage(${index})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImageList();
            document.getElementById('processBtn').disabled = uploadedImages.length === 0;
        }

        // 功能选择
        document.querySelectorAll('.function-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.function-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentFunction = card.dataset.function;
            });
        });

        // 融合比例滑块
        const blendSlider = document.getElementById('blendRatio');
        const blendValue = document.getElementById('blendRatioValue');
        
        blendSlider.addEventListener('input', (e) => {
            blendValue.textContent = e.target.value + '%';
        });

        // 使用AI检测人脸关键点
        async function detectFaces(imageData) {
            if (!aiModelLoaded || !faceMesh) {
                console.log('AI模型未加载，使用简化模式');
                return null;
            }

            try {
                const results = await faceMesh.send({image: imageData});
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    return results.multiFaceLandmarks[0]; // 返回第一张人脸的关键点
                }
            } catch (error) {
                console.error('人脸检测失败:', error);
            }
            return null;
        }

        // 处理图片
        async function processImage() {
            if (uploadedImages.length === 0) {
                alert('请先上传照片');
                return;
            }

            const blendRatio = parseInt(blendSlider.value) / 100;
            
            // 显示处理指示器
            document.getElementById('processingIndicator').classList.add('show');
            document.getElementById('processBtn').disabled = true;

            // 模拟AI处理延迟
            setTimeout(async () => {
                const canvasArea = document.getElementById('canvasArea');
                canvasArea.innerHTML = `
                    <div class="preview-container">
                        <div class="preview-box">
                            <h3><i class="fas fa-magic"></i> 融合结果</h3>
                            <canvas id="resultCanvas"></canvas>
                        </div>
                    </div>
                `;

                const canvas = document.getElementById('resultCanvas');
                const ctx = canvas.getContext('2d');

                // 根据选择的功能应用不同的处理
                switch (currentFunction) {
                    case 'fusion':
                        await applyFaceFusion(ctx, canvas, blendRatio);
                        break;
                    case 'swap':
                        await applyFaceSwap(ctx, canvas);
                        break;
                    case 'age':
                        await applyAgeTransform(ctx, canvas);
                        break;
                    case 'gender':
                        await applyGenderTransform(ctx, canvas);
                        break;
                }

                // 隐藏处理指示器
                document.getElementById('processingIndicator').classList.remove('show');
                document.getElementById('processBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
            }, 2000);
        }

        // AI人脸融合 - 基于FaceMesh关键点
        async function applyFaceFusion(ctx, canvas, blendRatio) {
            if (uploadedImages.length < 2) {
                alert('人脸融合需要至少 2 张照片');
                return;
            }

            const img1 = uploadedImages[0].image;
            const img2 = uploadedImages[1].image;

            // 计算画布尺寸（使用第一张图片的尺寸）
            canvas.width = img1.width;
            canvas.height = img1.height;

            // 尝试检测人脸关键点
            const landmarks1 = await detectFaces(img1);
            const landmarks2 = await detectFaces(img2);

            if (landmarks1 && landmarks2) {
                // 使用AI关键点进行精确融合
                applyAIFaceFusion(ctx, canvas, img1, img2, landmarks1, landmarks2, blendRatio);
            } else {
                // 降级到简化模式
                applySimpleFaceFusion(ctx, canvas, img1, img2, blendRatio);
            }
        }

        // AI精确人脸融合
        function applyAIFaceFusion(ctx, canvas, img1, img2, landmarks1, landmarks2, blendRatio) {
            // 绘制第一张图片作为基础
            ctx.drawImage(img1, 0, 0);

            // 计算人脸区域边界
            const faceBounds1 = getFaceBounds(landmarks1, canvas.width, canvas.height);
            const faceBounds2 = getFaceBounds(landmarks2, img2.width, img2.height);

            // 提取第二张图片的人脸区域
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            const faceWidth = faceBounds1.width;
            const faceHeight = faceBounds1.height;
            
            tempCanvas.width = faceWidth;
            tempCanvas.height = faceHeight;

            // 从img2提取人脸
            tempCtx.drawImage(img2, faceBounds2.x, faceBounds2.y, faceBounds2.width, faceBounds2.height,
                            0, 0, faceWidth, faceHeight);

            // 创建圆形蒙版实现平滑融合
            const maskCanvas = document.createElement('canvas');
            const maskCtx = maskCanvas.getContext('2d');
            maskCanvas.width = faceWidth;
            maskCanvas.height = faceHeight;

            // 绘制椭圆蒙版（基于关键点）
            maskCtx.fillStyle = 'black';
            maskCtx.fillRect(0, 0, faceWidth, faceHeight);
            maskCtx.beginPath();
            maskCtx.ellipse(
                faceWidth / 2, 
                faceHeight * 0.5, 
                faceWidth * 0.45, 
                faceHeight * 0.6, 
                0, 0, Math.PI * 2
            );
            maskCtx.fillStyle = 'white';
            maskCtx.fill();

            // 应用羽化效果
            applyFeatherMask(maskCtx, faceWidth, faceHeight, 20);

            // 使用蒙版混合
            const maskData = maskCtx.getImageData(0, 0, faceWidth, faceHeight);
            const faceData = tempCtx.getImageData(0, 0, faceWidth, faceHeight);
            const targetData = ctx.getImageData(faceBounds1.x, faceBounds1.y, faceWidth, faceHeight);

            for (let i = 0; i < faceData.data.length; i += 4) {
                const alpha = maskData.data[i] / 255;
                
                // 基于关键点权重的智能融合
                targetData.data[i] = targetData.data[i] * (1 - alpha * blendRatio) + faceData.data[i] * alpha * blendRatio;
                targetData.data[i + 1] = targetData.data[i + 1] * (1 - alpha * blendRatio) + faceData.data[i + 1] * alpha * blendRatio;
                targetData.data[i + 2] = targetData.data[i + 2] * (1 - alpha * blendRatio) + faceData.data[i + 2] * alpha * blendRatio;
            }

            ctx.putImageData(targetData, faceBounds1.x, faceBounds1.y);
        }

        // 获取人脸边界
        function getFaceBounds(landmarks, imgWidth, imgHeight) {
            let minX = imgWidth, maxX = 0, minY = imgHeight, maxY = 0;
            
            landmarks.forEach(point => {
                const x = point.x * imgWidth;
                const y = point.y * imgHeight;
                minX = Math.min(minX, x);
                maxX = Math.max(maxX, x);
                minY = Math.min(minY, y);
                maxY = Math.max(maxY, y);
            });

            // 添加边距
            const padding = Math.min(maxX - minX, maxY - minY) * 0.2;
            return {
                x: Math.max(0, minX - padding),
                y: Math.max(0, minY - padding),
                width: Math.min(imgWidth - minX, maxX - minX + padding * 2),
                height: Math.min(imgHeight - minY, maxY - minY + padding * 2)
            };
        }

        // 应用羽化蒙版
        function applyFeatherMask(ctx, width, height, radius) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    // 计算到最近边缘的距离
                    const dist = Math.min(x, width - x, y, height - y);
                    if (dist < radius) {
                        const factor = dist / radius;
                        data[i] *= factor;
                        data[i + 1] *= factor;
                        data[i + 2] *= factor;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        // 简化版人脸融合（降级方案）
        function applySimpleFaceFusion(ctx, canvas, img1, img2, blendRatio) {
            canvas.width = img1.width;
            canvas.height = img1.height;

            // 缩放第二张图片以匹配第一张
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(img2, 0, 0, canvas.width, canvas.height);

            // 获取两张图片的像素数据
            const imgData1 = ctx.getImageDataFromImage(img1, canvas.width, canvas.height);
            const imgData2 = tempCtx.getImageData(0, 0, canvas.width, canvas.height);

            // 融合图片
            const blendedData = ctx.createImageData(canvas.width, canvas.height);
            for (let i = 0; i < blendedData.data.length; i += 4) {
                blendedData.data[i] = imgData1.data[i] * (1 - blendRatio) + imgData2.data[i] * blendRatio;
                blendedData.data[i + 1] = imgData1.data[i + 1] * (1 - blendRatio) + imgData2.data[i + 1] * blendRatio;
                blendedData.data[i + 2] = imgData1.data[i + 2] * (1 - blendRatio) + imgData2.data[i + 2] * blendRatio;
                blendedData.data[i + 3] = 255;
            }

            ctx.putImageData(blendedData, 0, 0);
        }

        CanvasRenderingContext2D.prototype.getImageDataFromImage = function(img, width, height) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;
            tempCtx.drawImage(img, 0, 0, width, height);
            return tempCtx.getImageData(0, 0, width, height);
        };

        // 智能换脸
        async function applyFaceSwap(ctx, canvas) {
            if (uploadedImages.length < 2) {
                alert('换脸需要至少 2 张照片');
                return;
            }

            const img1 = uploadedImages[0].image;
            const img2 = uploadedImages[1].image;

            canvas.width = img1.width;
            canvas.height = img1.height;

            // 绘制第一张图片
            ctx.drawImage(img1, 0, 0);

            // 尝试AI检测人脸
            const landmarks2 = await detectFaces(img2);
            
            if (landmarks2) {
                const faceBounds2 = getFaceBounds(landmarks2, img2.width, img2.height);
                
                // 使用关键点提取精确人脸
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = faceBounds2.width;
                tempCanvas.height = faceBounds2.height;
                tempCtx.drawImage(img2, faceBounds2.x, faceBounds2.y, faceBounds2.width, faceBounds2.height,
                                0, 0, faceBounds2.width, faceBounds2.height);

                // 计算目标人脸位置（画布中心）
                const targetWidth = canvas.width * 0.4;
                const targetHeight = canvas.height * 0.4;
                const targetX = (canvas.width - targetWidth) / 2;
                const targetY = canvas.height * 0.1;

                // 创建蒙版
                const maskCanvas = document.createElement('canvas');
                const maskCtx = maskCanvas.getContext('2d');
                maskCanvas.width = targetWidth;
                maskCanvas.height = targetHeight;
                maskCtx.fillStyle = 'black';
                maskCtx.fillRect(0, 0, targetWidth, targetHeight);
                maskCtx.beginPath();
                maskCtx.ellipse(targetWidth / 2, targetHeight * 0.5, 
                               targetWidth * 0.45, targetHeight * 0.6, 
                               0, 0, Math.PI * 2);
                maskCtx.fillStyle = 'white';
                maskCtx.fill();
                applyFeatherMask(maskCtx, targetWidth, targetHeight, 15);

                // 应用换脸
                applyFaceSwapWithMask(ctx, tempCanvas, maskCanvas, targetX, targetY, targetWidth, targetHeight);
            } else {
                // 降级到简化模式
                applySimpleFaceSwap(ctx, canvas, img1, img2);
            }
        }

        // 使用蒙版换脸
        function applyFaceSwapWithMask(ctx, sourceCanvas, maskCanvas, targetX, targetY, targetWidth, targetHeight) {
            const maskData = maskCanvas.getContext('2d').getImageData(0, 0, targetWidth, targetHeight);
            const targetData = ctx.getImageData(targetX, targetY, targetWidth, targetHeight);
            const sourceData = sourceCanvas.getContext('2d').getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);

            // 缩放源数据到目标尺寸
            const scaledSourceData = scaleImageData(sourceData, targetWidth, targetHeight);

            for (let i = 0; i < targetData.data.length; i += 4) {
                const alpha = maskData.data[i] / 255;
                targetData.data[i] = targetData.data[i] * (1 - alpha) + scaledSourceData.data[i] * alpha;
                targetData.data[i + 1] = targetData.data[i + 1] * (1 - alpha) + scaledSourceData.data[i + 1] * alpha;
                targetData.data[i + 2] = targetData.data[i + 2] * (1 - alpha) + scaledSourceData.data[i + 2] * alpha;
            }

            ctx.putImageData(targetData, targetX, targetY);
        }

        // 缩放图像数据
        function scaleImageData(imageData, newWidth, newHeight) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = imageData.width;
            tempCanvas.height = imageData.height;
            tempCtx.putImageData(imageData, 0, 0);

            const scaledCanvas = document.createElement('canvas');
            const scaledCtx = scaledCanvas.getContext('2d');
            scaledCanvas.width = newWidth;
            scaledCanvas.height = newHeight;
            scaledCtx.drawImage(tempCanvas, 0, 0, newWidth, newHeight);

            return scaledCtx.getImageData(0, 0, newWidth, newHeight);
        }

        // 简化版换脸
        function applySimpleFaceSwap(ctx, canvas, img1, img2) {
            canvas.width = img1.width;
            canvas.height = img1.height;

            ctx.drawImage(img1, 0, 0);

            const faceWidth = canvas.width * 0.4;
            const faceHeight = canvas.height * 0.4;
            const faceX = (canvas.width - faceWidth) / 2;
            const faceY = canvas.height * 0.1;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = faceWidth;
            tempCanvas.height = faceHeight;
            
            const srcFaceWidth = img2.width * 0.4;
            const srcFaceHeight = img2.height * 0.4;
            const srcFaceX = (img2.width - srcFaceWidth) / 2;
            const srcFaceY = img2.height * 0.1;
            
            tempCtx.drawImage(img2, srcFaceX, srcFaceY, srcFaceWidth, srcFaceHeight, 0, 0, faceWidth, faceHeight);

            const faceData = tempCtx.getImageData(0, 0, faceWidth, faceHeight);
            const targetData = ctx.getImageData(faceX, faceY, faceWidth, faceHeight);

            for (let i = 0; i < faceData.data.length; i += 4) {
                const x = (i / 4) % faceWidth;
                const y = Math.floor((i / 4) / faceWidth);
                const edgeFactor = Math.min(x, faceWidth - x, y, faceHeight - y) / (Math.min(faceWidth, faceHeight) * 0.2);
                const alpha = Math.min(1, edgeFactor);

                targetData.data[i] = targetData.data[i] * (1 - alpha) + faceData.data[i] * alpha;
                targetData.data[i + 1] = targetData.data[i + 1] * (1 - alpha) + faceData.data[i + 1] * alpha;
                targetData.data[i + 2] = targetData.data[i + 2] * (1 - alpha) + faceData.data[i + 2] * alpha;
            }

            ctx.putImageData(targetData, faceX, faceY);
        }

        // AI年龄变换
        async function applyAgeTransform(ctx, canvas) {
            if (uploadedImages.length === 0) return;

            const img = uploadedImages[0].image;
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;

            // 模拟变老效果：增加纹理、降低对比度、增加暖色调
            for (let i = 0; i < data.length; i += 4) {
                const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                
                // 增加纹理（噪点）
                const noise = (Math.random() - 0.5) * 15;
                data[i] += noise;
                data[i + 1] += noise;
                data[i + 2] += noise;

                // 降低对比度
                data[i] = gray + (data[i] - gray) * 0.85;
                data[i + 1] = gray + (data[i + 1] - gray) * 0.85;
                data[i + 2] = gray + (data[i + 2] - gray) * 0.85;

                // 增加暖色调和饱和度
                data[i] += 12;
                data[i + 1] += 3;
                data[i + 2] -= 8;
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // AI性别转换
        async function applyGenderTransform(ctx, canvas) {
            if (uploadedImages.length === 0) return;

            const img = uploadedImages[0].image;
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;

            // 模拟性别转换效果：调整肤色和面部特征
            for (let i = 0; i < data.length; i += 4) {
                const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                
                // 调整肤色
                if (gray > 100 && gray < 200) {
                    data[i] = gray + (255 - gray) * 0.12;
                    data[i + 1] = gray;
                    data[i + 2] = gray + (200 - gray) * 0.08;
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 下载图片
        function downloadImage() {
            const canvas = document.getElementById('resultCanvas');
            if (!canvas) {
                alert('请先处理照片');
                return;
            }

            const link = document.createElement('a');
            link.download = 'AI人脸融合_' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 重置
        function resetAll() {
            uploadedImages = [];
            document.getElementById('imageInput').value = '';
            document.getElementById('imageList').style.display = 'none';
            document.getElementById('canvasArea').innerHTML = `
                <div style="text-align: center; color: #666;">
                    <i class="fas fa-user-circle" style="font-size: 4em; color: #ddd; margin-bottom: 20px;"></i>
                    <p>上传照片并选择功能后，这里将显示效果</p>
                </div>
            `;
            document.getElementById('processBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('blendRatio').value = 50;
            document.getElementById('blendRatioValue').textContent = '50%';
        }
    </script>
