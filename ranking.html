    .rank-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}

<main class="main">

<script>
// 月榜排名数据（按排名顺序）
const monthlyRanking = [
  { id: 'chatgpt', trend: 'same', trendText: '持平' },
  { id: 'midjourney', trend: 'same', trendText: '持平' },
  { id: 'cursor', trend: 'up', trendText: '↑2 上升' },
  { id: 'claude', trend: 'up', trendText: '↑1 上升' },
  { id: 'runway', trend: 'down', trendText: '↓1 下降' },
  { id: 'stable-diffusion', trend: 'same', trendText: '持平' },
  { id: 'suno', trend: 'up', trendText: '↑3 上升' },
  { id: 'notion-ai', trend: 'same', trendText: '持平' },
  { id: 'perplexity', trend: 'up', trendText: '↑2 上升' },
  { id: 'github-copilot', trend: 'down', trendText: '↓2 下降' },
];

// 分类榜数据
const categoryRanking = {
  writing: { icon: '✍️', title: 'AI写作 TOP3', tools: ['chatgpt', 'claude', 'jasper'] },
  image: { icon: '🎨', title: 'AI绘画 TOP3', tools: ['midjourney', 'stable-diffusion', 'dall-e'] },
  code: { icon: '💻', title: 'AI编程 TOP3', tools: ['cursor', 'github-copilot', 'codeium'] },
};

// 飙升榜数据
const risingRanking = [
  { id: 'cursor', growth: '523%', desc: '本月搜索量暴增，AI编程最热工具' },
  { id: 'suno', growth: '412%', desc: '新版本发布带来用户量激增' },
  { id: 'perplexity', growth: '287%', desc: 'AI搜索赛道最热，月活破千万' },
  { id: 'runway', growth: '198%', desc: '新一代视频模型发布引爆市场' },
];

// 月榜渲染
function renderMonthlyRanking() {
  const container = document.getElementById('monthly');
  const medals = ['🥇', '🥈', '🥉'];
  
  container.innerHTML = monthlyRanking.map((item, index) => {
    const tool = TOOLS_DATA[item.id];
    if (!tool) return '';
    
    const rank = index + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const numDisplay = rank <= 3 ? medals[rank - 1] : rank;
    const href = ['chatgpt', 'midjourney', 'cursor', 'claude', 'runway', 'stable-diffusion', 'suno', 'notion-ai'].includes(item.id) 
      ? `tool.html?id=${item.id}` 
      : '#';
    const onclick = href === '#' ? `onclick="window.open('${tool.url}','_blank');return false;"` : '';
    
    return `
      <a href="${href}" ${onclick} class="rank-item ${rankClass}" role="listitem">
        <div class="rank-num">${numDisplay}</div>
        <div class="rank-icon" style="background:${tool.color}20;">${tool.icon}</div>
        <div class="rank-info">
          <h3>${tool.name}</h3>
          <div class="rank-tags">
            <span class="tag">${tool.category}</span>
            ${item.id === 'stable-diffusion' ? '<span class="tag">开源</span>' : ''}
          </div>
        </div>
        <div class="rank-score">
          <div class="score-num">${tool.rating.toFixed(1)}</div>
          <div class="score-sub">综合评分</div>
        </div>
        <div class="rank-trend trend-${item.trend}">${item.trendText}</div>
      </a>
    `;
  }).join('');
}

// 分类榜渲染
function renderCategoryRanking() {
  const container = document.getElementById('category');
  const medals = ['🥇', '🥈', '🥉'];
  
  container.innerHTML = Object.entries(categoryRanking).map(([catId, cat]) => {
    const toolsHtml = cat.tools.map((id, idx) => {
      const tool = TOOLS_DATA[id];
      if (!tool) return '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg);border-radius:8px;">
        <span>${medals[idx]} ${tool.name}</span>
        <span style="color:var(--warning)">★${tool.rating} · ${tool.users}</span>
      </div>`;
    }).join('');
    
    return `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;">
        <h3 style="margin-bottom:16px;color:#a5b4fc;">${cat.icon} ${cat.title}</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${toolsHtml}
        </div>
      </div>
    `;
  }).join('');
}

// 飙升榜渲染
function renderRisingRanking() {
  const container = document.getElementById('rising');
  
  container.innerHTML = risingRanking.map(item => {
    const tool = TOOLS_DATA[item.id];
    if (!tool) return '';
    
    const href = ['cursor', 'suno', 'runway'].includes(item.id) 
      ? `tool.html?id=${item.id}` 
      : tool.url;
    const target = ['cursor', 'suno', 'runway'].includes(item.id) ? '' : 'target="_blank" rel="noopener"';
    
    return `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;">
        <div style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:700;">↑ ${item.growth}</div>
        <div style="flex:1;">
          <div style="font-weight:600;">${tool.name}</div>
          <div style="font-size:.8rem;color:var(--text-muted);">${item.desc}</div>
        </div>
        <a href="${href}" ${target} style="color:var(--primary);font-size:.85rem;text-decoration:none;">查看 →</a>
      </div>
    `;
  }).join('');
}

function switchTab(btn, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['monthly','category','rising'].forEach(k => {
    document.getElementById(k).style.display = k === id ? 'block' : 'none';
  });
}

// 页面加载时渲染所有榜单
document.addEventListener('DOMContentLoaded', function() {
  renderMonthlyRanking();
  renderCategoryRanking();
  renderRisingRanking();
});
</script>
