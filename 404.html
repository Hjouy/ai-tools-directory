<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - AI工具导航</title>
  <meta name="description" content="抱歉，您访问的页面不存在。浏览更多AI工具，发现最好用的人工智能工具。">
  <link rel="canonical" href="https://hjouy.github.io/ai-tools-directory/404.html">
  <script src="seo-head.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .error-code {
      font-size: 10rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .error-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }

    .error-message {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .btn {
      padding: 0.875rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: #e2e8f0;
      border: 2px solid #6366f1;
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.1);
      transform: translateY(-2px);
    }

    .quick-links {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 2rem;
    }

    .quick-links h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
    }

    .link-item {
      display: block;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.5rem;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .link-item:hover {
      background: rgba(99, 102, 241, 0.2);
      color: #e2e8f0;
      transform: translateY(-2px);
    }

    .search-box {
      margin-bottom: 2rem;
    }

    .search-box input {
      width: 100%;
      max-width: 400px;
      padding: 0.875rem 1.25rem;
      border: 2px solid rgba(99, 102, 241, 0.3);
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .search-box input::placeholder {
      color: #64748b;
    }

    @media (max-width: 640px) {
      .error-code {
        font-size: 7rem;
      }

      .error-title {
        font-size: 1.5rem;
      }

      .error-message {
        font-size: 1rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="error-title">页面未找到</h1>
    <p class="error-message">
      抱歉，您访问的页面不存在或已被移除。<br>
      但别担心，这里还有很多精彩的 AI 工具等着你探索！
    </p>

    <div class="search-box">
      <input type="text" placeholder="搜索 AI 工具..." id="searchInput" onkeypress="handleSearch(event)">
    </div>

    <div class="action-buttons">
      <a href="/" class="btn btn-primary">返回首页</a>
      <a href="/submit.html" class="btn btn-secondary">提交工具</a>
    </div>

    <div class="quick-links">
      <h3>热门分类</h3>
      <div class="links-grid">
        <a href="/writing.html" class="link-item">AI 写作</a>
        <a href="/image.html" class="link-item">AI 绘画</a>
        <a href="/video.html" class="link-item">AI 视频</a>
        <a href="/code.html" class="link-item">AI 编程</a>
        <a href="/audio.html" class="link-item">AI 音乐</a>
        <a href="/ranking.html" class="link-item">排行榜</a>
        <a href="/tutorials.html" class="link-item">教程</a>
        <a href="/compare.html" class="link-item">工具对比</a>
      </div>
    </div>
  </div>

  <script>
    function handleSearch(event) {
      if (event.key === 'Enter') {
        const searchTerm = event.target.value.trim();
        if (searchTerm) {
          window.location.href = `/?s=${encodeURIComponent(searchTerm)}`;
        }
      }
    }

    // 记录 404 错误（可选）
    if (typeof gtag !== 'undefined') {
      gtag('event', 'page_view', {
        'event_label': '404',
        'page_location': window.location.href
      });
    }
  </script>
</body>
</html>
