<script>
// 动态渲染绘画类工具
function renderImageTools() {
  const grid = document.getElementById('toolsGrid');
  if (!grid) return;

  // 从 data.js 获取绘画类工具
  const imageTools = Object.values(TOOLS_DATA).filter(tool => 
    tool.categoryId === 'image' || tool.category === 'AI绘画'
  );

  // 生成工具卡片
  grid.innerHTML = imageTools.map(tool => {
    // 判断价格类型
    const priceClass = tool.priceType === 'free' || tool.price.includes('免费') || tool.price.includes('完全免费') ? 'price-free' : 
                       tool.price.includes('$') && !tool.price.includes('免费') ? 'price-paid' : '';

    // 判断是否有详情页
    const hasDetailPage = TOOLS_DATA[tool.id] !== undefined;
    const onclick = hasDetailPage ? `location.href='tool.html?id=${tool.id}'` : `window.open('${tool.url}','_blank')`;

    // HOT 标签
    const hotTag = tool.isHot ? '<span class="hot-tag">HOT</span>' : '';
    // 开源标签
    const openTag = tool.priceType === 'free' && tool.id === 'stable-diffusion' ? '<span class="open-tag">开源</span>' : '';
    // 国产标签
    const cnTag = tool.id === 'canva-ai' ? '' : '';

    // 评分星级
    const stars = '★'.repeat(Math.floor(tool.rating)) + (tool.rating % 1 >= 0.5 ? '½' : '');

    return `
      <article class="tool-card" data-tags="art" role="listitem" onclick="${onclick}" itemscope itemtype="https://schema.org/SoftwareApplication">
        ${hotTag}${openTag}
        <div class="tool-header">
          <div class="tool-logo" style="background:${tool.color}20;color:${tool.color};">${tool.icon}</div>
          <div>
            <div class="tool-name" itemprop="name">${tool.name}</div>
            <div class="tool-rating">${stars} ${tool.rating} · ${tool.users}</div>
          </div>
        </div>
        <p class="tool-desc" itemprop="description">${tool.desc}</p>
        <div class="tool-footer">
          <div class="tags">
            <span class="tag">${tool.category}</span>
          </div>
          <span class="price ${priceClass}">${tool.price}</span>
        </div>
      </article>
    `;
  }).join('');

  // 更新筛选按钮
  document.querySelector('.filter-bar').innerHTML = `
    <button class="filter-btn active" onclick="filter(this,'all')">全部 (${imageTools.length})</button>
    <button class="filter-btn" onclick="filter(this,'free')">免费可用</button>
    <button class="filter-btn" onclick="filter(this,'open')">开源免费</button>
    <button class="filter-btn" onclick="filter(this,'realistic')">写实风格</button>
    <button class="filter-btn" onclick="filter(this,'art')">艺术创作</button>
  `;
}

function filter(btn, type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tool-card').forEach(card => {
    card.style.display = (type === 'all' || card.dataset.tags.includes(type)) ? '' : 'none';
  });
}

// 页面加载完成后渲染工具
document.addEventListener('DOMContentLoaded', renderImageTools);
</script>
