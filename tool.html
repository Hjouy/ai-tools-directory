// 渲染工具详情
function renderTool(id) {
  const tool = TOOLS[id];
  if (!tool) {
    document.getElementById('toolName').textContent = '工具未找到';
    document.getElementById('toolDesc').textContent = '请返回首页浏览其他工具。';
    return;
  }

  // 更新页面标题 & Meta
  document.title = `${tool.name} - ${tool.category}工具详情介绍、定价与评价 | AI工具导航`;
  document.querySelector('meta[name="description"]').setAttribute('content',
    `${tool.name}详细介绍：${tool.desc.slice(0,80)}...查看功能特点、定价方案和真实用户评价。`
  );

  // 结构化数据
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": tool.name,
    "description": tool.desc,
    "url": tool.url,
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "description": tool.price,
      "priceCurrency": "USD"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": tool.rating,
      "bestRating": "5",
      "worstRating": "1",
      "ratingCount": tool.reviewCount
    },
    "publisher": {
      "@type": "Organization",
      "name": "AI工具导航",
      "url": "https://hjouy.github.io/ai-tools-directory/"
    }
  });
  document.head.appendChild(ldScript);

  // Canonical
  const canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = `https://hjouy.github.io/ai-tools-directory/tool.html?id=${id}`;

  // 面包屑
  document.getElementById('breadcrumb-category').textContent = tool.category;
  document.getElementById('breadcrumb-tool').textContent = tool.name;

  // 头部
  const logo = document.getElementById('toolLogo');
  logo.textContent = tool.icon;
  logo.style.background = `${tool.color}25`;
  logo.style.color = tool.color;
  document.getElementById('toolName').textContent = tool.name;
  document.getElementById('toolRating').textContent = tool.rating;
  document.getElementById('toolCategory').textContent = tool.category;
  document.getElementById('toolUsers').textContent = tool.users;
  document.getElementById('toolDesc').textContent = tool.desc;
  document.getElementById('toolPrice').textContent = tool.price;
  document.getElementById('toolLink').href = tool.url;

  const starsEl = document.getElementById('toolStars');
  const fullStars = Math.floor(tool.rating);
  const hasHalf = tool.rating % 1 >= 0.5;
  starsEl.textContent = '★'.repeat(fullStars) + (hasHalf ? '½' : '') + '☆'.repeat(5 - fullStars - (hasHalf ? 1 : 0));

  // 功能特点
  const featEl = document.getElementById('toolFeatures');
  featEl.innerHTML = tool.features.map(f => `
    <div class="feature-item">
      <div class="feature-icon">${f.icon}</div>
      <div class="feature-text">
        <h4>${f.title}</h4>
        <p>${f.desc}</p>
      </div>
    </div>
  `).join('');

  // 使用场景
  document.getElementById('toolScenes').innerHTML = tool.scenes.map(s =>
    `<span class="scene-tag">${s}</span>`
  ).join('');

  // 定价
  const pricingBody = document.querySelector('#toolPricing tbody');
  pricingBody.innerHTML = tool.pricing.map(p => `
    <tr>
      <td><strong>${p.name}</strong></td>
      <td>${p.features}</td>
      <td>${p.price}</td>
    </tr>
  `).join('');

  // 评分
  document.getElementById('scoreNum').textContent = tool.rating;
  document.getElementById('reviewCount').textContent = `基于${tool.reviewCount.toLocaleString()}条评价`;
  document.getElementById('s5p').textContent = tool.score5 + '%';
  document.getElementById('s4p').textContent = tool.score4 + '%';
  document.getElementById('s3p').textContent = tool.score3 + '%';
  document.getElementById('s2p').textContent = tool.score2 + '%';
  document.getElementById('s1p').textContent = tool.score1 + '%';
  setTimeout(() => {
    document.getElementById('s5f').style.width = tool.score5 + '%';
    document.getElementById('s4f').style.width = tool.score4 + '%';
    document.getElementById('s3f').style.width = tool.score3 + '%';
    document.getElementById('s2f').style.width = tool.score2 + '%';
    document.getElementById('s1f').style.width = tool.score1 + '%';
  }, 200);

  // 用户评价
  document.getElementById('toolReviews').innerHTML = tool.reviews.map(r => `
    <div class="review-item" itemprop="review" itemscope itemtype="https://schema.org/Review">
      <div class="review-header">
        <div class="reviewer-avatar">${r.name.charAt(0)}</div>
        <div>
          <div class="reviewer-name" itemprop="author">${r.name}</div>
          <div class="reviewer-role">${r.role}</div>
        </div>
        <div class="review-rating" itemprop="reviewRating" itemscope itemtype="https://schema.org/Rating">
          <span itemprop="ratingValue">${r.rating}</span>/5 ${'★'.repeat(r.rating)}
        </div>
      </div>
      <p class="review-text" itemprop="reviewBody">${r.text}</p>
    </div>
  `).join('');

  // 工具信息表
  document.getElementById('toolInfoTable').innerHTML = Object.entries(tool.info).map(([k, v]) => {
    const labels = { developer: '开发商', released: '发布时间', platform: '支持平台', language: '支持语言', update: '更新频率', category: '工具分类' };
    return `<tr><td>${labels[k] || k}</td><td>${v}</td></tr>`;
  }).join('');

  // 相关工具
  document.getElementById('relatedTools').innerHTML = tool.related.map(r => `
    <a class="related-tool" href="tool.html?id=${r.id}">
      <div class="related-icon" style="background:${r.color}25;color:${r.color};">${r.icon}</div>
      <div>
        <div class="related-name">${r.name}</div>
        <div class="related-tag">${r.tag}</div>
      </div>
    </a>
  `).join('');
}

// 初始化
const params = new URLSearchParams(window.location.search);
const toolId = params.get('id') || 'chatgpt';
renderTool(toolId);
</script>

</body>
</html>
