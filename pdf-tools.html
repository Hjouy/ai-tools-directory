<body>
    <div class="container">
        <div class="header">
            <h1>📄 在线PDF工具</h1>
            <p>PDF合并、拆分、转图片、压缩，办公必备</p>
        </div>

        <div class="tool-tabs">
            <button class="tab-btn active" onclick="switchTool('merge')">
                <i class="fas fa-object-group"></i> PDF合并
            </button>
            <button class="tab-btn" onclick="switchTool('split')">
                <i class="fas fa-cut"></i> PDF拆分
            </button>
            <button class="tab-btn" onclick="switchTool('toimage')">
                <i class="fas fa-image"></i> PDF转图片
            </button>
            <button class="tab-btn" onclick="switchTool('compress')">
                <i class="fas fa-compress"></i> PDF压缩
            </button>
        </div>

        <!-- PDF合并 -->
        <div class="tool-content active" id="merge">
            <div class="upload-area" onclick="document.getElementById('mergeFiles').click()">
                <input type="file" id="mergeFiles" multiple accept=".pdf" style="display: none;" onchange="handleMergeFiles(this.files)">
                <i class="fas fa-file-pdf"></i>
                <h3>选择要合并的PDF文件</h3>
                <p>支持多文件上传，可调整顺序</p>
            </div>

            <div class="file-list" id="mergeFileList"></div>

            <button class="process-btn" onclick="mergePDFs()" id="mergeBtn" disabled>
                <i class="fas fa-object-group"></i> 开始合并
            </button>

            <div class="loading" id="mergeLoading">
                <i class="fas fa-spinner"></i>
                <p>正在处理，请稍候...</p>
            </div>

            <div class="result-area" id="mergeResult"></div>
        </div>

        <!-- PDF拆分 -->
        <div class="tool-content" id="split">
            <div class="upload-area" onclick="document.getElementById('splitFile').click()">
                <input type="file" id="splitFile" accept=".pdf" style="display: none;" onchange="handleSplitFile(this.files)">
                <i class="fas fa-file-pdf"></i>
                <h3>选择要拆分的PDF文件</h3>
            </div>

            <div class="split-options">
                <div class="split-option active" onclick="selectSplitMode('all')">
                    <h4>拆分为单页</h4>
                    <p>将每一页拆分成单独的PDF</p>
                </div>
                <div class="split-option" onclick="selectSplitMode('range')">
                    <h4>按页码范围</h4>
                    <p>提取指定页码范围</p>
                </div>
                <div class="split-option" onclick="selectSplitMode('extract')">
                    <h4>提取特定页面</h4>
                    <p>提取指定的页面</p>
                </div>
            </div>

            <div class="input-group" id="rangeInput" style="display: none;">
                <label>页码范围（例如：1-5, 8-10）</label>
                <input type="text" id="pageRange" placeholder="输入页码范围">
            </div>

            <div class="input-group" id="extractInput" style="display: none;">
                <label>页面号（例如：1, 3, 5-7）</label>
                <input type="text" id="extractPages" placeholder="输入要提取的页面">
            </div>

            <div class="file-list" id="splitFileList"></div>

            <button class="process-btn" onclick="splitPDF()" id="splitBtn" disabled>
                <i class="fas fa-cut"></i> 开始拆分
            </button>

            <div class="loading" id="splitLoading">
                <i class="fas fa-spinner"></i>
                <p>正在处理，请稍候...</p>
            </div>

            <div class="result-area" id="splitResult"></div>
        </div>

        <!-- PDF转图片 -->
        <div class="tool-content" id="toimage">
            <div class="upload-area" onclick="document.getElementById('toImageFile').click()">
                <input type="file" id="toImageFile" accept=".pdf" style="display: none;" onchange="handleToImageFile(this.files)">
                <i class="fas fa-file-pdf"></i>
                <h3>选择PDF文件</h3>
                <p>将PDF转换为JPG图片</p>
            </div>

            <div class="file-list" id="toImageFileList"></div>

            <button class="process-btn" onclick="pdfToImage()" id="toImageBtn" disabled>
                <i class="fas fa-image"></i> 开始转换
            </button>

            <div class="loading" id="toImageLoading">
                <i class="fas fa-spinner"></i>
                <p>正在转换，请稍候...</p>
            </div>

            <div class="result-area" id="toImageResult"></div>
        </div>

        <!-- PDF压缩 -->
        <div class="tool-content" id="compress">
            <div class="upload-area" onclick="document.getElementById('compressFile').click()">
                <input type="file" id="compressFile" accept=".pdf" style="display: none;" onchange="handleCompressFile(this.files)">
                <i class="fas fa-file-pdf"></i>
                <h3>选择要压缩的PDF文件</h3>
                <p>减小PDF文件大小</p>
            </div>

            <div class="file-list" id="compressFileList"></div>

            <button class="process-btn" onclick="compressPDF()" id="compressBtn" disabled>
                <i class="fas fa-compress"></i> 开始压缩
            </button>

            <div class="loading" id="compressLoading">
                <i class="fas fa-spinner"></i>
                <p>正在压缩，请稍候...</p>
            </div>

            <div class="result-area" id="compressResult"></div>
        </div>
    </div>

    <script>
        let mergeFiles = [];
        let splitFile = null;
        let toImageFile = null;
        let compressFile = null;
        let splitMode = 'all';

        function switchTool(tool) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tool-content').forEach(content => content.classList.remove('active'));

            event.target.closest('.tab-btn').classList.add('active');
            document.getElementById(tool).classList.add('active');
        }

        function selectSplitMode(mode) {
            splitMode = mode;
            document.querySelectorAll('.split-option').forEach(option => option.classList.remove('active'));
            event.target.closest('.split-option').classList.add('active');

            document.getElementById('rangeInput').style.display = mode === 'range' ? 'block' : 'none';
            document.getElementById('extractInput').style.display = mode === 'extract' ? 'block' : 'none';
        }

        function handleMergeFiles(files) {
            mergeFiles = Array.from(files);
            const fileList = document.getElementById('mergeFileList');
            fileList.innerHTML = '';

            mergeFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="file-info">
                        <h4>${file.name}</h4>
                        <p>${formatSize(file.size)}</p>
                    </div>
                    <div class="file-actions">
                        <button class="action-btn btn-move" onclick="moveFile(${index}, -1)" ${index === 0 ? 'disabled' : ''}>↑</button>
                        <button class="action-btn btn-move" onclick="moveFile(${index}, 1)" ${index === mergeFiles.length - 1 ? 'disabled' : ''}>↓</button>
                        <button class="action-btn btn-delete" onclick="removeMergeFile(${index})">删除</button>
                    </div>
                `;
                fileList.appendChild(item);
            });

            document.getElementById('mergeBtn').disabled = mergeFiles.length < 2;
        }

        function moveFile(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < mergeFiles.length) {
                [mergeFiles[index], mergeFiles[newIndex]] = [mergeFiles[newIndex], mergeFiles[index]];
                handleMergeFiles(mergeFiles);
            }
        }

        function removeMergeFile(index) {
            mergeFiles.splice(index, 1);
            handleMergeFiles(mergeFiles);
        }

        async function mergePDFs() {
            if (mergeFiles.length < 2) return;

            document.getElementById('mergeLoading').classList.add('active');
            document.getElementById('mergeResult').classList.remove('active');

            try {
                const pdfDoc = await PDFLib.PDFDocument.create();

                for (const file of mergeFiles) {
                    const arrayBuffer = await file.arrayBuffer();
                    const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = await pdfDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                    pages.forEach(page => pdfDoc.addPage(page));
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                showResult('mergeResult', '合并成功', '合并后的PDF文件大小：' + formatSize(blob.size), blob, 'merged.pdf');
            } catch (e) {
                alert('合并失败: ' + e.message);
            }

            document.getElementById('mergeLoading').classList.remove('active');
        }

        function handleSplitFile(files) {
            if (files.length === 0) return;
            splitFile = files[0];

            const fileList = document.getElementById('splitFileList');
            fileList.innerHTML = `
                <div class="file-item">
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="file-info">
                        <h4>${splitFile.name}</h4>
                        <p>${formatSize(splitFile.size)}</p>
                    </div>
                </div>
            `;

            document.getElementById('splitBtn').disabled = false;
        }

        async function splitPDF() {
            if (!splitFile) return;

            document.getElementById('splitLoading').classList.add('active');
            document.getElementById('splitResult').classList.remove('active');

            try {
                const arrayBuffer = await splitFile.arrayBuffer();
                const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const totalPages = srcDoc.getPageCount();

                if (splitMode === 'all') {
                    // 拆分为单页
                    const pdfs = [];
                    for (let i = 0; i < totalPages; i++) {
                        const newDoc = await PDFLib.PDFDocument.create();
                        const [page] = await newDoc.copyPages(srcDoc, [i]);
                        newDoc.addPage(page);
                        const pdfBytes = await newDoc.save();
                        pdfs.push({
                            name: `${splitFile.name.replace('.pdf', '')}_page_${i + 1}.pdf`,
                            blob: new Blob([pdfBytes], { type: 'application/pdf' })
                        });
                    }
                    downloadMultiple(pdfs);
                    showResult('splitResult', '拆分成功', `已拆分为 ${totalPages} 个文件`, null, null);
                } else if (splitMode === 'range') {
                    // 按页码范围拆分
                    const range = document.getElementById('pageRange').value;
                    const ranges = parseRanges(range);
                    const pdfs = [];

                    for (const [start, end] of ranges) {
                        const newDoc = await PDFLib.PDFDocument.create();
                        const pageIndices = [];
                        for (let i = start - 1; i < end && i < totalPages; i++) {
                            pageIndices.push(i);
                        }
                        const pages = await newDoc.copyPages(srcDoc, pageIndices);
                        pages.forEach(page => newDoc.addPage(page));
                        const pdfBytes = await newDoc.save();
                        pdfs.push({
                            name: `${splitFile.name.replace('.pdf', '')}_${start}-${end}.pdf`,
                            blob: new Blob([pdfBytes], { type: 'application/pdf' })
                        });
                    }
                    downloadMultiple(pdfs);
                    showResult('splitResult', '拆分成功', `已拆分为 ${pdfs.length} 个文件`, null, null);
                } else if (splitMode === 'extract') {
                    // 提取特定页面
                    const pagesText = document.getElementById('extractPages').value;
                    const pageIndices = parsePages(pagesText, totalPages);
                    const newDoc = await PDFLib.PDFDocument.create();
                    const pages = await newDoc.copyPages(srcDoc, pageIndices);
                    pages.forEach(page => newDoc.addPage(page));
                    const pdfBytes = await newDoc.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    showResult('splitResult', '提取成功', `已提取 ${pageIndices.length} 页`, blob, 'extracted.pdf');
                }
            } catch (e) {
                alert('拆分失败: ' + e.message);
            }

            document.getElementById('splitLoading').classList.remove('active');
        }

        function parseRanges(text) {
            const ranges = [];
            const parts = text.split(',');
            parts.forEach(part => {
                const [start, end] = part.trim().split('-').map(num => parseInt(num.trim()));
                if (!isNaN(start) && !isNaN(end)) {
                    ranges.push([start, end]);
                }
            });
            return ranges;
        }

        function parsePages(text, maxPages) {
            const indices = [];
            const parts = text.split(',');
            parts.forEach(part => {
                part = part.trim();
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(num => parseInt(num.trim()));
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = Math.max(1, start); i <= Math.min(end, maxPages); i++) {
                            indices.push(i - 1);
                        }
                    }
                } else {
                    const page = parseInt(part);
                    if (!isNaN(page) && page >= 1 && page <= maxPages) {
                        indices.push(page - 1);
                    }
                }
            });
            return [...new Set(indices)].sort((a, b) => a - b);
        }

        function handleToImageFile(files) {
            if (files.length === 0) return;
            toImageFile = files[0];

            const fileList = document.getElementById('toImageFileList');
            fileList.innerHTML = `
                <div class="file-item">
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="file-info">
                        <h4>${toImageFile.name}</h4>
                        <p>${formatSize(toImageFile.size)}</p>
                    </div>
                </div>
            `;

            document.getElementById('toImageBtn').disabled = false;
        }

        async function pdfToImage() {
            if (!toImageFile) return;

            document.getElementById('toImageLoading').classList.add('active');
            document.getElementById('toImageResult').classList.remove('active');

            try {
                const arrayBuffer = await toImageFile.arrayBuffer();
                const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdfDoc.numPages;
                const scale = 2; // 2倍缩放保证清晰度

                const downloadedFiles = [];

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: scale });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    // 转换为PNG
                    const imgData = canvas.toDataURL('image/png');
                    const base64 = imgData.split(',')[1];
                    const binaryString = atob(base64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let j = 0; j < binaryString.length; j++) {
                        bytes[j] = binaryString.charCodeAt(j);
                    }
                    const blob = new Blob([bytes], { type: 'image/png' });

                    downloadedFiles.push({
                        name: toImageFile.name.replace('.pdf', '') + '_page_' + i + '.png',
                        blob: blob
                    });

                    // 更新进度
                    const progress = Math.round((i / totalPages) * 100);
                    showResult('toImageResult', '转换中', '正在处理第 ' + i + ' / ' + totalPages + ' 页...', null, null);
                }

                // 批量下载
                downloadMultipleImages(downloadedFiles);
                showResult('toImageResult', '转换成功', '已将PDF的 ' + totalPages + ' 页转换为PNG图片', null, null);
            } catch (e) {
                alert('转换失败: ' + e.message);
            }

            document.getElementById('toImageLoading').classList.remove('active');
        }

        function downloadMultipleImages(images) {
            images.forEach((img, index) => {
                setTimeout(() => {
                    const url = URL.createObjectURL(img.blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = img.name;
                    link.click();
                    URL.revokeObjectURL(url);
                }, index * 500);
            });
        }

        function handleCompressFile(files) {
            if (files.length === 0) return;
            compressFile = files[0];

            const fileList = document.getElementById('compressFileList');
            fileList.innerHTML = `
                <div class="file-item">
                    <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="file-info">
                        <h4>${compressFile.name}</h4>
                        <p>${formatSize(compressFile.size)}</p>
                    </div>
                </div>
            `;

            document.getElementById('compressBtn').disabled = false;
        }

        async function compressPDF() {
            if (!compressFile) return;

            document.getElementById('compressLoading').classList.add('active');
            document.getElementById('compressResult').classList.remove('active');

            try {
                const arrayBuffer = await compressFile.arrayBuffer();
                const originalSize = arrayBuffer.byteLength;

                // 加载PDF
                const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);

                // 压缩PDF：使用对象流和优化设置
                const pdfBytes = await srcDoc.save({
                    useObjectStreams: true,    // 使用对象流减小文件大小
                    addDefaultPage: false,     // 不添加默认页面
                    preserveEditability: false  // 移除可编辑性信息
                });

                const compressedSize = pdfBytes.length;
                const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);
                const savedSize = originalSize - compressedSize;

                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const message = `原始大小：${formatSize(originalSize)} → 压缩后：${formatSize(compressedSize)}，节省 ${formatSize(savedSize)} (${ratio}%)`;

                showResult('compressResult', '压缩成功', message, blob, 'compressed_' + compressFile.name);
            } catch (e) {
                alert('压缩失败: ' + e.message);
            }

            document.getElementById('compressLoading').classList.remove('active');
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showResult(resultId, title, message, blob, filename) {
            const result = document.getElementById(resultId);
            let html = `
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    <h3>${title}</h3>
                    <p>${message}</p>
            `;

            if (blob && filename) {
                html += `<button class="download-btn" onclick="downloadBlob('${filename}', ${JSON.stringify(Array.from(blob))})">下载文件</button>`;
            }

            html += '</div>';
            result.innerHTML = html;
            result.classList.add('active');

            if (blob && filename) {
                window.currentBlob = blob;
                window.currentFilename = filename;
            }
        }

        function downloadBlob(filename, arrayBuffer) {
            const blob = new Blob([new Uint8Array(arrayBuffer)], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }

        function downloadMultiple(pdfs) {
            pdfs.forEach((pdf, index) => {
                setTimeout(() => {
                    const url = URL.createObjectURL(pdf.blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = pdf.name;
                    link.click();
                    URL.revokeObjectURL(url);
                }, index * 500);
            });
        }
    </script>
</body>
</html>
